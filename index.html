        #game-area { display: none; }
        #result-area { display: none; }

            width: 80%; padding: 15px; font-size: 18px; border-radius: 8px; 
            border: 2px solid #3498db; background: #1a1a2e; color: white; 
            text-align: center; margin-bottom: 20px;
        }

        /* 卡包選擇器 UI */
        .pack-selector-container {
            margin: 20px 0; padding: 15px; background: #16213e; border-radius: 10px;
        }
        .pack-selector-title { font-size: 16px; color: #f39c12; margin-bottom: 10px; font-weight: bold; }
        .pack-grid {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
        }
        .pack-option {
            background: #2c3e50; border: 2px solid #34495e; border-radius: 8px;
            padding: 10px 15px; cursor: pointer; transition: 0.3s;
            font-size: 16px; font-weight: bold; color: #cbd5e1; flex: 1; min-width: 120px;
        }
        .pack-option:hover { background: #34495e; }

            background: #2980b9; border-color: #3498db; color: #fff;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.6); transform: scale(1.05);
        }

            display: flex; justify-content: space-between; align-items: center;
            background: #16213e; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px;

        .inventory { font-size: 14px; color: #f1c40f; text-align: right; font-weight: bold;}
        
        .tag {
            display: inline-block; background: #e74c3c; color: white;

            font-size: 18px; cursor: pointer; border: none; border-radius: 8px;
            background-color: #34495e; color: white; font-weight: bold; transition: 0.2s; box-shadow: 0 4px #2c3e50;

        .btn:hover { background-color: #3498db; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-start { background-color: #27ae60; box-shadow: 0 4px #1e8449; margin-top: 10px; }
        .btn-collection { background-color: #8e44ad; box-shadow: 0 4px #732d91; }

        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                    { text: "C. N 型半導體，多數載子為電洞", next: "q14_help", log: "Q14錯: N型的多數載子是電子" },
                    { text: "D. P 型半導體，多數載子為電子", next: "q14_help", log: "Q14錯: 搭配錯誤" }
                ]
            },
            "q14_help": {
                tag: "💊 救援任務：多出來的負電",
                text: "知識拆解：矽外層只有 4 個電子。五價元素有 5 個電子，結合後會「多出一個」到處亂跑的自由電子。電子帶負電 (Negative)，所以叫做什麼型？",
                options: [
                    { text: "A. N 型半導體，多數載子為電子", next: "q14", isCorrect: true },
                    { text: "B. P 型半導體，多數載子為電洞", next: "q14_help", log: "Q14救錯: P型(Positive)是加入三價元素，產生缺口(電洞)喔！" }
                ]
            },

            // 🌸 第 15 關：東大特訓班 教學法
            "q15": {
                tag: "🌸 第 15 關：大腦休息 (日劇)",
                text: "《東大特訓班》中，英文老師川口洋發明了一種奇特的英文單字記憶法，要求學生們一邊做什麼動作，一邊大聲背誦英文單字？",
                options: [
                    { text: "A. 聽披頭四的歌並跳有氧舞蹈", next: "q16", isCorrect: true },
                    { text: "B. 在操場跑馬拉松", next: "q15_help", log: "Q15錯: 太累了無法背書" },
                    { text: "C. 倒立", next: "q15_help", log: "Q15錯: 這樣大腦會充血" },
                    { text: "D. 蒙住眼睛", next: "q15_help", log: "Q15錯: 這是盲人訓練" }
                ]
            },
            "q15_help": {
                tag: "💊 提示：快樂學習法",
                text: "川口老師認為，學習語言必須跟「快樂的節奏」結合。所以他讓學生在教室裡放著輕快的英文老歌，一邊扭動身體一邊大喊單字！",
                options: [
                    { text: "A. 聽歌並跳有氧舞蹈", next: "q15", isCorrect: true },
                    { text: "B. 在操場跑馬拉松", next: "q15_help", log: "Q15救錯: 跑馬拉松喘都喘死了，怎麼可能還唸得出英文啦！" }
                ]
            },

            // --- 第 16 關：二極體空乏區 ---
            "q16": {
                tag: "第 16 關：二極體",
                text: "當 PN 接面二極體加上「順向偏壓」時，其接面處的「空乏區 (Depletion Region)」寬度會如何變化？",
                options: [
                    { text: "A. 變窄", next: "q17", isCorrect: true },
                    { text: "B. 變寬", next: "q16_help", log: "Q16錯: 這是逆向偏壓的狀態" },
                    { text: "C. 維持不變", next: "q16_help", log: "Q16錯: 偏壓一定會改變空乏區" },
                    { text: "D. 瞬間燒毀", next: "q16_help", log: "Q16錯: 順向是正常導通狀態" }
                ]
            },
            "q16_help": {
                tag: "💊 救援任務：同性相斥",
                text: "知識拆解：順向偏壓就是電池正極接 P(正)、負極接 N(負)。同性相斥，電池把兩邊的載子硬「往中間擠」，所以中間沒人的空曠區(空乏區)就會被擠壓到？",
                options: [
                    { text: "A. 變窄", next: "q16", isCorrect: true },
                    { text: "B. 變寬", next: "q16_help", log: "Q16救錯: 如果電池反接(逆向)，載子被往外拉，空乏區才會變寬喔！" }
                ]
            },

            // --- 第 17 關：整流器頻率 ---
            "q17": {
                tag: "第 17 關：二極體應用",
                text: "在「橋式全波整流」電路中，若輸入交流電源的頻率為 60Hz，則負載端輸出的直流脈動電壓，其頻率 (漣波頻率) 會是多少？",
                options: [
                    { text: "A. 120 Hz", next: "q18", isCorrect: true },
                    { text: "B. 60 Hz", next: "q17_help", log: "Q17錯: 這是半波整流的頻率" },
                    { text: "C. 30 Hz", next: "q17_help", log: "Q17錯: 整流不會降頻" },
                    { text: "D. 0 Hz", next: "q17_help", log: "Q17錯: 除非加上完美的濾波電容" }
                ]
            },
            "q17_help": {
                tag: "💊 救援任務：負半週翻上來",
                text: "知識拆解：全波整流的魔力就是把原本向下的「負半週」全部翻折到上面去。所以原本一個週期(1秒轉60次)的波，看起來就像是擠了兩個山峰。頻率會變成幾倍？",
                options: [
                    { text: "A. 120 Hz", next: "q17", isCorrect: true },
                    { text: "B. 60 Hz", next: "q17_help", log: "Q17救錯: 半波整流因為只保留正半週，所以頻率才是原本的 60Hz 喔！" }
                ]
            },

            // --- 第 18 關：發光二極體 LED ---
            "q18": {
                tag: "第 18 關：特殊二極體",
                text: "關於發光二極體 (LED)，它發出光芒的顏色，主要是由什麼因素決定的？",
                options: [
                    { text: "A. 半導體材料的能隙 (Energy Gap) 大小", next: "q19", isCorrect: true },
                    { text: "B. 施加的順向電壓大小", next: "q18_help", log: "Q18錯: 電壓只能控制亮度，不決定顏色" },
                    { text: "C. 外部封裝塑膠殼的顏色", next: "q18_help", log: "Q18錯: 透明殼也能發出紅光或藍光" },
                    { text: "D. 負載電阻的大小", next: "q18_help", log: "Q18錯: 這只影響電流" }
                ]
            },
            "q18_help": {
                tag: "💊 救援任務：跳水的能量",
                text: "知識拆解：LED 發光是因為電子跳進電洞裡，釋放出能量。這個跳台(能隙)有多高，釋放的能量(光波長)就不同，就決定了它是紅光還是藍光！",
                options: [
                    { text: "A. 半導體材料的能隙", next: "q18", isCorrect: true },
                    { text: "B. 施加的電壓大小", next: "q18_help", log: "Q18救錯: 電壓或電流只能讓它變亮或變暗，但不會把紅燈變成綠燈喔！" }
                ]
            },

            // --- 第 19 關：BJT 工作區 ---
            "q19": {
                tag: "第 19 關：雙極性電晶體 BJT",
                text: "BJT 要能作為「線性放大器」，必須操作在「作用區 (Active Region)」。此時 B-E 介面與 B-C 介面的偏壓狀態分別為何？",
                options: [
                    { text: "A. B-E 順向，B-C 逆向", next: "q20", isCorrect: true },
                    { text: "B. B-E 順向，B-C 順向", next: "q19_help", log: "Q19錯: 這是飽和區 (開關ON)" },
                    { text: "C. B-E 逆向，B-C 逆向", next: "q19_help", log: "Q19錯: 這是截止區 (開關OFF)" },
                    { text: "D. B-E 逆向，B-C 順向", next: "q19_help", log: "Q19錯: 這是反轉區" }
                ]
            },
            "q19_help": {
                tag: "💊 救援任務：大門開後門關",
                text: "知識拆解：輸入端(B-E)要導通讓電子大軍衝進來，所以必須「順向」；輸出端(B-C)要負責擋住高壓並收集電子，所以必須「逆向」。",
                options: [
                    { text: "A. B-E 順向，B-C 逆向", next: "q19", isCorrect: true },
                    { text: "B. 兩個都順向", next: "q19_help", log: "Q19救錯: 兩個都順向就全通變成開關短路了，沒辦法線性放大喔！" }
                ]
            },

            // 🌸 第 20 關：東大特訓班 記憶樹
            "q20": {
                tag: "🌸 第 20 關：大腦休息 (日劇)",
                text: "在《東大特訓班》中，為了對付龐雜難記的社會科與歷史，老師教導學生使用一種非常著名的視覺化筆記法。這種將中心主題向外發散連結的筆記法稱為什麼？",
                options: [
                    { text: "A. 記憶樹 (Memory Tree / 心智圖)", next: "q21", isCorrect: true },
                    { text: "B. 康奈爾筆記法", next: "q20_help", log: "Q20錯: 雖然很有名，但劇中強調的是記憶樹" },
                    { text: "C. 閃卡記憶法", next: "q20_help", log: "Q20錯: 這是背單字用的" },
                    { text: "D. 曼陀羅九宮格", next: "q20_help", log: "Q20錯: 這是大谷翔平用的目標設定法" }
                ]
            },
            "q20_help": {
                tag: "💊 提示：長出樹枝",
                text: "這種方法就像一棵大樹，把時代的主題當作樹幹，將各種事件與人物當作樹枝與樹葉向外延伸，利用塗鴉和顏色加深大腦印象。",
                options: [
                    { text: "A. 記憶樹 (Memory Tree)", next: "q20", isCorrect: true },
                    { text: "B. 閃卡記憶法", next: "q20_help", log: "Q20救錯: 閃卡是一張一張背的，無法建立歷史事件的宏觀連結喔！" }
                ]
            },

            // --- 第 21 關：BJT 電流增益 ---
            "q21": {
                tag: "第 21 關：BJT 參數",
                text: "BJT 的共基極電流增益為 α，共射極電流增益為 β。若某電晶體的 α = 0.99，則其 β 值為多少？",
                options: [
                    { text: "A. 99", next: "q22", isCorrect: true },
                    { text: "B. 100", next: "q21_help", log: "Q21錯: 這是 1+β 的值" },
                    { text: "C. 0.01", next: "q21_help", log: "Q21錯: 這是基極電流的比例" },
                    { text: "D. 1", next: "q21_help", log: "Q21錯: β 通常遠大於1" }
                ]
            },
            "q21_help": {
                tag: "💊 救援任務：統測必考換算",
                text: "知識拆解：公式 $\\beta = \\frac{\\alpha}{1 - \\alpha}$。 把 0.99 帶進去： 0.99 / (1 - 0.99) = 0.99 / 0.01 = ?",
                options: [
                    { text: "A. 99", next: "q21", isCorrect: true },
                    { text: "B. 100", next: "q21_help", log: "Q21救錯: 射極電流 IE 才是 100，題目問的是 beta (IC / IB) 喔！" }
                ]
            },

            // --- 第 22 關：FET 基礎 ---
            "q22": {
                tag: "第 22 關：場效電晶體 FET",
                text: "與電流控制的 BJT 不同，場效電晶體 (FET) 是一種「電壓控制元件」。它是利用哪一個端點的電壓來控制電流的大小？",
                options: [
                    { text: "A. 閘極 (Gate)", next: "q23", isCorrect: true },
                    { text: "B. 汲極 (Drain)", next: "q22_help", log: "Q22錯: 這是電流流出的地方" },
                    { text: "C. 源極 (Source)", next: "q22_help", log: "Q22錯: 這是電流進入的地方" },
                    { text: "D. 基極 (Base)", next: "q22_help", log: "Q22錯: 這是 BJT 的控制端" }
                ]
            },
            "q22_help": {
                tag: "💊 救援任務：水龍頭的開關",
                text: "知識拆解：FET 就像一個水龍頭。源極(Source)是水塔，汲極(Drain)是排水孔。用來控制水流大小的「閘門」，英文是？",
                options: [
                    { text: "A. 閘極 (Gate)", next: "q22", isCorrect: true },
                    { text: "B. 基極 (Base)", next: "q22_help", log: "Q22救錯: 基極是 BJT 專用的名詞，FET 沒有 Base 喔！" }
                ]
            },

            // --- 第 23 關：MOSFET 分類 ---
            "q23": {
                tag: "第 23 關：場效電晶體 FET",
                text: "有一種 MOSFET 非常特別，它天生就擁有通道，所以它「既可以操作在空乏型（把通道關小），也可以操作在增強型（把通道開更大）」。這是哪一種 MOSFET？",
                options: [
                    { text: "A. 空乏型 MOSFET (D-MOSFET)", next: "q24", isCorrect: true },
                    { text: "B. 增強型 MOSFET (E-MOSFET)", next: "q23_help", log: "Q23錯: E-MOSFET 天生斷路，只能操作在增強區" },
                    { text: "C. 接面場效電晶體 (JFET)", next: "q23_help", log: "Q23錯: JFET 只能操作在空乏區" },
                    { text: "D. UJT 單接面電晶體", next: "q23_help", log: "Q23錯: 這是產生振盪用的元件" }
                ]
            },
            "q23_help": {
                tag: "💊 救援任務：全能的開關",
                text: "知識拆解：E-MOSFET 天生是斷的，只能增強；JFET 如果增強就會燒毀(順向偏壓)。只有 D-MOSFET 擁有絕緣層又天生有通道，所以它兩邊都可以操作！",
                options: [
                    { text: "A. 空乏型 MOSFET (D-MOSFET)", next: "q23", isCorrect: true },
                    { text: "B. 增強型 MOSFET", next: "q23_help", log: "Q23救錯: 增強型天生沒有通道，沒辦法使用空乏(擠扁通道)的模式喔！" }
                ]
            },

            // --- 第 24 關：FET 優點 ---
            "q24": {
                tag: "第 24 關：小訊號放大",
                text: "與 BJT 相比，FET 放大器有一個非常突出的優點，使得它在測量儀器或多級放大器的第一級非常受歡迎。這個優點是？",
                options: [
                    { text: "A. 輸入阻抗極大", next: "q25", isCorrect: true },
                    { text: "B. 電壓放大倍率極高", next: "q24_help", log: "Q24錯: BJT 的放大倍率通常比較高" },
                    { text: "C. 輸出阻抗極大", next: "q24_help", log: "Q24錯: 放大器通常希望輸出阻抗越小越好" },
                    { text: "D. 頻寬無限大", next: "q24_help", log: "Q24錯: 沒有無限大的頻寬" }
                ]
            },
            "q24_help": {
                tag: "💊 救援任務：不吃別人的電",
                text: "知識拆解：FET 的閘極有一層絕緣層，或者處於逆向偏壓，所以幾乎「沒有電流流得進去」。電流趨近於 0，代表它的電阻(阻抗)非常？",
                options: [
                    { text: "A. 輸入阻抗極大", next: "q24", isCorrect: true },
                    { text: "B. 電壓放大倍率極高", next: "q24_help", log: "Q24救錯: FET 的 gm 通常比 BJT 小，所以放大倍率其實是比較低的！" }
                ]
            },

            // 🌸 第 25 關：東大特訓班 樂團
            "q25": {
                tag: "🌸 第 25 關：大腦休息 (日劇)",
                text: "《東大特訓班》中，飾演叛逆學生「矢島勇介」的日本男星山下智久，在劇中為了逃避現實與發洩情緒，最常吹奏哪一種樂器？",
                options: [
                    { text: "A. 小號 (Trumpet)", next: "q26", isCorrect: true },
                    { text: "B. 電吉他", next: "q25_help", log: "Q25錯: 這是孤獨搖滾的專長" },
                    { text: "C. 爵士鼓", next: "q25_help", log: "Q25錯: 劇中沒有打鼓的畫面" },
                    { text: "D. 鋼琴", next: "q25_help", log: "Q25錯: 他是玩樂團的，但不彈鋼琴" }
                ]
            },
            "q25_help": {
                tag: "💊 提示：吹奏樂器",
                text: "他原本在樂團裡擔任管樂手，後來為了還債跟證明自己，把樂器賣掉，拿著錢交給櫻木律師當補習費！那是一個金色的管樂器。",
                options: [
                    { text: "A. 小號 (Trumpet)", next: "q25", isCorrect: true },
                    { text: "B. 電吉他", next: "q25_help", log: "Q25救錯: 電吉他太普通了，他在劇裡吹的是銅管樂器喔！" }
                ]
            },

            // --- 第 26 關：OPA 虛短路 ---
            "q26": {
                tag: "第 26 關：運算放大器 OPA",
                text: "當 OPA 加上「負回授」並操作在線性區時，其正輸入端 (+) 與負輸入端 (-) 的電壓幾乎相等，這個特性稱為什麼？",
                options: [
                    { text: "A. 虛擬短路 (Virtual Short)", next: "q27", isCorrect: true },
                    { text: "B. 虛擬接地 (Virtual Ground)", next: "q26_help", log: "Q26錯: 虛接地是指其中一端為0V時，另一端也為0V的特例" },
                    { text: "C. 理想阻抗", next: "q26_help", log: "Q26錯: 這是輸入阻抗無限大的特性" },
                    { text: "D. 無限增益", next: "q26_help", log: "Q26錯: 這是開迴路的特性" }
                ]
            },
            "q26_help": {
                tag: "💊 救援任務：假裝接在一起",
                text: "知識拆解：端點「看起來」電壓一樣（好像被短路接在一起了），但實際上電流並沒有流過去。這種假的、概念上的短路叫什麼？",
                options: [
                    { text: "A. 虛擬短路", next: "q26", isCorrect: true },
                    { text: "B. 虛擬接地", next: "q26_help", log: "Q26救錯: 虛接地必須是有一端真的接到地(0V)，但這題只是說兩端相等喔！" }
                ]
            },

            // --- 第 27 關：反相放大器 ---
            "q27": {
                tag: "第 27 關：運算放大器 OPA",
                text: "一個 OPA 反相放大器，其輸入電阻 Ri = 2kΩ，負回授電阻 Rf = 10kΩ。請問這個電路的電壓增益 (Av) 是多少？",
                options: [
                    { text: "A. -5", next: "q28", isCorrect: true },
                    { text: "B. 5", next: "q27_help", log: "Q27錯: 反相放大器一定要有負號" },
                    { text: "C. 6", next: "q27_help", log: "Q27錯: 這是非反相放大器的增益 (1 + Rf/Ri)" },
                    { text: "D. -0.2", next: "q27_help", log: "Q27錯: 公式顛倒了" }
                ]
            },
            "q27_help": {
                tag: "💊 救援任務：負的回授除輸入",
                text: "知識拆解：反相放大器的訊號是從 (-) 端進去，所以一定有「負號」。公式是 $A_v = - \\frac{R_f}{R_i}$。 10k / 2k 加上負號是多少？",
                options: [
                    { text: "A. -5", next: "q27", isCorrect: true },
                    { text: "B. 5", next: "q27_help", log: "Q27救錯: 少了負號就變成同相了啦！" }
                ]
            },

            // --- 第 28 關：振盪器條件 ---
            "q28": {
                tag: "第 28 關：振盪器",
                text: "根據巴克豪森準則 (Barkhausen Criterion)，放大器電路要能維持穩定的「等幅振盪」，其迴路增益的絕對值 $|A\\beta|$ 必須等於多少？",
                options: [
                    { text: "A. 1", next: "q29", isCorrect: true },
                    { text: "B. 0", next: "q28_help", log: "Q28錯: 這樣就沒有訊號了" },
                    { text: "C. 無限大", next: "q28_help", log: "Q28錯: 這樣波形會無限制衝高變成方波" },
                    { text: "D. 0.5", next: "q28_help", log: "Q28錯: 這樣波形會慢慢衰減到零" }
                ]
            },
            "q28_help": {
                tag: "💊 救援任務：不多也不少",
                text: "知識拆解：訊號在電路裡繞一圈。大於 1 波形會爆炸；小於 1 波形會平息。要維持「完美等幅」的波浪，繞一圈的倍率必須剛好是？",
                options: [
                    { text: "A. 1", next: "q28", isCorrect: true },
                    { text: "B. 0", next: "q28_help", log: "Q28救錯: 乘上 0 訊號就不見了，無法振盪喔！" }
                ]
            },

            // --- 第 29 關：低通濾波器 ---
            "q29": {
                tag: "第 29 關：濾波器",
                text: "在一階 RC 低通濾波器中，決定它能讓多少頻率通過的「截止頻率 (fc)」公式為何？",
                options: [
                    { text: "A. $f_c = \\frac{1}{2\\pi RC}$", next: "q30", isCorrect: true },
                    { text: "B. $f_c = \\frac{1}{2\\pi \\sqrt{LC}}$", next: "q29_help", log: "Q29錯: 這是 LC 諧振頻率" },
                    { text: "C. $f_c = 2\\pi RC$", next: "q29_help", log: "Q29錯: 頻率與 RC 成反比" },
                    { text: "D. $f_c = \\frac{R}{2\\pi C}$", next: "q29_help", log: "Q29錯: 單位不對" }
                ]
            },
            "q29_help": {
                tag: "💊 救援任務：統測必背常數",
                text: "知識拆解：RC 濾波器只有 R 跟 C。而頻率 f 永遠是在分母放著 $2\\pi$。把 R 和 C 乘在一起放在 $2\\pi$ 旁邊，就是最經典的公式！",
                options: [
                    { text: "A. $1 / (2\\pi RC)$", next: "q29", isCorrect: true },
                    { text: "B. $1 / (2\\pi \\sqrt{LC})$", next: "q29_help", log: "Q29救錯: 這是 LC 諧振的公式，題目問的是 RC 濾波器喔！" }
                ]
            },

            // 🌸 第 30 關：東大特訓班 櫻花樹
            "q30": {
                tag: "🌸 第 30 關：大腦休息 (日劇)",
                text: "在劇中，櫻木律師為了解決學校的財務危機並立下目標，在校園中庭種下了一棵象徵著東大特訓班希望的樹。這棵樹也是這部日劇的名稱，請問是什麼樹？",
                options: [
                    { text: "A. 櫻花樹 (龍櫻)", next: "q31", isCorrect: true },
                    { text: "B. 銀杏樹", next: "q30_help", log: "Q30錯: 雖然東大以銀杏聞名，但劇裡種的是櫻花" },
                    { text: "C. 榕樹", next: "q30_help", log: "Q30錯: 這是台灣國小常見的" },
                    { text: "D. 松樹", next: "q30_help", log: "Q30錯: 不對" }
                ]
            },
            "q30_help": {
                tag: "💊 提示：劇名的原意",
                text: "這部日劇的日文原名是《ドラゴン桜》（Dragon Zakura）。Zakura 就是日文的櫻花，所以他種的是？",
                options: [
                    { text: "A. 櫻花樹", next: "q30", isCorrect: true },
                    { text: "B. 銀杏樹", next: "q30_help", log: "Q30救錯: 雖然東京大學裡面都是銀杏，但櫻木老師種的是象徵考上的櫻花喔！" }
                ]
            },

            // --- 第 31 關：CMOS 優點 ---
            "q31": {
                tag: "第 31 關：數位邏輯族",
                text: "現代數位 IC 與電腦 CPU 中最常使用的「CMOS」技術，相較於早期的 TTL 邏輯，其最大的優勢是什麼？",
                options: [
                    { text: "A. 靜態消耗功率極低 (非常省電)", next: "q32", isCorrect: true },
                    { text: "B. 工作速度最快", next: "q31_help", log: "Q31錯: 早期 TTL 比 CMOS 快" },
                    { text: "C. 完全不怕靜電破壞", next: "q31_help", log: "Q31錯: CMOS 最怕靜電" },
                    { text: "D. 只能操作在 5V", next: "q31_help", log: "Q31錯: CMOS 電壓範圍很廣" }
                ]
            },
            "q31_help": {
                tag: "💊 救援任務：手機的命脈",
                text: "知識拆解：因為 CMOS 是用 PMOS 和 NMOS 互補，只要沒有在切換信號，電路幾乎是斷路的，不會漏電。這讓手機能待機一整天！",
                options: [
                    { text: "A. 非常省電", next: "q31", isCorrect: true },
                    { text: "B. 完全不怕靜電", next: "q31_help", log: "Q31救錯: CMOS 的絕緣層超薄，手一摸靜電就會把它擊穿燒毀！" }
                ]
            },

            // --- 第 32 關：第摩根定理 ---
            "q32": {
                tag: "第 32 關：數位邏輯",
                text: "布林代數中非常重要的「第摩根定理 (DeMorgan's Law)」，請問 $(A + B)'$ 展開後會等於什麼？",
                options: [
                    { text: "A. $A' \\cdot B'$", next: "q33", isCorrect: true },
                    { text: "B. $A' + B'$", next: "q32_help", log: "Q32錯: 中間的符號要變號" },
                    { text: "C. $A \\cdot B$", next: "q32_help", log: "Q32錯: A 和 B 要加上反相" },
                    { text: "D. $A' + B$", next: "q32_help", log: "Q32錯: B 也要反相" }
                ]
            },
            "q32_help": {
                tag: "💊 救援任務：斬斷長條變換符號",
                text: "知識拆解：口訣：「長條斬斷，符號變換」。把上面的長反相棒斬斷分給 A 跟 B，中間的加號 (+) 就要翻轉變成乘號 (·)！",
                options: [
                    { text: "A. $A' \\cdot B'$", next: "q32", isCorrect: true },
                    { text: "B. $A' + B'$", next: "q32_help", log: "Q32救錯: 斬斷之後，中間的加號沒有變成乘號喔！" }
                ]
            },

            // --- 第 33 關：示波器 ---
            "q33": {
                tag: "第 33 關：儀表與量測",
                text: "使用示波器量測一個弦波信號。若垂直刻度設定為 2V/DIV，波形在螢幕上最高點到最低點共佔了 4 個大格 (DIV)。請問此信號的「峰對峰值電壓 (Vp-p)」為多少？",
                options: [
                    { text: "A. 8 V", next: "q34", isCorrect: true },
                    { text: "B. 4 V", next: "q33_help", log: "Q33錯: 這是 2 格的高度" },
                    { text: "C. 2 V", next: "q33_help", log: "Q33錯: 這是 1 格的高度" },
                    { text: "D. 16 V", next: "q33_help", log: "Q33錯: 計算錯誤" }
                ]
            },
            "q33_help": {
                tag: "💊 救援任務：數格子乘法",
                text: "知識拆解：V/DIV 代表「每一格是幾伏特」。既然每一格是 2V，總共有 4 格高。2 乘以 4 等於？",
                options: [
                    { text: "A. 8 V", next: "q33", isCorrect: true },
                    { text: "B. 4 V", next: "q33_help", log: "Q33救錯: 你忘了乘上每一格代表的 2V 囉！" }
                ]
            },

            // --- 第 34 關：三用電表 ---
            "q34": {
                tag: "第 34 關：儀表與量測",
                text: "使用指針型三用電表測量「電阻」前，必須將紅黑測棒短路，並旋轉調整鈕讓指針指向 0 歐姆。這個動作稱為什麼？",
                options: [
                    { text: "A. 歸零調整 (Zero Adjustment)", next: "q35", isCorrect: true },
                    { text: "B. 滿刻度調整", next: "q34_help", log: "Q34錯: 歐姆檔的 0 在最右邊，∞ 在最左邊" },
                    { text: "C. 換檔設定", next: "q34_help", log: "Q34錯: 這是轉動功能旋鈕" },
                    { text: "D. 漏電測試", next: "q34_help", log: "Q34錯: 不是這個目的" }
                ]
            },
            "q34_help": {
                tag: "💊 救援任務：扣除內阻與電池衰退",
                text: "知識拆解：因為歐姆表是用裡面的電池發電，電池沒電時指針會不準。每次量測前，把兩根棒子碰在一起(代表電阻為0)，強迫指針指在右邊的 0 的位置，這叫作？",
                options: [
                    { text: "A. 歸零調整", next: "q34", isCorrect: true },
                    { text: "B. 滿刻度調整", next: "q34_help", log: "Q34救錯: 電流表才是看滿刻度，歐姆表是要指在 0 歐姆的位置喔！" }
                ]
            },

            // 🌸 第 35 關：東大特訓班 結局
            "q35": {
                tag: "🌸 第 35 關：大腦休息 (日劇)",
                text: "最後一題日劇題！在《東大特訓班 1》的最終回，經過了一年的斯巴達特訓，特訓班的 6 位學生參加了東大入學考試。最後的結果如何？",
                options: [
                    { text: "A. 有人考上，也有人落榜 (共 3 人考上)", next: "q36", isCorrect: true },
                    { text: "B. 6 人全部考上東大", next: "q35_help", log: "Q35錯: 這太不切實際了" },
                    { text: "C. 6 人全部落榜", next: "q35_help", log: "Q35錯: 這樣櫻木律師就太漏氣了" },
                    { text: "D. 考試當天遇到颱風取消了", next: "q35_help", log: "Q35錯: 這是搞笑選項" }
                ]
            },
            "q35_help": {
                tag: "💊 提示：真實的青春",
                text: "這部日劇最神的地方，就是它沒有給出「全員合格」的童話結局。有人因為考場上拉肚子落榜，有人決定不去讀東大改考律師。這展現了青春的真實與殘酷。",
                options: [
                    { text: "A. 有人考上，也有人落榜", next: "q35", isCorrect: true },
                    { text: "B. 全員考上東大", next: "q35_help", log: "Q35救錯: 全員考上就太像童話故事了，日劇的結局是非常寫實的喔！" }
                ]
            },

            // --- 第 36 關：電氣火災 ---
            "q36": {
                tag: "第 36 關：實習安全",
                text: "實習工場中，若變壓器、配電盤或電腦設備短路起火，這種「電氣火災」在消防分類上屬於哪一類火災？",
                options: [
                    { text: "A. C 類火災", next: "q37", isCorrect: true },
                    { text: "B. A 類火災", next: "q36_help", log: "Q36錯: 這是普通可燃物 (木材/紙張)" },
                    { text: "C. B 類火災", next: "q36_help", log: "Q36錯: 這是易燃液體 (汽油)" },
                    { text: "D. D 類火災", next: "q36_help", log: "Q36錯: 這是可燃金屬 (鎂/鉀)" }
                ]
            },
            "q36_help": {
                tag: "💊 救援任務：ABC的分類",
                text: "知識拆解：A(Ash 灰燼)是普通紙木火災；B(Barrel 桶子)是汽油化學火災；C(Current 電流)就是電氣火災。所以答案是？",
                options: [
                    { text: "A. C 類火災", next: "q36", isCorrect: true },
                    { text: "B. A 類火災", next: "q36_help", log: "Q36救錯: A 類是會燒成灰燼的木頭紙張喔！" }
                ]
            },

            // --- 第 37 關：NAND 邏輯閘 ---
            "q37": {
                tag: "第 37 關：數位邏輯",
                text: "關於「萬用閘」 NAND 閘 (反及閘)，它的真值表特性是什麼？",
                options: [
                    { text: "A. 只要有任何一個輸入為 0，輸出就是 1", next: "q38", isCorrect: true },
                    { text: "B. 只有當所有輸入都是 1 時，輸出才是 1", next: "q37_help", log: "Q37錯: 這是 AND 閘" },
                    { text: "C. 只要有任何一個輸入為 1，輸出就是 1", next: "q37_help", log: "Q37錯: 這是 OR 閘" },
                    { text: "D. 輸入相同為 0，不同為 1", next: "q37_help", log: "Q37錯: 這是 XOR 閘" }
                ]
            },
            "q37_help": {
                tag: "💊 救援任務：AND 的死對頭",
                text: "知識拆解：AND 閘是「有 0 就是 0」。NAND 前面加了反相 (NOT)，所以把結果全部倒過來，變成「有 0 就是 ___」！",
                options: [
                    { text: "A. 只要有 0，輸出就是 1", next: "q37", isCorrect: true },
                    { text: "B. 只有全為 1，輸出才是 1", next: "q37_help", log: "Q37救錯: 全為 1 輸出 1 是 AND 閘，NAND 剛好要相反喔！" }
                ]
            },

            // --- 第 38 關：BJT vs FET ---
            "q38": {
                tag: "第 38 關：電晶體特性",
                text: "比較 BJT 與 FET 兩種電晶體，下列敘述何者正確？",
                options: [
                    { text: "A. BJT 是電流控制元件，FET 是電壓控制元件", next: "q39", isCorrect: true },
                    { text: "B. BJT 的輸入阻抗比 FET 大", next: "q38_help", log: "Q38錯: FET 輸入端有絕緣，阻抗遠大於 BJT" },
                    { text: "C. BJT 是單極性元件，FET 是雙極性元件", next: "q38_help", log: "Q38錯: 剛好相反 (Bipolar vs Field Effect)" },
                    { text: "D. 兩者皆為被動元件", next: "q38_help", log: "Q38錯: 電晶體都是主動元件" }
                ]
            },
            "q38_help": {
                tag: "💊 救援任務：名詞定義",
                text: "知識拆解：BJT 靠基極的微小「電流」來控制大電流；FET 靠閘極的靜電場「電壓」來夾扁通道控制電流。",
                options: [
                    { text: "A. BJT 電流控制，FET 電壓控制", next: "q38", isCorrect: true },
                    { text: "B. BJT 輸入阻抗比 FET 大", next: "q38_help", log: "Q38救錯: FET 的閘極是絕緣的，阻力無限大，所以 FET 阻抗大很多！" }
                ]
            },

            // --- 第 39 關：比較器 ---
            "q39": {
                tag: "第 39 關：運算放大器 OPA",
                text: "若 OPA 運算放大器「完全沒有接任何回授電阻」（處於開迴路狀態），因為其開迴路增益無限大，此時它通常被當作什麼電路使用？",
                options: [
                    { text: "A. 比較器 (Comparator)", next: "q40", isCorrect: true },
                    { text: "B. 積分器", next: "q39_help", log: "Q39錯: 積分器需要接電容當回授" },
                    { text: "C. 緩衝器 (Buffer)", next: "q39_help", log: "Q39錯: 緩衝器需要 100% 負回授" },
                    { text: "D. 振盪器", next: "q39_help", log: "Q39錯: 振盪器需要正回授" }
                ]
            },
            "q39_help": {
                tag: "💊 救援任務：無限放大的暴走",
                text: "知識拆解：沒有負回授拉住它，只要正端比負端大 0.001V，輸出就會瞬間衝到最高電壓。這就像是在「比較」兩端誰大誰小，贏的就拿走全部。",
                options: [
                    { text: "A. 比較器", next: "q39", isCorrect: true },
                    { text: "B. 積分器", next: "q39_help", log: "Q39救錯: 積分器必須在回授端接上電容器喔！" }
                ]
            },

            // --- 第 40 關：交流波形因數 ---
            "q40": {
                tag: "第 40 關：波形參數",
                text: "在交流電中，將「有效值 (RMS)」除以「平均值 (Avg)」，這個比值稱為什麼？(正弦波為 1.11)",
                options: [
                    { text: "A. 波形因數 (Form Factor)", next: "q41", isCorrect: true },
                    { text: "B. 波峰因數 (Crest Factor)", next: "q40_help", log: "Q40錯: 這是最大值除以有效值" },
                    { text: "C. 功率因數 (Power Factor)", next: "q40_help", log: "Q40錯: 這是實功率除以視在功率" },
                    { text: "D. 品質因數 (Q factor)", next: "q40_help", log: "Q40錯: 這是諧振電路的選擇性指標" }
                ]
            },
            "q40_help": {
                tag: "💊 救援任務：統測必背名詞",
                text: "知識拆解：背誦口訣「有效除以平均 ＝ 形狀」。它用來描述交流波形到底有多「平滑」還是多「尖銳」。所以叫作？",
                options: [
                    { text: "A. 波形因數 (Form Factor)", next: "q40", isCorrect: true },
                    { text: "B. 波峰因數 (Crest Factor)", next: "q40_help", log: "Q40救錯: 波峰因數是拿最高點(最大值)去跟有效值比喔！" }
                ]
            },

            // --- 第 41 關：穩態開路 ---
            "q41": {
                tag: "第 41 關：直流暫態",
                text: "在直流電路達到「穩態 (t=∞)」後，因為電壓不再變化 (ΔV=0)，水缸已經充飽了。此時「電容器 (C)」在電路中等效於什麼狀態？",
                options: [
                    { text: "A. 開路 (Open, 視為斷線)", next: "q42", isCorrect: true },
                    { text: "B. 短路 (Short, 視為一條線)", next: "q41_help", log: "Q41錯: 這是電感在穩態時的特徵" },
                    { text: "C. 理想電壓源", next: "q41_help", log: "Q41錯: 它無法持續供電" },
                    { text: "D. 短路並消耗大量功率", next: "q41_help", log: "Q41錯: 電容不消耗實功率" }
                ]
            },
            "q41_help": {
                tag: "💊 救援任務：水缸裝滿了",
                text: "知識拆解：電容就像水缸，充飽電 (穩態) 之後，水就再也流不進去了。電流過不去，在電路中就等同於電線被剪斷。叫做什麼？",
                options: [
                    { text: "A. 開路 (斷線)", next: "q41", isCorrect: true },
                    { text: "B. 短路 (一條線)", next: "q41_help", log: "Q41救錯: 短路代表水流無限通暢，這是電感穩態的特性！" }
                ]
            },

            // --- 第 42 關：稽納二極體 ---
            "q42": {
                tag: "第 42 關：特殊二極體",
                text: "稽納二極體 (Zener Diode) 主要是設計在它的哪一個工作區域，用來作為「穩壓」用途？",
                options: [
                    { text: "A. 逆向崩潰區", next: "q43", isCorrect: true },
                    { text: "B. 順向導通區", next: "q42_help", log: "Q42錯: 順向時就像普通二極體" },
                    { text: "C. 逆向漏電流區", next: "q42_help", log: "Q42錯: 這區無法穩壓" },
                    { text: "D. 零偏壓區", next: "q42_help", log: "Q42錯: 沒通電不會動作" }
                ]
            },
            "q42_help": {
                tag: "💊 救援任務：絕處逢生",
                text: "知識拆解：普通二極體逆向崩潰會燒毀，但稽納二極體天生神力，它專門設計在「逆向」被高壓打穿時，兩端電壓能死守不變，達成穩壓！",
                options: [
                    { text: "A. 逆向崩潰區", next: "q42", isCorrect: true },
                    { text: "B. 順向導通區", next: "q42_help", log: "Q42救錯: 順向的時候它只會吃掉 0.7V，不能穩住高壓喔！" }
                ]
            },

            // --- 第 43 關：積分器 ---
            "q43": {
                tag: "第 43 關：運算放大器 OPA",
                text: "如果我們在 OPA 反相放大器的「負回授路徑」上（也就是從輸出端拉回輸入端的位置），接上一顆「電容器」，這個電路會變成什麼運算功能？",
                options: [
                    { text: "A. 積分器", next: "q44", isCorrect: true },
                    { text: "B. 微分器", next: "q43_help", log: "Q43錯: 微分器的電容是接在輸入端" },
                    { text: "C. 減法器", next: "q43_help", log: "Q43錯: 減法器只用電阻" },
                    { text: "D. 比較器", next: "q43_help", log: "Q43錯: 比較器不接回授元件" }
                ]
            },
            "q43_help": {
                tag: "💊 救援任務：累積的電容",
                text: "知識拆解：電容會把流過來的電流一點一滴「累積」起來變成電壓。在數學上，把東西隨時間累積起來的運算，就叫做？",
                options: [
                    { text: "A. 積分器", next: "q43", isCorrect: true },
                    { text: "B. 微分器", next: "q43_help", log: "Q43救錯: 如果電容裝在最前面的輸入端(擋住低頻)，那才是微分器喔！" }
                ]
            },

            // --- 第 44 關：電容標示 ---
            "q44": {
                tag: "第 44 關：儀表與量測",
                text: "一顆陶瓷電容上面印著數字「104」，請問這代表它的電容值是多少？",
                options: [
                    { text: "A. 0.1 μF", next: "q45", isCorrect: true },
                    { text: "B. 104 pF", next: "q44_help", log: "Q44錯: 最後一碼 4 代表有四個零" },
                    { text: "C. 10 μF", next: "q44_help", log: "Q44錯: 這是 106 的標示" },
                    { text: "D. 0.01 μF", next: "q44_help", log: "Q44錯: 這是 103 的標示" }
                ]
            },
            "q44_help": {
                tag: "💊 救援任務：密碼解碼",
                text: "知識拆解：這跟電阻色碼一樣！前兩碼是 10，最後一碼 4 代表加四個 0，單位是 pF ($10^{-12}$)。所以是 100000 pF。把它換算成 μF ($10^{-6}$)，要把小數點往前移 6 位。答案是？",
                options: [
                    { text: "A. 0.1 μF", next: "q44", isCorrect: true },
                    { text: "B. 104 pF", next: "q44_help", log: "Q44救錯: 第三碼是乘數(加幾個0)，不是直接唸 104 啦！" }
                ]
            },

            // 🏆 第 45 關：戴維寧消除電源 ---
            "q45": {
                tag: "🏆 最終關：網路定理",
                text: "最後一題大魔王！在求取「戴維寧等效電阻 (Rth)」時，必須將電路內部的電源「消除」。請問正確的消除方式為何？",
                options: [
                    { text: "A. 電壓源短路 (Short)；電流源開路 (Open)", next: "end", isCorrect: true },
                    { text: "B. 電壓源開路 (Open)；電流源短路 (Short)", next: "q45_help", log: "Q45錯: 完全搞反了" },
                    { text: "C. 全部短路", next: "q45_help", log: "Q45錯: 電流源短路會發生錯誤" },
                    { text: "D. 全部開路", next: "q45_help", log: "Q45錯: 電壓源開路會中斷電路" }
                ]
            },
            "q45_help": {
                tag: "💊 救援任務：讓它歸零",
                text: "知識拆解：要把電壓變成 0，就是把兩端接在一起 (短路)；要把電流變成 0，就是把電線剪斷不讓水流 (開路)。",
                options: [
                    { text: "A. 電壓源短路，電流源開路", next: "q45", isCorrect: true },
                    { text: "B. 電壓源開路，電流源短路", next: "q45_help", log: "Q45救錯: 記反了！電壓是短路(V=0)喔！" }
                ]
            }
        };
        // ==========================================
        // 系統變數與遊戲邏輯
        // ==========================================
        let studentName = "";
        let currentStep = "q1"; 
        let hp = 30; 
        let currentStreak = 0; 
        let diagnosticLogs = [];
        let sessionCards = []; 
        let failedQuestions = []; 
        let startTime = 0;           
        let totalTime = 0;           
        let rescueTriggered = 0;     
        let rescueFails = 0;
        let isTransitioning = false; 
        
        // 🚨 預設卡包改為第二階段 (phase2)
        let currentPackId = "phase2"; 

        // 確保網頁載入完成後才執行選單初始化
        document.addEventListener('DOMContentLoaded', () => {
            initPackSelector();
        });

        function initPackSelector() {
            const selector = document.getElementById('pack-selector');
            if (!selector) return;
            selector.innerHTML = '';
            Object.keys(cardPacks).forEach(key => {
                if (cardPacks[key].cards.length > 0) {
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            let inputName = document.getElementById('student-name').value.trim();
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            let inputName = document.getElementById('student-name').value.trim();
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            studentName = document.getElementById('student-name').value.trim();
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                btn.innerText = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            if (!cardPacks[currentPackId]) currentPackId = "phase1";
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';
        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            if(!scriptURL) return;
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData }).catch(e=>console.log(e));
        }

        async function syncCloudData() {
            let inputName = document.getElementById('student-name').value.trim();
           if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }
            if(!scriptURL) { alert("⚠️ 尚未設定 Google Sheet 網址，無法同步！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                // 💡 防護 1：在網址最後面加上時間戳記 (&t=...)，強迫瀏覽器每次都要去雲端抓最新資料，拒絕快取！
                let fetchUrl = scriptURL + "?name=" + encodeURIComponent(inputName) + "&t=" + new Date().getTime();
                let response = await fetch(fetchUrl, { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    // 💡 防護 2：智慧合併！不直接覆蓋，而是比對雲端與本地的卡片數量，永遠保留「數量最多」的紀錄！
                    let cloudData = JSON.parse(result.data);
                    let storageKey = "gachaCollection_" + inputName;
                    let localData = JSON.parse(localStorage.getItem(storageKey)) || [];

                    cloudData.forEach(cloudCard => {
                        let existing = localData.find(c => c.id === cloudCard.id);
                        if (existing) {
                            // 如果兩邊都有這張卡，取數量較多的 (避免被空的進度洗掉)
                            existing.count = Math.max(existing.count, cloudCard.count); 
                        } else {
                            // 本地沒有的卡，從雲端加進來
                            localData.push(cloudCard);
                        }
                    });

                    // 存回本地端
                    localStorage.setItem(storageKey, JSON.stringify(localData));
                    
                    alert("✅ 雲端同步成功！已為您載入最新圖鑑進度！\n(系統已自動比對並保留您的最高進度)");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
