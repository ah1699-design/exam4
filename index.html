        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                    { text: "所有的記憶體指令都可以拿來控制 I/O", next: "q9_help", log: "Q9錯: 必須用專用的指令" }
                ]
            },
            "q9_help": {
                tag: "🔍 PBL 詞意解析：門牌分開",
                text: "【解析任務】「獨立式」代表 I/O 的門牌號碼跟記憶體的門牌是完全分開、不重疊的。既然系統分開了，CPU 要去找 I/O 聊天時，就必須使用「專屬」的特定密語(指令)才能進去。這兩個指令是？",
                options: [
                    { text: "有專屬的 IN / OUT 指令", next: "q9", isCorrect: true },
                    { text: "佔用記憶體空間", next: "q9_help", log: "Q9救錯: 既然都叫「獨立式」了，它就不會去搶記憶體的地盤喔！" }
                ]
            },

            // 🛑 第 10 關：交通法規 (YouBike 酒駕)
            "q10": {
                tag: "🛑 第 10 關：大腦休息 (淡商交通日常)",
                text: "【情境】放學後你和同學去淡水老街聚餐，同學偷偷喝了兩瓶啤酒。為了省錢，他決定騎 YouBike 微笑單車回家。請問騎無動力的腳踏車酒駕，會觸犯法規嗎？",
                options: [
                    { text: "會，腳踏車屬於慢車，酒駕一樣會被警察開罰單", next: "q11", isCorrect: true },
                    { text: "不會，因為腳踏車沒有引擎，不算機動車輛", next: "q10_help", log: "Q10錯: 慢車酒駕現在有明確罰則" },
                    { text: "不會，只要慢慢騎在人行道上就好", next: "q10_help", log: "Q10錯: 騎腳踏車酒駕非常危險" },
                    { text: "會，而且會直接被吊銷機車駕照", next: "q10_help", log: "Q10錯: 腳踏車酒駕罰鍰，但一般不會直接吊銷別種駕照" }
                ]
            },
            "q10_help": {
                tag: "🚔 PBL 法規檢索：慢車酒駕罰則",
                text: "【檢索任務】請上網搜尋「腳踏車 酒駕 罰款」。根據道路交通管理處罰條例，慢車(含腳踏車)駕駛人酒測值超標，依然會被處以新臺幣 1200 元至 2400 元罰鍰，拒測罰 4800 元！",
                options: [
                    { text: "會，腳踏車酒駕依法開罰", next: "q10", isCorrect: true },
                    { text: "不會，因為沒有引擎", next: "q10_help", log: "Q10救錯: 腳踏車酒駕一樣會害人害己，警察是真的會開單的！" }
                ]
            },

            // --- 第 11 關：堆疊特性 ---
            "q11": {
                tag: "第 11 關：記憶體結構",
                text: "微處理機在執行呼叫副程式 (CALL) 或中斷時，會使用「堆疊 (Stack)」來保存返回位址。請問堆疊的資料存取原則是什麼？",
                options: [
                    { text: "先進後出 (FILO) / 後進先出 (LIFO)", next: "q12", isCorrect: true },
                    { text: "先進先出 (FIFO)", next: "q11_help", log: "Q11錯: 這是佇列 (Queue) 的特性" },
                    { text: "隨機存取 (Random Access)", next: "q11_help", log: "Q11錯: 堆疊只能從頂端存取" },
                    { text: "循序存取 (Sequential Access)", next: "q11_help", log: "Q11錯: 這是磁帶的特性" }
                ]
            },
            "q11_help": {
                tag: "🧠 PBL 邏輯推演：疊盤子",
                text: "【推演任務】想像你在洗盤子，洗好的盤子一個一個往上疊 (Push)。當你要拿盤子來用的時候 (Pop)，你一定會從「最上面、最後放上去」的那一個開始拿。這種原則英文縮寫是 LIFO，中文是？",
                options: [
                    { text: "後進先出 (LIFO)", next: "q11", isCorrect: true },
                    { text: "先進先出 (FIFO)", next: "q11_help", log: "Q11救錯: 先進先出是排隊買便當 (Queue)，堆疊是疊盤子喔！" }
                ]
            },

            // --- 第 12 關：組合語言 假指令 ---
            "q12": {
                tag: "第 12 關：組合語言",
                text: "在組合語言中，有一種指令是用來「告訴組譯器如何分配記憶體或設定起始位址」，它在翻譯後『不會』產生任何機器碼給 CPU 執行。這種指令稱為？",
                options: [
                    { text: "虛擬指令 (Pseudo-code) 或 假指令", next: "q13", isCorrect: true },
                    { text: "巨集指令 (Macro)", next: "q12_help", log: "Q12錯: 巨集展開後會產生機器碼" },
                    { text: "算術邏輯指令", next: "q12_help", log: "Q12錯: 這絕對會產生機器碼" },
                    { text: "跳躍指令 (JMP)", next: "q12_help", log: "Q12錯: 這是控制流程的實體指令" }
                ]
            },
            "q12_help": {
                tag: "📖 PBL 翻書任務：不是給 CPU 看的",
                text: "【查閱任務】如 ORG、EQU、END 這些指令，只是寫程式的人在跟「組譯軟體」溝通，CPU 根本不知道有這些東西存在。因為它不是真正的指令，所以被稱為？",
                options: [
                    { text: "虛擬指令 (假指令)", next: "q12", isCorrect: true },
                    { text: "巨集指令", next: "q12_help", log: "Q12救錯: 巨集只是把很多行程式包裝起來，它最後還是會變成機器碼喔！" }
                ]
            },

            // --- 第 13 關：定址法 ---
            "q13": {
                tag: "第 13 關：組合語言定址",
                text: "在 8086 組合語言中，指令 `MOV AX, 4BH` 代表將數值 4BH 直接存入 AX 暫存器中。請問這是使用了哪一種定址法？",
                options: [
                    { text: "立即定址法 (Immediate Addressing)", next: "q14", isCorrect: true },
                    { text: "直接定址法 (Direct Addressing)", next: "q13_help", log: "Q13錯: 直接定址是給一個記憶體門牌號碼，沒有加括號的話在某些語法才是" },
                    { text: "暫存器間接定址法", next: "q13_help", log: "Q13錯: 這需要用 [BX] 這種形式" },
                    { text: "索引定址法", next: "q13_help", log: "Q13錯: 這需要使用 SI 或 DI 暫存器" }
                ]
            },
            "q13_help": {
                tag: "🔍 PBL 詞意解析：馬上拿現金",
                text: "【解析任務】指令後面的 4BH 不是門牌號碼，而是白花花的「數值現金」。CPU 解碼後「立刻、馬上」就能拿到資料，不用再去記憶體翻找。這叫什麼定址法？",
                options: [
                    { text: "立即定址法", next: "q13", isCorrect: true },
                    { text: "直接定址法", next: "q13_help", log: "Q13救錯: 直接定址法是給「地址」，還要跑一趟記憶體，沒有這麼快喔！" }
                ]
            },

            // --- 第 14 關：堆疊 PUSH POP ---
            "q14": {
                tag: "第 14 關：組合語言操作",
                text: "若執行以下程式碼：`PUSH A`, `PUSH B`, `PUSH C`。接著執行兩次 `POP` 動作。請問最後從堆疊中被取出來 (POP) 的資料是哪一個？",
                options: [
                    { text: "B", next: "q15", isCorrect: true },
                    { text: "A", next: "q14_help", log: "Q14錯: A 被壓在最底層，要 POP 三次才拿得到" },
                    { text: "C", next: "q14_help", log: "Q14錯: 這是第一次 POP 出來的東西" },
                    { text: "都會被拿出來", next: "q14_help", log: "Q14錯: 只有執行兩次 POP" }
                ]
            },
            "q14_help": {
                tag: "🛠️ PBL 邏輯推演：畫圖解題",
                text: "【推演任務】拿張紙畫一個深井！依序把 A 丟進去，再把 B 丟進去，最後把 C 丟進去(C在最上面)。第一次 POP 會拿出 C。那「第二次」POP 會拿出誰呢？",
                options: [
                    { text: "B", next: "q14", isCorrect: true },
                    { text: "A", next: "q14_help", log: "Q14救錯: A 在最下面，你只 POP 兩次是挖不到 A 的喔！" }
                ]
            },

            // 🛑 第 15 關：交通法規 (微型電動二輪車)
            "q15": {
                tag: "🛑 第 15 關：大腦休息 (淡商交通日常)",
                text: "【情境】很多高中生沒有機車駕照，會選擇騎乘「微型電動二輪車」(以前俗稱的電動自行車，最高時速 25km/h 以下) 往返淡水商工。根據最新法規，騎乘這類車輛必須遵守什麼新規定？",
                options: [
                    { text: "需滿 14 歲，且車輛必須掛牌、投保強制險並配戴安全帽", next: "q16", isCorrect: true },
                    { text: "完全不需駕照也不限年齡，誰都可以騎", next: "q15_help", log: "Q15錯: 現在有嚴格年齡與掛牌限制了" },
                    { text: "不需要戴安全帽，但不能載人", next: "q15_help", log: "Q15錯: 沒戴安全帽會被重罰" },
                    { text: "必須考取普通重型機車駕照才能騎", next: "q15_help", log: "Q15錯: 微電車目前免考駕照，只需年齡限制與掛牌" }
                ]
            },
            "q15_help": {
                tag: "🚔 PBL 法規檢索：納管新制",
                text: "【檢索任務】為了改善交通亂象，法規在近年已經大改版！現在這些微型電動車不能隨便買來就騎，必須要「掛上車牌」、「買保險」，而且騎車的人一定要戴安全帽，且年紀不能太小(國中生以上)。",
                options: [
                    { text: "需掛牌、保險、戴安全帽並滿14歲", next: "q15", isCorrect: true },
                    { text: "必須考取機車駕照", next: "q15_help", log: "Q15救錯: 它之所以受學生歡迎，就是因為它「免考駕照」，但其他安全規定都要遵守！" }
                ]
            },

            // --- 第 16 關：位元運算 ---
            "q16": {
                tag: "第 16 關：邏輯指令",
                text: "若暫存器 AL = 11001011 (CBH)，我們想把它的前 4 個 bit 變成 0000，且保留後 4 個 bit 不變，應該使用哪一種邏輯指令與遮罩？",
                options: [
                    { text: "AND AL, 0FH", next: "q17", isCorrect: true },
                    { text: "OR AL, 0FH", next: "q16_help", log: "Q16錯: OR 會把後 4 個 bit 強制變成 1111" },
                    { text: "AND AL, F0H", next: "q16_help", log: "Q16錯: 這會保留前 4 個，把後 4 個變 0" },
                    { text: "XOR AL, 0FH", next: "q16_help", log: "Q16錯: 這會把後 4 個 bit 反相" }
                ]
            },
            "q16_help": {
                tag: "🧠 PBL 邏輯推演：殺手與護盾",
                text: "【推演任務】在邏輯運算中，`AND 0` 就像殺手，會把任何東西變成 0；`AND 1` 就像護盾，會把原本的東西完整保留下來。我們想要「前 4 個變 0，後 4 個保留」，遮罩應該是 00001111。換成十六進位是？",
                options: [
                    { text: "AND AL, 0FH", next: "q16", isCorrect: true },
                    { text: "AND AL, F0H", next: "q16_help", log: "Q16救錯: F0H 是 11110000，這會把後面的資料殺光光喔！" }
                ]
            },

            // --- 第 17 關：通訊模式 ---
            "q17": {
                tag: "第 17 關：資料通訊",
                text: "警察伯伯使用的「無線電對講機」，按下去可以講話但不能聽，放開按鈕才能聽到對方的聲音。這種「同一時間只能單向傳輸，但雙方可以輪流」的通訊方式稱為？",
                options: [
                    { text: "半雙工 (Half-duplex)", next: "q18", isCorrect: true },
                    { text: "單工 (Simplex)", next: "q17_help", log: "Q17錯: 單工是永遠只能單向，像廣播電台" },
                    { text: "全雙工 (Full-duplex)", next: "q17_help", log: "Q17錯: 這是講電話，可以同時互罵" },
                    { text: "多工 (Multiplex)", next: "q17_help", log: "Q17錯: 這是把多個訊號擠在一條線上的技術" }
                ]
            },
            "q17_help": {
                tag: "🔍 PBL 詞意解析：橋上的會車",
                text: "【解析任務】想像一座很窄的橋。車子可以過去，也可以過來，但是「不能同時」雙向通車，必須輪流。這種只有「一半」功能的雙向溝通，叫做什麼？",
                options: [
                    { text: "半雙工 (Half-duplex)", next: "q17", isCorrect: true },
                    { text: "全雙工 (Full-duplex)", next: "q17_help", log: "Q17救錯: 全雙工就像我們打 LINE 電話，兩個人可以同時講話喔！" }
                ]
            },

            // --- 第 18 關：傳輸介面 ---
            "q18": {
                tag: "第 18 關：資料通訊",
                text: "下列哪一種傳輸介面是電腦內部硬碟最常使用的「串列傳輸介面」，且具有熱插拔的特性？",
                options: [
                    { text: "SATA", next: "q19", isCorrect: true },
                    { text: "PATA (IDE)", next: "q18_help", log: "Q18錯: 這是早期的排線並列傳輸，沒有熱插拔" },
                    { text: "Centronics", next: "q18_help", log: "Q18錯: 這是早期的印表機並列介面" },
                    { text: "IEEE-488 (GPIB)", next: "q18_help", log: "Q18錯: 這是儀表專用的並列介面" }
                ]
            },
            "q18_help": {
                tag: "📖 PBL 翻書任務：S 開頭的意義",
                text: "【查閱任務】以前硬碟用的是很大一條扁平排線叫 ATA (並列)。後來改成細細的一條線，速度超快，叫做 Serial ATA (串列 ATA)。它的簡寫是？",
                options: [
                    { text: "SATA", next: "q18", isCorrect: true },
                    { text: "PATA", next: "q18_help", log: "Q18救錯: PATA 的 P 就是 Parallel (並列)，速度比較慢而且線很粗喔！" }
                ]
            },

            // --- 第 19 關：通訊計算 ---
            "q19": {
                tag: "第 19 關：通訊速度計算",
                text: "若一個 RS-232 介面的傳輸速度設為 9600 bps。假設資料格式包含 1 個起始位元、8 個資料位元、1 個結束位元 (沒有同位元)，傳送「一個字元」共需 10 bits。請問 1 秒鐘最多可以傳送幾個字元 (Bytes)？",
                options: [
                    { text: "960 個", next: "q20", isCorrect: true },
                    { text: "1200 個", next: "q19_help", log: "Q19錯: 這是把 9600 除以 8，沒算到頭尾包裝" },
                    { text: "9600 個", next: "q19_help", log: "Q19錯: 這是 bit 的數量，不是 byte 的數量" },
                    { text: "96 個", next: "q19_help", log: "Q19錯: 少算了一個零" }
                ]
            },
            "q19_help": {
                tag: "🛠️ PBL 邏輯推演：包裹的重量",
                text: "【推演任務】傳輸線一秒鐘可以送出 9600 個小零件 (bits)。因為每個完整的「包裹(字元)」是由 10 個小零件組裝成的。請問 9600 除以 10 是多少個包裹？",
                options: [
                    { text: "960 個", next: "q19", isCorrect: true },
                    { text: "1200 個", next: "q19_help", log: "Q19救錯: 不能只除以裡面的 8 個資料位元，外面的紙箱跟膠帶 (起始/結束位元) 也是要佔體積的！" }
                ]
            },

            // 🛑 第 20 關：交通法規 (輕軌路權)
            "q20": {
                tag: "🛑 第 20 關：大腦休息 (淡商交通日常)",
                text: "【情境】搭乘淡海輕軌上下學是很多淡水商工學生的日常。當你騎車行經淡金路，遇到輕軌軌道與一般道路的「共用路口」時，根據法規，哪一種交通工具有「絕對優先通行權」？",
                options: [
                    { text: "大眾捷運系統 (輕軌車輛)", next: "q21", isCorrect: true },
                    { text: "直行的一般汽機車", next: "q20_help", log: "Q20錯: 輕軌路權高於一般車輛" },
                    { text: "先到路口的車輛先走", next: "q20_help", log: "Q20錯: 輕軌沒有在看先來後到的" },
                    { text: "兩邊都要停下來等行人走完才能走", next: "q20_help", log: "Q20錯: 輕軌不會停下來等你" }
                ]
            },
            "q20_help": {
                tag: "🚔 PBL 法規檢索：絕對路權",
                text: "【檢索任務】為了確保大眾運輸的安全與順暢，大眾捷運法與交通法規賦予了輕軌列車在共用路口「絕對的優先權」。不管你是直行還是轉彎，只要輕軌來了，連紅綠燈都會配合它變燈，你只能乖乖讓它！",
                options: [
                    { text: "大眾捷運系統 (輕軌)", next: "q20", isCorrect: true },
                    { text: "直行的汽機車", next: "q20_help", log: "Q20救錯: 敢跟輕軌搶路權，不僅會吃天價罰單，撞上去連賠都賠不完喔！" }
                ]
            },

            // --- 第 21 關：中斷機制 ---
            "q21": {
                tag: "第 21 關：I/O 控制",
                text: "當 I/O 裝置準備好資料時，「主動」向 CPU 發出訊號請求服務，CPU 會暫停手邊工作去處理，處理完再回來繼續。這種有效率的 I/O 控制方式稱為？",
                options: [
                    { text: "中斷式 I/O (Interrupt I/O)", next: "q22", isCorrect: true },
                    { text: "輪詢式 I/O (Polling I/O)", next: "q21_help", log: "Q21錯: 輪詢是 CPU 不斷去問裝置好了沒，很浪費時間" },
                    { text: "交握式 (Handshake)", next: "q21_help", log: "Q21錯: 這是雙方傳資料時互相打招呼的協定" },
                    { text: "記憶體映像式 I/O", next: "q21_help", log: "Q21錯: 這是位址的規劃方式，不是控制流程" }
                ]
            },
            "q21_help": {
                tag: "🧠 PBL 邏輯推演：被動的服務生",
                text: "【推演任務】輪詢(Polling)就像服務生每 10 秒跑來問你「點好餐了嗎」，很煩又浪費體力。另一種方法是：你點好餐後「按桌上的服務鈴」，把服務生「打斷」叫過來。這叫做什麼式？",
                options: [
                    { text: "中斷式 (Interrupt)", next: "q21", isCorrect: true },
                    { text: "輪詢式 (Polling)", next: "q21_help", log: "Q21救錯: 輪詢式是 CPU 一直主動去問，效率是最低的喔！" }
                ]
            },

            // --- 第 22 關：DMA 特性 ---
            "q22": {
                tag: "第 22 關：DMA 傳輸",
                text: "當硬碟有超大量的高畫質影片資料要寫入主記憶體時，為了不讓 CPU 忙死，會請出一個代理人，讓硬碟跟記憶體「直接溝通、直接存取」。這種技術的縮寫是？",
                options: [
                    { text: "DMA (Direct Memory Access)", next: "q23", isCorrect: true },
                    { text: "INTR (Interrupt Request)", next: "q22_help", log: "Q22錯: 中斷還是需要 CPU 親自搬運資料" },
                    { text: "NMI (Non-Maskable Interrupt)", next: "q22_help", log: "Q22錯: 這是用來處理停電等緊急狀況的中斷" },
                    { text: "ISR (Interrupt Service Routine)", next: "q22_help", log: "Q22錯: 這是中斷服務程式" }
                ]
            },
            "q22_help": {
                tag: "🔍 PBL 詞意解析：縮寫還原",
                text: "【解析任務】直接 (Direct) 記憶體 (Memory) 存取 (Access)。把這三個英文字的字首拼起來，就是這項能繞過 CPU 直接搬磚的神奇技術！",
                options: [
                    { text: "DMA", next: "q22", isCorrect: true },
                    { text: "INTR", next: "q22_help", log: "Q22救錯: 中斷(INTR)每次只搬一個 byte 就會煩 CPU 一次，大量資料傳輸必須靠 DMA！" }
                ]
            },

            // --- 第 23 關：DMA IC 8237 ---
            "q23": {
                tag: "第 23 關：周邊晶片",
                text: "在傳統的 IBM PC 架構中，負責掌控剛剛提到的「直接記憶體存取 (DMA)」大權的經典控制晶片，其編號是？",
                options: [
                    { text: "8237", next: "q24", isCorrect: true },
                    { text: "8259", next: "q23_help", log: "Q23錯: 8259 是中斷控制器" },
                    { text: "8255", next: "q23_help", log: "Q23錯: 8255 是可程式化並列 I/O 晶片" },
                    { text: "8251", next: "q23_help", log: "Q23錯: 8251 是串列通訊晶片 (UART)" }
                ]
            },
            "q23_help": {
                tag: "📖 PBL 翻書任務：統測必背晶片",
                text: "【查閱任務】微處理機有「三大經典輔助晶片」必考。8255 負責並列，8259 負責處理中斷插隊。負責當 CPU 代理人搬大量資料的 DMA 晶片，尾數是 7。是哪一顆？",
                options: [
                    { text: "8237", next: "q23", isCorrect: true },
                    { text: "8259", next: "q23_help", log: "Q23救錯: 8259 是專門處理別人按服務鈴 (中斷) 的總管喔！" }
                ]
            },

            // --- 第 24 關：中斷優先權 ---
            "q24": {
                tag: "第 24 關：中斷控制器",
                text: "承上題，如果同時有好幾個周邊裝置向 8259A (中斷控制器) 發出求救訊號，8259A 預設會優先處理哪一個腳位的請求？",
                options: [
                    { text: "IR0 (第 0 號接腳)", next: "q25", isCorrect: true },
                    { text: "IR7 (第 7 號接腳)", next: "q24_help", log: "Q24錯: 數字越大的預設優先權越低" },
                    { text: "隨機處理", next: "q24_help", log: "Q24錯: 8259A 是一個非常有紀律的仲裁者" },
                    { text: "最後發出請求的", next: "q24_help", log: "Q24錯: 不會看先來後到，看腳位編號" }
                ]
            },
            "q24_help": {
                tag: "🛠️ PBL 邏輯推演：數字越小越偉大",
                text: "【推演任務】在電腦硬體的世界裡，編號通常是從 0 開始排。0 號就像是大師兄，擁有絕對的最高優先權 (通常接系統計時器)。所以誰最大？",
                options: [
                    { text: "IR0", next: "q24", isCorrect: true },
                    { text: "IR7", next: "q24_help", log: "Q24救錯: 7 號是小老弟，要等前面的大哥都處理完才輪得到他喔！" }
                ]
            },

            // 🛑 第 25 關：交通法規 (山路會車)
            "q25": {
                tag: "🛑 第 25 關：大腦休息 (淡商交通日常)",
                text: "【情境】淡水商工位在山坡上。假設你騎著腳踏車上山，在狹窄且沒有劃設車道線的陡坡處，剛好遇到另一輛腳踏車要下山。路太窄無法同時通過，根據法規，誰必須讓誰？",
                options: [
                    { text: "下坡車 必須讓 上坡車 先行", next: "q26", isCorrect: true },
                    { text: "上坡車 必須讓 下坡車 先行", next: "q25_help", log: "Q25錯: 剛好相反，上坡起步困難" },
                    { text: "體積大的車 讓 體積小的車", next: "q25_help", log: "Q25錯: 法規是依據上下坡判斷，不是體積" },
                    { text: "先按喇叭的人先走", next: "q25_help", log: "Q25錯: 這是逼車行為了" }
                ]
            },
            "q25_help": {
                tag: "🚔 PBL 法規檢索：體諒起步的困難",
                text: "【檢索任務】請想像一下物理原理。上坡車如果停下來，要重新起步非常吃力，甚至可能會向後滑。下坡車有地心引力幫忙，踩煞車停下來比較容易。所以法規規定是誰要讓誰？",
                options: [
                    { text: "下坡車 讓 上坡車", next: "q25", isCorrect: true },
                    { text: "上坡車 讓 下坡車", next: "q25_help", log: "Q25救錯: 叫上坡車停下來，他等一下就騎不上去啦！" }
                ]
            },

            // --- 第 26 關：記憶體揮發性 ---
            "q26": {
                tag: "第 26 關：記憶體特性",
                text: "電腦裡的主記憶體 (RAM) 有一個致命的弱點：只要一停電或把插頭拔掉，裡面儲存的資料就會瞬間完全消失。這種特性稱為什麼？",
                options: [
                    { text: "揮發性 (Volatile)", next: "q27", isCorrect: true },
                    { text: "非揮發性 (Non-volatile)", next: "q26_help", log: "Q26錯: 這是 ROM 或隨身碟的特性" },
                    { text: "唯讀性 (Read-only)", next: "q26_help", log: "Q26錯: RAM 是可讀可寫的" },
                    { text: "循序性 (Sequential)", next: "q26_help", log: "Q26錯: RAM 是隨機存取的" }
                ]
            },
            "q26_help": {
                tag: "🔍 PBL 詞意解析：像酒精一樣蒸發",
                text: "【解析任務】就像把酒精倒在桌上，時間一到它就蒸發不見了。記憶體只要失去電力的滋潤，資料就會像這樣不見。這個名詞是？",
                options: [
                    { text: "揮發性", next: "q26", isCorrect: true },
                    { text: "非揮發性", next: "q26_help", log: "Q26救錯: ROM (唯讀記憶體) 才是不會揮發的，斷電資料還在！" }
                ]
            },

            // --- 第 27 關：SRAM vs DRAM ---
            "q27": {
                tag: "第 27 關：RAM 的種類",
                text: "主記憶體 DRAM (動態隨機存取記憶體) 的儲存單元是利用「極微小的電容器」來記憶 0 和 1。因為電容器會漏電，所以它必須依靠什麼動作來維持資料不消失？",
                options: [
                    { text: "每隔幾毫秒就必須 更新/刷新 (Refresh) 一次充電", next: "q28", isCorrect: true },
                    { text: "接上一顆水銀電池", next: "q27_help", log: "Q27錯: 這救不了 DRAM，這是早期 CMOS 存 BIOS 設定的作法" },
                    { text: "放在極低溫的環境中", next: "q27_help", log: "Q27錯: 降溫能減緩漏電，但仍需刷新" },
                    { text: "寫入時使用紫外線照射", next: "q27_help", log: "Q27錯: 這是清除 EPROM 資料的方法" }
                ]
            },
            "q27_help": {
                tag: "🧠 PBL 邏輯推演：漏水的破水桶",
                text: "【推演任務】DRAM 就像一個底部有破洞的水桶 (微小電容)。如果水桶有水代表 1，沒水代表 0。因為水一直漏，你要怎麼確保代表 1 的水桶不會變成 0？當然是派人一直不斷去「補水」！這個動作叫？",
                options: [
                    { text: "不斷更新/刷新 (Refresh)", next: "q27", isCorrect: true },
                    { text: "接上水銀電池", next: "q27_help", log: "Q27救錯: 水銀電池撐不住 DRAM 這麼龐大的漏電量啦！" }
                ]
            },

            // --- 第 28 關：SRAM 速度 ---
            "q28": {
                tag: "第 28 關：快取記憶體",
                text: "因為 DRAM 必須一直停下來補水 (Refresh)，速度太慢跟不上 CPU。所以 CPU 內部會內建一種用「正反器 (Flip-Flop)」製作、不用充電、速度極快但造價昂貴的記憶體來當作快取 (Cache)。它是什麼？",
                options: [
                    { text: "SRAM (靜態隨機存取記憶體)", next: "q29", isCorrect: true },
                    { text: "EEPROM", next: "q28_help", log: "Q28錯: 這是用電氣清除的唯讀記憶體，寫入極慢" },
                    { text: "Flash Memory (快閃記憶體)", next: "q28_help", log: "Q28錯: 雖然叫快閃，但其實比 RAM 慢很多" },
                    { text: "硬碟 (HDD)", next: "q28_help", log: "Q28錯: 這是最慢的輔助記憶體" }
                ]
            },
            "q28_help": {
                tag: "📖 PBL 翻書任務：靜與動的對決",
                text: "【查閱任務】DRAM 的 D 代表 Dynamic (動態)，因為水一直漏一直補，很忙碌。另一種用電晶體做的，只要通電資料就穩如泰山死死抓住的，S 代表 Static (靜態)。它是？",
                options: [
                    { text: "SRAM", next: "q28", isCorrect: true },
                    { text: "Flash Memory", next: "q28_help", log: "Q28救錯: Flash 是隨身碟用的，雖然也不會掉資料，但速度遠遠跟不上 CPU 喔！" }
                ]
            },

            // --- 第 29 關：固態硬碟 ---
            "q29": {
                tag: "第 29 關：輔助記憶體",
                text: "近年來，傳統利用磁盤旋轉的笨重硬碟 (HDD)，逐漸被輕薄、抗震、速度飛快的「固態硬碟 (SSD)」取代。請問 SSD 主要是使用哪一種記憶體晶片來儲存資料？",
                options: [
                    { text: "Flash Memory (快閃記憶體)", next: "q30", isCorrect: true },
                    { text: "SRAM", next: "q29_help", log: "Q29錯: SRAM 斷電資料就沒了，不能當硬碟" },
                    { text: "DRAM", next: "q29_help", log: "Q29錯: DRAM 斷電資料也會消失" },
                    { text: "ROM", next: "q29_help", log: "Q29錯: ROM 不能自由快速的寫入新檔案" }
                ]
            },
            "q29_help": {
                tag: "🛠️ PBL 邏輯推演：隨身碟的進化版",
                text: "【推演任務】其實 SSD 的底層技術，就跟我們掛在鑰匙圈上的「隨身碟」一模一樣，只是晶片裝得更多、控制器更強而已。隨身碟使用的那種不怕斷電、又可以重複擦寫的晶片叫什麼？",
                options: [
                    { text: "Flash Memory (快閃記憶體)", next: "q29", isCorrect: true },
                    { text: "SRAM", next: "q29_help", log: "Q29救錯: SRAM 是 CPU 裡面的超級 VIP 記憶體，貴到不可能拿來存好幾 GB 的遊戲啦！" }
                ]
            },

            // 🛑 第 30 關：交通法規 (考照年齡)
            "q30": {
                tag: "🛑 第 30 關：大腦休息 (淡商交通日常)",
                text: "【情境】淡水商工三年級的同學，很多人滿懷期待地準備考取人生第一張駕照。請問根據台灣法規，必須年滿幾歲才能報考「普通重型機車」(也就是大家常騎的 125cc 白牌機車) 駕照？",
                options: [
                    { text: "滿 18 歲", next: "q31", isCorrect: true },
                    { text: "滿 16 歲", next: "q30_help", log: "Q30錯: 16歲還不能考駕照" },
                    { text: "滿 20 歲", next: "q30_help", log: "Q30錯: 以前民法成年的年紀，但駕照 18 歲就能考" },
                    { text: "沒有年齡限制，只要會騎腳踏車就可以", next: "q30_help", log: "Q30錯: 這絕對違法，無照駕駛罰超重" }
                ]
            },
            "q30_help": {
                tag: "🚔 PBL 法規檢索：成年的禮物",
                text: "【檢索任務】在台灣，高三學生最期待的生日禮物就是去監理站考駕照。不管是汽車還是普通重型機車，都必須跨過這個法定的「成年」門檻才能報考。是幾歲呢？",
                options: [
                    { text: "滿 18 歲", next: "q30", isCorrect: true },
                    { text: "滿 20 歲", next: "q30_help", log: "Q30救錯: 20 歲是考大型重機 (黃牌/紅牌) 的門檻喔，普通的白牌 18 歲就可以了！" }
                ]
            },

            // --- 第 31 關：組合語言 MOV ---
            "q31": {
                tag: "第 31 關：組合語言指令",
                text: "在 8086 組合語言中，哪一個指令的作用是「將資料進行複製、搬移」？（例如把暫存器 A 的資料複製給暫存器 B）",
                options: [
                    { text: "MOV", next: "q32", isCorrect: true },
                    { text: "ADD", next: "q31_help", log: "Q31錯: 這是做加法" },
                    { text: "SUB", next: "q31_help", log: "Q31錯: 這是做減法" },
                    { text: "INC", next: "q31_help", log: "Q31錯: 這是把自己加一 (+1)" }
                ]
            },
            "q31_help": {
                tag: "🔍 PBL 詞意解析：移動的英文",
                text: "【解析任務】組合語言的指令都是英文單字的縮寫。要把資料從甲地「移動」到乙地，英文的 Move 縮寫成三個字母，就是這個最經典的指令！",
                options: [
                    { text: "MOV", next: "q31", isCorrect: true },
                    { text: "ADD", next: "q31_help", log: "Q31救錯: ADD 是 Add (加) 的縮寫，用來算數學的喔！" }
                ]
            },

            // --- 第 32 關：旗標暫存器 ZF ---
            "q32": {
                tag: "第 32 關：CPU 狀態旗標",
                text: "當 CPU 執行算術運算 (例如 SUB 相減指令) 後，若「運算的最終結果恰好等於 0」，則 CPU 內的哪一個狀態旗標會被舉起 (設定為 1)？",
                options: [
                    { text: "ZF (Zero Flag, 零旗標)", next: "q33", isCorrect: true },
                    { text: "CF (Carry Flag, 進位旗標)", next: "q32_help", log: "Q32錯: 這是運算超出邊界產生進位或借位時用的" },
                    { text: "SF (Sign Flag, 符號旗標)", next: "q32_help", log: "Q32錯: 這是看結果是正數還是負數的" },
                    { text: "OF (Overflow Flag, 溢位旗標)", next: "q32_help", log: "Q32錯: 這是發生二補數溢位錯誤時用的" }
                ]
            },
            "q32_help": {
                tag: "🧠 PBL 邏輯推演：顧名思義",
                text: "【推演任務】這題根本是送分題！當結果變成「零 (Zero)」的時候，專門負責監視「零」的旗標就會發出警報 (變成 1)。英文字母縮寫是？",
                options: [
                    { text: "ZF (零旗標)", next: "q32", isCorrect: true },
                    { text: "SF (符號旗標)", next: "q32_help", log: "Q32救錯: SF 是在看最高位元，用來判斷答案是正的還是負的喔！" }
                ]
            },

            // --- 第 33 關：移位乘法 ---
            "q33": {
                tag: "第 33 關：二進位運算",
                text: "在微處理機中，若我們對一個暫存器內的二進位數值執行一次「向左移 1 位 (SHL)」的動作，且沒有發生溢位。在數學上，這個數值的變化等同於？",
                options: [
                    { text: "乘以 2", next: "q34", isCorrect: true },
                    { text: "除以 2", next: "q33_help", log: "Q33錯: 這是向右移位 (SHR) 的結果" },
                    { text: "加上 2", next: "q33_help", log: "Q33錯: 移位是倍數關係，不是加法" },
                    { text: "變成 2 的次方", next: "q33_help", log: "Q33錯: 不是自己平方" }
                ]
            },
            "q33_help": {
                tag: "🛠️ PBL 邏輯推演：進位的奧秘",
                text: "【推演任務】在十進位裡，把 5「向左移一位」後面補 0，變成 50，就是乘以 10。在「二進位」裡，底數是 2。所以把數字往左邊推一格，就等同於乘上它的底數。也就是乘以？",
                options: [
                    { text: "乘以 2", next: "q33", isCorrect: true },
                    { text: "除以 2", next: "q33_help", log: "Q33救錯: 向右移位 (數值變小) 才是除以 2 喔！" }
                ]
            },

            // --- 第 34 關：多核心架構 ---
            "q34": {
                tag: "第 34 關：多核心處理器",
                text: "現代電腦常標榜「雙核心」、「四核心」甚至「八核心」。請問「多核心微處理機」的本質是什麼？",
                options: [
                    { text: "將多個獨立的運算核心 (ALU+CU) 封裝在『同一個』CPU 實體晶片中", next: "q35", isCorrect: true },
                    { text: "在一塊主機板上，插上好幾顆獨立的 CPU 晶片", next: "q34_help", log: "Q34錯: 這是『多處理機 (Multi-Processor)』系統，不是多核心" },
                    { text: "利用網路把全世界的電腦連起來一起算", next: "q34_help", log: "Q34錯: 這是分散式運算或雲端運算" },
                    { text: "加大單一 CPU 的時脈頻率到好幾倍", next: "q34_help", log: "Q34錯: 這是超頻，核心數還是只有一個" }
                ]
            },
            "q34_help": {

                options: [
                    { text: "多個核心封裝在同一個晶片中", next: "q34", isCorrect: true },
                    { text: "主機板上插好幾顆 CPU 晶片", next: "q34_help", log: "Q34救錯: 主機板插很多顆 CPU 的那叫伺服器級的「多處理機」系統喔！" }
                ]
            },

            // 🛑 第 35 關：交通法規 (大型車視線死角)
            "q35": {
                tag: "🛑 第 35 關：大腦休息 (淡商交通日常)",
                text: "【情境】放學時，淡水市區車流繁忙，有許多大客車與聯結車。騎腳踏車或機車時，絕對不能跟這些大型車輛併行轉彎，因為它們有致命的「內輪差」與「視線死角」。請問何謂內輪差？",
                options: [
                    { text: "轉彎時，車輛『後輪』往內側偏移的軌跡，比前輪更靠近人行道", next: "q36", isCorrect: true },

                    { text: "轉彎時，車尾會往外側大甩尾", next: "q35_help", log: "Q35錯: 這是外輪差，內輪差是往內捲" }
                ]
            },
            "q35_help": {

                text: "【檢索任務】請回想宣導影片。大車轉彎時，前輪雖然過了，但因為車身很長，後輪會切西瓜「向內側偏移」。很多機車騎士以為車頭過了就安全，結果被後輪捲進去！這就是？",
                options: [
                    { text: "後輪軌跡向內側偏移", next: "q35", isCorrect: true },
                    { text: "車尾向外側大甩尾", next: "q35_help", log: "Q35救錯: 外甩的是車尾，但最危險會把人捲進車底的是往內側切的「後輪」喔！" }

            // --- 第 36 關：位址解碼器 ---
            "q36": {
                tag: "第 36 關：位址解碼",
                text: "在微電腦系統中，為了喚醒特定位置的記憶體晶片，我們常會使用「74138 (3對8解碼器)」。若 74138 的輸入端 C, B, A 給予訊號 1, 0, 1，請問哪一個輸出腳位 (Y0~Y7) 會產生低電位動作？",
                options: [

                text: "【推演任務】解碼器就像個翻譯機。輸入端 CBA (1, 0, 1) 代表一個二進位數字 $101_2$。請把 101 換算成十進位：$1 \\times 4 + 0 \\times 2 + 1 \\times 1 = ?$，所以就是第幾號腳位？",
                options: [
                    { text: "Y5", next: "q36", isCorrect: true },
                    { text: "Y6", next: "q36_help", log: "Q36救錯: 110 (4+2=6) 才是 Y6 喔！101 是 5！" }

            // --- 第 37 關：北橋與南橋 ---
            "q37": {
                tag: "第 37 關：主機板架構",
                text: "在傳統的個人電腦主機板上，晶片組分為「北橋」與「南橋」。下列哪一項硬體設備通常是連接在處理「低速訊號」的「南橋晶片」上？",
                options: [
                    { text: "USB 控制器 與 音效卡", next: "q38", isCorrect: true },

                    { text: "PCI-E 獨立顯示卡", next: "q37_help", log: "Q37錯: 顯示卡需要龐大頻寬，歸北橋管" },

            "q37_help": {

                text: "【解析任務】北橋 (靠近 CPU) 專門管「跑得飛快」的高級零件，如主記憶體和顯示卡。南橋 (遠離 CPU) 就像里長伯，專管一些速度不快但很雜的周邊。滑鼠鍵盤用的 USB 算哪一種？",
                options: [
                    { text: "USB 控制器", next: "q37", isCorrect: true },
                    { text: "主記憶體 (RAM)", next: "q37_help", log: "Q37救錯: 記憶體如果被丟去給南橋管，整台電腦會卡到崩潰喔！" }
                ]
            },

            // --- 第 38 關：RISC 特性 ---
            "q38": {
                tag: "第 38 關：CPU 架構設計",
                text: "目前市面上的手機處理器 (如 ARM 架構) 大多採用「RISC (精簡指令集)」設計。關於 RISC，下列敘述何者正確？",
                options: [
                    { text: "指令數量少、長度固定，且大多能在單一時脈週期內執行完畢", next: "q39", isCorrect: true },

                    { text: "使用微程式 (Micro-program) 來控制執行", next: "q38_help", log: "Q38錯: CISC 才是用微程式，RISC 是硬體直接連線" },
                    { text: "指令長度變化很大，非常不固定", next: "q38_help", log: "Q38錯: 為了追求速度，RISC 的指令長度是固定的" }

                text: "【查閱任務】RISC 的 R 代表 Reduced (精簡)。為了讓 CPU 跑得飛快，工程師把那些很少用的複雜指令全部丟掉，只留下長度一樣、簡單暴力的基本招式，每一招都在一個瞬間(週期)打完！",

                    { text: "指令少、長度固定、單一週期執行", next: "q38", isCorrect: true },
                    { text: "擁有極大量且複雜的指令", next: "q38_help", log: "Q38救錯: 複雜指令集叫做 CISC (Complex)，那是 Intel 電腦 CPU 在用的喔！" }
                ]
            },

            // --- 第 39 關：超純量架構 ---
            "q39": {
                tag: "第 39 關：進階 CPU 技術",
                text: "為了突破執行速度的極限，現代微處理機引入了「超純量架構 (Superscalar)」。這項技術最核心的能力是什麼？",
                options: [
                    { text: "在「同一個」時脈週期內，可以「同時」執行多個指令", next: "q40", isCorrect: true },

                options: [
                    { text: "在一個週期內同時執行多個指令", next: "q39", isCorrect: true },
                    { text: "可以將時脈頻率超頻", next: "q39_help", log: "Q39救錯: 超頻是讓輸送帶轉快一點，而超純量是直接多蓋幾條輸送帶喔！" }

            // 🛑 第 40 關：交通法規 (客運繫安全帶)
            "q40": {
                tag: "🛑 第 40 關：大腦休息 (淡商交通日常)",
                text: "【情境】搭乘淡水客運或是學校專車出門校外教學時，不論車輛是行駛在高速公路、快速公路或是「一般市區道路」，根據最新的法規，乘客對於「安全帶」的規定為何？",

            // --- 第 41 關：交握式通訊 ---
            "q41": {
                tag: "第 41 關：I/O 控制方式",
                text: "當 CPU 與速度較慢的印表機傳送資料時，CPU 會先送出「資料準備好了(Strobe)」，印表機收到後回傳一個「我收到了(ACK)」，CPU 才會送下一筆。這種一來一往互相確認的機制稱為？",
                options: [
                    { text: "交握式 (Handshake)", next: "q42", isCorrect: true },

                    { text: "輪詢式 (Polling)", next: "q41_help", log: "Q41錯: 這是 CPU 單方面一直問" },

                ]

            "q41_help": {
                tag: "🔍 PBL 詞意解析：握手言和",
                text: "【解析任務】這就像兩個人在傳接球。我說「要丟囉！」，你回答「好，我準備好了！」。這種雙方透過控制訊號互相打招呼、確認狀態的行為，英文直譯就是「握手」。所以叫？",
                options: [
                    { text: "交握式 (Handshake)", next: "q41", isCorrect: true },
                    { text: "輪詢式 (Polling)", next: "q41_help", log: "Q41救錯: 輪詢是只有單方面在查勤，沒有互相確認的禮貌機制喔！" }

            "q42": {
                tag: "第 42 關：通訊介面",
                text: "早期的工業機台或條碼掃描器常使用的 RS-232 串列通訊介面，它標準的硬體接頭外觀通常是什麼形狀，且擁有幾支接腳？",

                    { text: "D 型接頭，25 支接腳", next: "q42", isCorrect: true },
                    { text: "方型接頭，36 支接腳", next: "q42_help", log: "Q42救錯: 36 根針腳的超大方型接頭，是以前印表機用的並列介面喔！" }

            // --- 第 43 關：BJT 組合語言 POP ---
            "q43": {
                tag: "第 43 關：組合語言進階",
                text: "在 8086 組合語言中，執行 `POP AX` 指令，會將堆疊頂端的資料彈出，並存入 AX 暫存器中。這時，記錄堆疊位置的「堆疊指標暫存器 (SP)」數值會如何變化？",
                options: [
                    { text: "SP 的數值會 加 2 (+2)", next: "q44", isCorrect: true },
                    { text: "SP 的數值會 減 2 (-2)", next: "q43_help", log: "Q43錯: 這是 PUSH (壓入) 時的動作" },
                    { text: "SP 的數值維持不變", next: "q43_help", log: "Q43錯: 拿出東西，指標當然要移動" },

                options: [
                    { text: "數值加 2 (+2)", next: "q43", isCorrect: true },
                    { text: "數值減 2 (-2)", next: "q43_help", log: "Q43救錯: 減 2 是往更深的地方壓進去 (PUSH)，POP 是要拿出來喔！" }
                ]

            // --- 第 44 關：並列晶片 8255 ---
            "q44": {
                tag: "第 44 關：周邊晶片",
                text: "為了讓 CPU 可以控制外部的紅綠燈 LED 或讀取多個開關狀態，常會使用編號「8255A」的可程式化晶片。請問這顆晶片的主要功能是什麼？",

            "q44_help": {

                text: "【查閱任務】8255 內部有 Port A、Port B、Port C 三個大門，每個門都有 8 條線可以「同時」送出或接收信號。這種多條線同時傳送的技術叫？",

                    { text: "串列式資料通訊", next: "q44_help", log: "Q44救錯: 串列是一次只排隊送一個 bit (像 USB)，8255 是一次送 8 個 bit 的並列喔！" }

            // 🏆 第 45 關：最終大魔王 ---
            "q45": {
                tag: "🏆 最終關：微處理機大魔王",
                text: "最後一題大魔王！請綜合比較 CPU 對周邊裝置存取資料的三種控制方式，若單純比較「資料傳輸的效率與速度（不佔用 CPU 時間）」，由快到慢的排序為何？",

                ]
            }
        };

        function initPackSelector() {
            const selector = document.getElementById('pack-selector');

            Object.keys(cardPacks).forEach(key => {
                if (cardPacks[key].cards.length > 0 || key === "phase3") { // 強制顯示 phase3 以利測試
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            // 💡 全面升級 .replace(/\s+/g, '') 避免空白鍵抓不到資料
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            // 💡 全面升級 .replace(/\s+/g, '') 避免空白鍵抓不到資料
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            // 💡 全面升級 .replace(/\s+/g, '') 避免空白鍵抓不到資料
            studentName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            
            if(!q) { alert("題目載入錯誤！請檢查 quizData 設定。"); return; }

            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂") || q.tag.includes("日劇") || q.tag.includes("校園")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                // 💡 改用 innerHTML，讓 MathJax 能夠正確解析按鈕裡的標籤
                btn.innerHTML = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });

            // 💡 呼叫 MathJax 重新渲染動態載入的數學公式
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('game-area')]).catch((err) => console.log(err.message));
            }
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            // 防呆：如果選擇的卡包還沒有卡片，就退回 phase1
            if (!cardPacks[currentPackId] || cardPacks[currentPackId].cards.length === 0) {
                alert("⚠️ 目前選擇的卡包尚未準備好，系統自動切換為第一階段！");
                currentPackId = "phase1";
            }
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }
        
        // 🚨 這裡請填入您正確的 Apps Script URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';
        
        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            if(!scriptURL) return;
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData }).catch(e=>console.log(e));
        }

        async function syncCloudData() {
            // 💡 全面升級 .replace(/\s+/g, '') 避免空白鍵抓不到資料
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }
            if(!scriptURL) { alert("⚠️ 尚未設定 Google Sheet 網址，無法同步！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                // 💡 在網址最後面加上時間戳記 (&t=...)，強迫瀏覽器每次都要去雲端抓最新資料，拒絕快取！
                let fetchUrl = scriptURL + "?name=" + encodeURIComponent(inputName) + "&t=" + new Date().getTime();
                let response = await fetch(fetchUrl, { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    // 💡 智慧合併！比對雲端與本地的卡片數量，永遠保留「數量最多」的紀錄！
                    let cloudData = JSON.parse(result.data);
                    let storageKey = "gachaCollection_" + inputName;
                    let localData = JSON.parse(localStorage.getItem(storageKey)) || [];

                    cloudData.forEach(cloudCard => {
                        let existing = localData.find(c => c.id === cloudCard.id);
                        if (existing) {
                            existing.count = Math.max(existing.count, cloudCard.count); 
                        } else {
                            localData.push(cloudCard);
                        }
                    });

                    localStorage.setItem(storageKey, JSON.stringify(localData));
                    alert("✅ 雲端同步成功！已為您載入最新圖鑑進度！\n(系統已自動比對並保留您的最高進度)");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
</body>
