    <script>
        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                text: "【名詞直觀】這種演算法的特徵都寫在題目裡了！透過不斷交換，讓數字像水裡的「泡泡」一樣浮上來。對應的英文就是 Bubble。",

            "q21_help": {

            "q22": {
                tag: "第 22 關：變數生命週期",
                text: "若將變數宣告在 `main()` 主程式以及所有自訂函式的「最外面(最上方)」，這種所有的函式都可以共用它的變數稱為什麼？",

                    { text: "靜態變數 (Static Variable)", next: "q22_help", log: "Q22錯: 雖然活很久，但存取範圍還是看宣告位置" },

                ]
            },
            "q22_help": {
                tag: "💊 PBL 救援任務：全球通用",
                text: "【名詞直觀】這個變數就像放在廣場上的公用電話，沒有大括號的圍牆擋住，全世界(整個程式的所有函式)的人都可以跑來使用它。這叫做什麼變數？",
                options: [
                    { text: "全域變數", next: "q22", isCorrect: true },
                    { text: "區域變數", next: "q22_help", log: "Q22救錯: 區域變數是放在函式大括號裡面的私人物品，函式結束它就死掉了！" }

            // --- 第 23 題：引數傳遞 ---

                options: [
                    { text: "傳址呼叫 (Call by Address) / 傳參考呼叫", next: "q24", isCorrect: true },

                    { text: "傳名呼叫 (Call by Name)", next: "q23_help", log: "Q23錯: C語言沒有這個" },
                    { text: "單向呼叫", next: "q23_help", log: "Q23錯: 沒有這種專有名詞" }
                ]
            },
            "q23_help": {
                tag: "💊 PBL 救援任務：照片與地址",
                text: "【生活比喻】你想請師傅修冷氣。如果你只傳冷氣的「照片 (Value)」給他，他在照片上畫畫，你家的冷氣不會修好。你必須傳你家的「地址 (Address)」給他，他才能改到正本！",
                options: [
                    { text: "傳址呼叫 (Call by Address)", next: "q23", isCorrect: true },
                    { text: "傳值呼叫 (Call by Value)", next: "q23_help", log: "Q23救錯: 傳值就像傳影印本，在函式裡怎麼撕破都不會影響到外面的正本喔！" }

                options: [
                    { text: "遞迴 (Recursion)", next: "q25", isCorrect: true },

                    { text: "覆寫 (Override)", next: "q24_help", log: "Q24錯: 覆寫是子類別改寫父類別的函式" },
                    { text: "指標呼叫", next: "q24_help", log: "Q24錯: 這跟呼叫自己無關" }
                ]
            },
            "q24_help": {
                tag: "💊 PBL 救援任務：俄羅斯娃娃",
                text: "【名詞解析】就像俄羅斯娃娃一樣，大娃娃打開裡面裝著小娃娃，小娃娃打開又是更小的娃娃。「傳遞」下去再「迴轉」回來，這就是有名的？",
                options: [
                    { text: "遞迴 (Recursion)", next: "q24", isCorrect: true },
                    { text: "多載 (Overload)", next: "q24_help", log: "Q24救錯: 多載是指「同名同姓但做不同事」的函式，自己叫自己的是遞迴喔！" }

                text: "承上題，為了避免遞迴函式變成無窮迴圈當機，在設計遞迴時「必定」要加入什麼條件？",

                    { text: "全域變數", next: "q25_help", log: "Q25錯: 遞迴不一定要用全域變數" },
                    { text: "指標運算", next: "q25_help", log: "Q25錯: 遞迴不一定要用指標" }
                ]
            },
            "q25_help": {
                tag: "💊 PBL 救援任務：剎車系統",
                text: "【邏輯推演】如果你一直呼叫自己、一直呼叫自己，電腦的記憶體很快就會被撐爆！所以你必須寫一個 `if` 判斷式，告訴電腦什麼時候「停止呼叫」。這叫做？",
                options: [
                    { text: "終止條件", next: "q25", isCorrect: true },
                    { text: "全域變數", next: "q25_help", log: "Q25救錯: 遞迴最怕停不下來，所以一定要有終止條件當作煞車！" }
                ]
            },

            // --- 第 26 題：結構預設存取權限 ---
            "q26": {
                tag: "第 26 關：結構與類別",
                text: "在 C++ 中，`struct` (結構) 和 `class` (類別) 都可以把變數和函式包裝在一起。請問 `struct` 內部的成員，預設的存取權限是什麼？",
                options: [
                    { text: "公用的 (public)", next: "q27", isCorrect: true },
                    { text: "私有的 (private)", next: "q26_help", log: "Q26錯: 這是 class 的預設權限" },
                    { text: "保護的 (protected)", next: "q26_help", log: "Q26錯: 這要手動設定，給繼承用的" },
                    { text: "隱藏的 (hidden)", next: "q26_help", log: "Q26錯: C++沒有這種關鍵字" }
                ]
            },
            "q26_help": {
                tag: "💊 PBL 救援任務：開放的傳統",
                text: "【觀念聯想】`struct` 來自於古老的 C 語言，那時候沒有資料保護的概念。所以它就像一個沒有鎖的紙箱，裡面的資料預設是完全「對外開放」的！",
                options: [
                    { text: "公用的 (public)", next: "q26", isCorrect: true },
                    { text: "私有的 (private)", next: "q26_help", log: "Q26救錯: 私有的是高級保險箱 `class` 的專利！傳統的 `struct` 預設是公用 (public) 喔！" }

            },

            // --- 第 27 題：類別預設存取權限 ---
            "q27": {
                tag: "第 27 關：結構與類別",
                text: "承上題，如果是使用物件導向的 `class` (類別) 關鍵字，其內部的成員預設的存取權限是什麼？",
                options: [
                    { text: "私有的 (private)", next: "q28", isCorrect: true },
                    { text: "公用的 (public)", next: "q27_help", log: "Q27錯: 這是 struct 的預設權限" },
                    { text: "保護的 (protected)", next: "q27_help", log: "Q27錯: 這不屬於預設權限" },
                    { text: "靜態的 (static)", next: "q27_help", log: "Q27錯: 這是變數生命週期的屬性" }

            },
            "q27_help": {
                tag: "💊 PBL 救援任務：高級保險箱",

                options: [
                    { text: "私有的 (private)", next: "q27", isCorrect: true },
                    { text: "公用的 (public)", next: "q27_help", log: "Q27救錯: `class` 是升級版，預設是全部上鎖的私有 (private) 喔！" }

                tag: "第 28 關：結構存取",

                    { text: "井字號 ( # )", next: "q28_help", log: "Q28錯: 這是前置處理器" }

            },
            "q28_help": {
                tag: "💊 PBL 救援任務：實體的箱子",

                    { text: "小數點 ( s1.score )", next: "q28", isCorrect: true },
                    { text: "箭頭 ( s1->score )", next: "q28_help", log: "Q28救錯: 當你手上拿的是寫著地址的紙條(指標)時，才需要用箭頭遠端遙控喔！實體變數用小數點！" }

                options: [
                    { text: "箭頭 ( -> )", next: "q30", isCorrect: true },
                    { text: "小數點 ( . )", next: "q29_help", log: "Q29錯: 指標本身只是一串地址，不能直接用小數點" },
                    { text: "星號 ( * )", next: "q29_help", log: "Q29錯: 單用星號只能解參考，還需要括號配小數點才能存取成員" },
                    { text: "取址符號 ( & )", next: "q29_help", log: "Q29錯: 這是用來拿地址的" }

            "q29_help": {

                options: [
                    { text: "箭頭 ( -> )", next: "q29", isCorrect: true },
                    { text: "小數點 ( . )", next: "q29_help", log: "Q29救錯: 小數點是實體變數用的。遇到指標 `*ptr`，一定要用箭頭 `->` 喔！" }
                ]
            },

            // --- 第 30 題：建構子 ---
            "q30": {
                tag: "第 30 關：物件導向",
                text: "在類別 (class) 中，有一種特殊的函式，其「名稱與類別完全相同」，且會在建立物件時「自動被執行」用來初始化資料。這個函式稱為？",

                    { text: "多載函式", next: "q30_help", log: "Q30錯: 這只是同名函式的統稱" }

                text: "【名詞直翻】蓋房子的第一步是把地基打好(初始化)。物件剛誕生、被「建造(Construct)」出來的那一瞬間，負責幫它打底的自動函式叫做什麼子？",

                    { text: "建構子", next: "q30", isCorrect: true },

            "q31": {
                tag: "第 31 關：物件導向",
                text: "承上題，當物件不再使用時，用來釋放記憶體空間的「解構子 (Destructor)」，其名稱前面必須加上什麼符號來跟建構子作區分？",
                options: [
                    { text: "波浪符號 ( ~ )", next: "q32", isCorrect: true },
                    { text: "減號 ( - )", next: "q31_help", log: "Q31錯: C++ 不使用減號" },
                    { text: "米字號 ( * )", next: "q31_help", log: "Q31錯: 這是指標用的" },
                    { text: "井字號 ( # )", next: "q31_help", log: "Q31錯: 這是前置處理器用的" }

            "q31_help": {

                text: "【符號聯想】解構子是物件「死亡」時執行的。你可以把鍵盤左上角這個彎彎曲曲的符號 `~`，想像成物件陣亡後，靈魂化作一縷波浪狀的青煙飄上天去了！",

                    { text: "波浪符號 ( ~ )", next: "q31", isCorrect: true },
                    { text: "減號 ( - )", next: "q31_help", log: "Q31救錯: 雖然減號有扣除的感覺，但 C++ 規定解構子必須戴上波浪符號 `~` 喔！" }
                ]
            },

            // --- 第 32 題：物件導向三要素 ---
            "q32": {
                tag: "第 32 關：物件導向",
                text: "物件導向程式設計 (OOP) 的三個最核心要素 (特性) 分別為：封裝 (Encapsulation)、繼承 (Inheritance) 以及哪一項？",

                    { text: "指標 (Pointer)", next: "q32_help", log: "Q32錯: 這是記憶體管理工具" },
                    { text: "遞迴 (Recursion)", next: "q32_help", log: "Q32錯: 這是演算法技巧" }
                ]
            },
            "q32_help": {

                text: "【名詞直覺】物件導向最強大的地方，就是同一個指令叫「動物叫」，狗會汪汪叫，貓會喵喵叫。同一個介面，卻能表現出「多種不同的型態與行為」。這叫做？",

            "q33": {
                tag: "第 33 關：存取修飾詞",
                text: "在類別的存取修飾詞中，哪一種型態的成員「只能在自己的類別」以及「繼承它的子類別 (小孩)」中存取，但外部程式無法使用？",
                options: [
                    { text: "保護型態 (protected)", next: "q34", isCorrect: true },

                tag: "第 34 關：資料結構",
                text: "在資料結構中，「堆疊 (Stack)」是一種只有一個出入口的結構。它的資料存取原則是什麼？",

                    { text: "後進後出", next: "q34_help", log: "Q34錯: 這跟先進先出是同義詞" }
                ]
            },
            "q34_help": {
                tag: "💊 PBL 救援任務：疊盤子理論",
                text: "【生活比喻】想像你在桌上「疊」盤子。第一個放上去的盤子被壓在最下面。當你要拿盤子時，一定是從最上面拿走「最後一個」放上去的。這代表？",
                options: [
                    { text: "先進後出 (最後放的最先拿)", next: "q34", isCorrect: true },
                    { text: "先進先出", next: "q34_help", log: "Q34救錯: 先進先出是排隊買票(佇列)，堆疊就像一個很深的桶子，最先掉進去的只能最後出來喔！" }
                ]
            },

            // --- 第 35 題：佇列 Queue ---
            "q35": {
                tag: "🏆 最終關：資料結構",
                text: "最後一題！與堆疊不同，「佇列 (Queue)」有兩個出入口，一個負責進(rear)，一個負責出(front)。請問它的資料存取原則是什麼？",
                options: [
                    { text: "先進先出 (FIFO)", next: "end", isCorrect: true },
                    { text: "先進後出 (FILO)", next: "q35_help", log: "Q35錯: 這是堆疊 (Stack) 的特性" },
                    { text: "後進先出 (LIFO)", next: "q35_help", log: "Q35錯: 這跟先進後出是同義詞" },
                    { text: "雙向存取", next: "q35_help", log: "Q35錯: 雖然有雙向佇列，但基本佇列是單向流動的" }
                ]
            },
            "q35_help": {
                tag: "💊 PBL 最終挑戰：排隊買珍奶",
                text: "【生活比喻】Queue 的英文意思就是「排隊」。大家排隊買珍珠奶茶，第一個乖乖排隊的人，一定會第一個買到奶茶離開。這個極度公平的原則叫作？",
                options: [
                    { text: "先進先出 (First In, First Out)", next: "q35", isCorrect: true },
                    { text: "先進後出", next: "q35_help", log: "Q35救錯: 先進後出大家會暴動啦！排隊(Queue)絕對是先來的人先買到(先進先出)！" }
                ]
            }
        };
        // ==========================================
        // 系統變數與遊戲邏輯
        // ==========================================
        let studentName = "";
        let currentStep = "q1"; 
        let hp = 30; 
        let currentStreak = 0; 
        let diagnosticLogs = [];
        let sessionCards = []; 
        let failedQuestions = []; 
        let startTime = 0;           
        let totalTime = 0;           
        let rescueTriggered = 0;     
        let rescueFails = 0;
        let isTransitioning = false; 
        
        // 🚨 預設卡包自動切換為第四階段 (phase4)
        let currentPackId = "phase4"; 

        document.addEventListener('DOMContentLoaded', () => {
            initPackSelector();
        });

        function initPackSelector() {
            const selector = document.getElementById('pack-selector');
            if (!selector) return;
            selector.innerHTML = '';
            Object.keys(cardPacks).forEach(key => {
                if (cardPacks[key].cards.length > 0) { 
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                if (spMaster.pblTask && spMaster.unlockCode) {
                    let userInput = prompt(`🛑 傳說覺醒任務觸發！🛑\n\n${spMaster.pblTask}\n\n(任務完成後，請向老師索取通關密碼，並輸入於下方：)`);
                    
                    if (userInput === null) return; 
                    else if (userInput.trim() !== spMaster.unlockCode) {
                        alert("❌ 密碼錯誤！請確認你已經確實完成任務，並向老師取得正確密碼！");
                        playSound('wrong');
                        return; 
                    }
                }

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            studentName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            
            if(!q) { alert("題目載入錯誤！請檢查 quizData 設定。"); return; }

            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂") || q.tag.includes("日劇") || q.tag.includes("校園")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                btn.innerHTML = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });

            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('game-area')]).catch((err) => console.log(err.message));
            }
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            if (!cardPacks[currentPackId] || cardPacks[currentPackId].cards.length === 0) {
                alert("⚠️ 目前選擇的卡包尚未準備好，系統自動切換為第一階段！");
                currentPackId = "phase1";
            }
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }
        
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';
        
        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            if(!scriptURL) return;
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData }).catch(e=>console.log(e));
        }

        async function syncCloudData() {
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }
            if(!scriptURL) { alert("⚠️ 尚未設定 Google Sheet 網址，無法同步！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                let fetchUrl = scriptURL + "?name=" + encodeURIComponent(inputName) + "&t=" + new Date().getTime();
                let response = await fetch(fetchUrl, { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    let cloudData = JSON.parse(result.data);
                    let storageKey = "gachaCollection_" + inputName;
                    let localData = JSON.parse(localStorage.getItem(storageKey)) || [];

                    cloudData.forEach(cloudCard => {
                        let existing = localData.find(c => c.id === cloudCard.id);
                        if (existing) {
                            existing.count = Math.max(existing.count, cloudCard.count); 
                        } else {
                            localData.push(cloudCard);
                        }
                    });

                    localStorage.setItem(storageKey, JSON.stringify(localData));
                    alert("✅ 雲端同步成功！已為您載入最新圖鑑進度！\n(系統已自動比對並保留您的最高進度)");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
