        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                text: "純淨的本質半導體（如矽）加入微量的「三價元素」（如硼、鎵）後，會形成哪一種半導體？",
                options: [
                    { text: "A. P 型半導體", next: "q2", isCorrect: true },
                    { text: "B. N 型半導體", next: "q1_help", log: "Q1錯: N型是加入五價元素" },
                    { text: "C. 絕緣體", next: "q1_help", log: "Q1錯: 摻雜是為了增加導電性" },
                    { text: "D. 超導體", next: "q1_help", log: "Q1錯: 與超導體無關" }
                ]
            },
            "q1_help": {
                tag: "💊 救援任務：電洞還是電子？",
                text: "知識拆解：三價元素外層只有 3 個電子，跟矽 (4個) 結合時會「少一個電子」，產生一個空缺。這個空缺叫做「電洞」，電洞帶正電 (Positive)。所以是哪一型？",
                options: [
                    { text: "A. P 型 (Positive)", next: "q1", isCorrect: true },
                    { text: "B. N 型 (Negative)", next: "q1_help", log: "Q1救錯: N 型代表負電，是電子多出來才叫 N 型喔！" }
                ]
            },

            // --- 第 2 關：PN 介面 ---
            "q2": {
                tag: "第 2 關：二極體",
                text: "當 PN 介面加上「逆向偏壓」時，其接面處的「空乏區 (Depletion Region)」寬度會如何變化？",
                options: [
                    { text: "A. 變寬", next: "q3", isCorrect: true },
                    { text: "B. 變窄", next: "q2_help", log: "Q2錯: 這是順向偏壓的狀況" },
                    { text: "C. 不變", next: "q2_help", log: "Q2錯: 偏壓一定會改變空乏區" },
                    { text: "D. 消失", next: "q2_help", log: "Q2錯: 完全導通時才會幾乎消失" }
                ]
            },
            "q2_help": {
                tag: "💊 救援任務：電荷相吸",
                text: "知識拆解：逆向偏壓就是把電池正極接 N(電子)、負極接 P(電洞)。異性相吸，兩邊的載子都被電池「往外拉」，所以中間沒人的空曠區域當然會？",
                options: [
                    { text: "A. 變寬", next: "q2", isCorrect: true },
                    { text: "B. 變窄", next: "q2_help", log: "Q2救錯: 都被拉走了，中間空地怎麼會變窄啦！" }
                ]
            },

            // --- 第 3 關：半波整流 ---
            "q3": {
                tag: "第 3 關：二極體應用",
                text: "在理想的「半波整流」電路中，若輸入交流電源的有效值 (Vrms) 為 100V，請問負載端輸出的直流電壓 (Vdc) 大約為多少？",
                options: [
                    { text: "A. 45 V", next: "q4", isCorrect: true },
                    { text: "B. 90 V", next: "q3_help", log: "Q3錯: 這是全波整流的輸出" },
                    { text: "C. 100 V", next: "q3_help", log: "Q3錯: 有效值不等於輸出的直流平均值" },
                    { text: "D. 141.4 V", next: "q3_help", log: "Q3錯: 這是輸入電壓的最大值 (Vm)" }
                ]
            },
            "q3_help": {
                tag: "💊 救援任務：公式計算",
                text: "知識拆解：半波 Vdc = Vm / π。有效值 100V 的最大值 Vm 是 100 × √2 ≈ 141.4V。 141.4 除以 3.14 大約是多少？",
                options: [
                    { text: "A. 45 V", next: "q3", isCorrect: true },
                    { text: "B. 90 V", next: "q3_help", log: "Q3救錯: 那是全波 (2Vm / π) 的數值喔！" }
                ]
            },

            // --- 第 4 關：濾波電容 ---
            "q4": {
                tag: "第 4 關：濾波電路",
                text: "在橋式整流並加上「濾波電容」的電路中，若我們將負載電阻變小（相當於負載電流變大），輸出的「漣波電壓 (Ripple Voltage)」會如何變化？",
                options: [
                    { text: "A. 變大", next: "q5", isCorrect: true },
                    { text: "B. 變小", next: "q4_help", log: "Q4錯: 放電變快，漣波會變大" },
                    { text: "C. 不變", next: "q4_help", log: "Q4錯: 負載改變一定會影響漣波" },
                    { text: "D. 變成零", next: "q4_help", log: "Q4錯: 只有穩壓 IC 才能接近零" }
                ]
            },
            "q4_help": {
                tag: "💊 救援任務：水缸漏水理論",
                text: "知識拆解：電容就像水缸。負載電阻變小，代表水龍頭開很大（電流大），水缸漏水漏得很快。充電來不及補滿，水位波動幅度就會？",
                options: [
                    { text: "A. 變大", next: "q4", isCorrect: true },
                    { text: "B. 變小", next: "q4_help", log: "Q4救錯: 水一直漏，波動幅度一定變大啦！" }
                ]
            },

            // --- 第 5 關：稽納二極體 ---
            "q5": {
                tag: "第 5 關：特殊二極體",
                text: "稽納二極體 (Zener Diode) 主要是設計在它的哪一個工作區域，用來作為「穩壓」用途？",
                options: [
                    { text: "A. 逆向崩潰區", next: "q6", isCorrect: true },
                    { text: "B. 順向導通區", next: "q5_help", log: "Q5錯: 順向時就像普通二極體一樣" },
                    { text: "C. 逆向漏電流區", next: "q5_help", log: "Q5錯: 這區電壓變動大，無法穩壓" },
                    { text: "D. 零偏壓區", next: "q5_help", log: "Q5錯: 沒有偏壓就沒有動作" }
                ]
            },
            "q5_help": {
                tag: "💊 救援任務：絕處逢生",
                text: "知識拆解：普通二極體逆向崩潰會燒毀，但稽納二極體天生神力，它就是專門設計在「逆向」被極高電壓打穿時，兩端電壓能死守不變，達成穩壓！",
                options: [
                    { text: "A. 逆向崩潰區", next: "q5", isCorrect: true },
                    { text: "B. 順向導通區", next: "q5_help", log: "Q5救錯: 順向的時候它只會吃掉 0.7V，不能穩高壓！" }
                ]
            },

// --- 第 6 關：邏輯閘讀圖 ---
            "q6": {
                tag: "第 6 關：邏輯閘基礎",
                text: "觀察下方的邏輯符號與真值表，請問這是哪一種基本邏輯閘？<br><br><img src='NAND.png' style='width:100%; max-width:350px; border-radius:8px; background-color: white; padding: 10px;'>",
                options: [
                    { text: "A. NAND 閘 (反及閘)", next: "q7", isCorrect: true },
                    { text: "B. AND 閘 (及閘)", next: "q6_help", log: "Q6錯: AND閘的輸出沒有反相小圓圈" },
                    { text: "C. NOR 閘 (反或閘)", next: "q6_help", log: "Q6錯: NOR閘的符號形狀像箭頭" },
                    { text: "D. XOR 閘 (互斥或閘)", next: "q6_help", log: "Q6錯: 真值表與符號都不符" }
                ]
            },
            "q6_help": {
                tag: "💊 救援任務：符號拆解",
                text: "知識拆解：圖中的邏輯符號是一個平直的 D 字型（代表 AND 及閘），但最前方多了一個「小圓圈（代表 NOT 反相）」。也就是「AND + NOT」組合起來的閘。英文簡稱是？",
                options: [
                    { text: "A. NAND 閘", next: "q6", isCorrect: true },
                    { text: "B. AND 閘", next: "q6_help", log: "Q6救錯: 漏看前面的小圓圈了，那代表反相喔！" }
                ]
            },

            // --- 第 7 關：NAND 特性 ---
            "q7": {
                tag: "第 7 關：邏輯閘特性",
                text: "請問 NAND 閘的輸出 (Y) 在什麼情況下才會是「0 (低電位)」？",
                options: [
                    { text: "A. 只有當輸入 A 與 B 皆為 1 時", next: "q8", isCorrect: true },
                    { text: "B. 只要有任何一個輸入為 0 時", next: "q7_help", log: "Q7錯: 若有輸入為 0，輸出會是 1" },
                    { text: "C. 只有當輸入 A 與 B 皆為 0 時", next: "q7_help", log: "Q7錯: 此時輸出為 1" },
                    { text: "D. 輸入 A 與 B 狀態不同時", next: "q7_help", log: "Q7錯: 這是 XOR 閘的特性" }
                ]
            },
            "q7_help": {
                tag: "💊 救援任務：看圖說故事",
                text: "知識拆解：這題不用死背，N是相反的意思，AND是乘法的意思，依照數學來看A跟B怎麼樣可以得到0？",
                options: [
                    { text: "A. A 與 B 皆為 1 時", next: "q7", isCorrect: true },
                    { text: "B. A 與 B 皆為 0 時", next: "q7_help", log: "Q7救錯: 看錯行囉！A和B都是0的時候，Y是1。" }
                ]
            },

            // --- 第 8 關：BJT 偏壓狀態 ---
            "q8": {
                tag: "第 8 關：雙極性電晶體",
                text: "BJT 要能作為「線性放大器」，必須操作在「作用區 (Active Region)」。此時 B-E 介面與 B-C 介面的偏壓狀態分別為何？",
                options: [
                    { text: "A. B-E 順向，B-C 逆向", next: "q9", isCorrect: true },
                    { text: "B. B-E 順向，B-C 順向", next: "q8_help", log: "Q8錯: 這是飽和區 (當開關的 ON)" },
                    { text: "C. B-E 逆向，B-C 逆向", next: "q8_help", log: "Q8錯: 這是截止區 (當開關的 OFF)" },
                    { text: "D. B-E 逆向，B-C 順向", next: "q8_help", log: "Q8錯: 這是反轉區" }
                ]
            },
            "q8_help": {
                tag: "💊 救援任務：水龍頭理論",
                text: "知識拆解：輸入端(B-E)要導通讓電子進來，所以必須「順向」；輸出端(B-C)要負責收集電子且能擋住高壓，所以必須「逆向」。",
                options: [
                    { text: "A. B-E 順向，B-C 逆向", next: "q8", isCorrect: true },
                    { text: "B. 兩個都順向", next: "q8_help", log: "Q8救錯: 兩個都順向就全通變成開關短路了！" }
                ]
            },

            // --- 第 9 關：BJT alpha與beta ---
            "q9": {
                tag: "第 9 關：BJT 參數",
                text: "BJT 的共基極電流增益為 α (alpha)，共射極電流增益為 β (beta)。若某電晶體的 β = 99，則其 α 值為多少？",
                options: [
                    { text: "A. 0.99", next: "q10", isCorrect: true },
                    { text: "B. 1.01", next: "q9_help", log: "Q9錯: α 永遠小於 1" },
                    { text: "C. 100", next: "q9_help", log: "Q9錯: 這是 1 + β" },
                    { text: "D. 0.98", next: "q9_help", log: "Q9錯: 計算錯誤" }
                ]
            },
            "q9_help": {
                tag: "💊 救援任務：統測必背公式",
                text: "知識拆解：公式 α = β / (1 + β)。將 β = 99 代入，變成 99 / 100。答案是多少？",
                options: [
                    { text: "A. 0.99", next: "q9", isCorrect: true },
                    { text: "B. 1.01", next: "q9_help", log: "Q9救錯: 怎麼可能大於 1，射極電流是最大的啊！" }
                ]
            },

            // 🏀 第 10 關：全明星街頭派對
            "q10": {
                tag: "🏀 第 10 關：大腦休息 (手遊)",
                text: "休息一下！在籃球手遊《全明星街頭派對》中，有一位角色被稱為「三分神射手」，其大招是可以無視距離超遠投籃，且背號是 30 號的球星是誰？",
                options: [
                    { text: "A. 柯瑞 (Stephen Curry)", next: "q11", isCorrect: true },
                    { text: "B. 詹姆斯 (LeBron James)", next: "q10_help", log: "Q10錯: 老詹是坦克切入型" },
                    { text: "C. 杜蘭特 (Kevin Durant)", next: "q10_help", log: "Q10錯: KD 是死神中投" },
                    { text: "D. 字母哥 (Giannis)", next: "q10_help", log: "Q10錯: 字母哥大招是灌籃" }
                ]
            },
            "q10_help": {
                tag: "💊 提示：晚安勇士",
                text: "他是金州勇士隊的招牌，開創了大三分時代，投進球最喜歡比出「睡覺(Night Night)」的手勢。",
                options: [
                    { text: "A. 柯瑞 (Curry)", next: "q10", isCorrect: true },
                    { text: "B. 詹姆斯 (LeBron)", next: "q10_help", log: "Q10救錯: 老詹的背號是 23 號啦！" }
                ]
            },

            // --- 第 11 關：分壓偏壓 ---
            "q11": {
                tag: "第 11 關：直流偏壓",
                text: "在各種 BJT 偏壓電路中，「分壓偏壓 (Voltage-Divider Bias)」被最廣泛使用，其最大的優點是什麼？",
                options: [
                    { text: "A. 工作點 (Q點) 非常穩定，幾乎不受電晶體 β 值變化的影響", next: "q12", isCorrect: true },
                    { text: "B. 放大倍率最高", next: "q11_help", log: "Q11錯: 偏壓電路是用來穩定，不決定最高放大率" },
                    { text: "C. 使用的電阻數量最少", next: "q11_help", log: "Q11錯: 它需要 4 個電阻，算多的" },
                    { text: "D. 頻寬最寬", next: "q11_help", log: "Q11錯: 頻寬與電容、頻率響應有關" }
                ]
            },
            "q11_help": {
                tag: "💊 救援任務：穩如泰山",
                text: "知識拆解：分壓偏壓利用兩個電阻在基極產生固定的分壓，讓基極電壓被「鎖死」。就算電晶體溫度升高或換了一顆 β 不同的，電路照樣穩穩運作。",
                options: [
                    { text: "A. 工作點非常穩定", next: "q11", isCorrect: true },
                    { text: "B. 電阻數量最少", next: "q11_help", log: "Q11救錯: 固定偏壓只需2個電阻，分壓需要4個喔！" }
                ]
            },

            // --- 第 12 關：CC放大器 ---
            "q12": {
                tag: "第 12 關：小訊號放大",
                text: "在 BJT 小訊號放大器中，「共集極 (CC)」放大器因為輸出電壓幾乎等於輸入電壓 (Av ≒ 1)，所以又被稱為什麼？",
                options: [
                    { text: "A. 射極隨耦器 (Emitter Follower)", next: "q13", isCorrect: true },
                    { text: "B. 反相放大器", next: "q12_help", log: "Q12錯: CC 是同相放大" },
                    { text: "C. 電流隨耦器", next: "q12_help", log: "Q12錯: 這是共基極 (CB) 的特性" },
                    { text: "D. 達靈頓對", next: "q12_help", log: "Q12錯: 這是兩顆 BJT 接在一起增加電流增益" }
                ]
            },
            "q12_help": {
                tag: "💊 救援任務：跟屁蟲電路",
                text: "知識拆解：CC 放大器的輸入在基極 (B)，輸出在射極 (E)。因為電壓增益接近 1，射極的電壓就像跟屁蟲一樣「隨」著輸入「耦」合變動，所以叫？",
                options: [
                    { text: "A. 射極隨耦器", next: "q12", isCorrect: true },
                    { text: "B. 反相放大器", next: "q12_help", log: "Q12救錯: 輸出跟輸入長得一模一樣，沒有反相喔！" }
                ]
            },

            // --- 第 13 關：CE 相位 ---
            "q13": {
                tag: "第 13 關：小訊號放大",
                text: "在基本 BJT「共射極 (CE)」放大器中，輸出電壓波形與輸入電壓波形的相位關係為何？",
                options: [
                    { text: "A. 相差 180 度 (反相)", next: "q14", isCorrect: true },
                    { text: "B. 同相 (0 度)", next: "q13_help", log: "Q13錯: CC 和 CB 才是同相" },
                    { text: "C. 超前 90 度", next: "q13_help", log: "Q13錯: 電晶體不具備純電容特性" },
                    { text: "D. 落後 90 度", next: "q13_help", log: "Q13錯: 電晶體不具備純電感特性" }
                ]
            },
            "q13_help": {
                tag: "💊 救援任務：唯一唱反調的",
                text: "知識拆解：CE 放大器是三種組態中唯一電壓和電流都放大的，但它也是唯一一個「輸入往上走，輸出卻往下掉」的反骨電路。反相代表差幾度？",
                options: [
                    { text: "A. 180 度", next: "q13", isCorrect: true },
                    { text: "B. 0 度", next: "q13_help", log: "Q13救錯: 0度是波形長得一模一樣的同相！" }
                ]
            },

            // --- 第 14 關：FET 基礎 ---
            "q14": {
                tag: "第 14 關：場效電晶體",
                text: "與電流控制的 BJT 不同，場效電晶體 (FET) 是一種「電壓控制元件」。它是利用哪一個端點的電壓來控制電流的大小？",
                options: [
                    { text: "A. 閘極 (Gate)", next: "q15", isCorrect: true },
                    { text: "B. 汲極 (Drain)", next: "q14_help", log: "Q14錯: 汲極是電流流出的地方" },
                    { text: "C. 源極 (Source)", next: "q14_help", log: "Q14錯: 源極是電流進入的地方" },
                    { text: "D. 基極 (Base)", next: "q14_help", log: "Q14錯: 這是 BJT 的端點" }
                ]
            },
            "q14_help": {
                tag: "💊 救援任務：水龍頭的開關",
                text: "知識拆解：FET 就像一個水龍頭。源極(Source)是水塔，汲極(Drain)是排水孔。用來控制水流大小的「閘門」，英文是？",
                options: [
                    { text: "A. 閘極 (Gate)", next: "q14", isCorrect: true },
                    { text: "B. 汲極 (Drain)", next: "q14_help", log: "Q14救錯: Drain 是排水孔，不能當控制開關啦！" }
                ]
            },

            // --- 第 15 關：增強型 MOSFET ---
            "q15": {
                tag: "第 15 關：MOSFET 特性",
                text: "增強型 MOSFET (E-MOSFET) 與 JFET 在結構上最大的差異在於，E-MOSFET 在未加偏壓 (V_GS = 0V) 時，其通道狀態為何？",
                options: [
                    { text: "A. 斷路 (不導通)", next: "q16", isCorrect: true },
                    { text: "B. 短路 (完全導通)", next: "q15_help", log: "Q15錯: 這是空乏型的特性" },
                    { text: "C. 處於恆流狀態", next: "q15_help", log: "Q15錯: 必須加偏壓才會導通" },
                    { text: "D. 處於擊穿狀態", next: "q15_help", log: "Q15錯: 未加電壓不會擊穿" }
                ]
            },
            "q15_help": {
                tag: "💊 救援任務：看名字猜原理",
                text: "知識拆解：「增強型」的意思就是，它原本天生殘缺 (沒有通道)，必須靠外面加電壓才能把通道「增強」出來。所以還沒加電壓前，它是？",
                options: [
                    { text: "A. 斷路 (不導通)", next: "q15", isCorrect: true },
                    { text: "B. 短路 (導通)", next: "q15_help", log: "Q15救錯: 天生就有通道的是 JFET 跟空乏型喔！" }
                ]
            },

            // --- 第 16 關：JFET 夾止 ---
            "q16": {
                tag: "第 16 關：FET 直流分析",
                text: "若要讓一個「N 通道」JFET 進入夾止狀態 (Cut-off)，也就是完全不導通，其閘-源極電壓 (V_GS) 必須加哪一種極性的電壓？",
                options: [
                    { text: "A. 負電壓", next: "q17", isCorrect: true },
                    { text: "B. 正電壓", next: "q16_help", log: "Q16錯: 加正電壓會順向導通而燒毀" },
                    { text: "C. 零電壓", next: "q16_help", log: "Q16錯: 零電壓時通道全開，電流最大" },
                    { text: "D. 交流電壓", next: "q16_help", log: "Q16錯: 交流會讓它忽開忽關" }
                ]
            },
            "q16_help": {
                tag: "💊 救援任務：同性相斥",
                text: "知識拆解：N 通道裡面流的是「電子(帶負電)」。為要把這些電子趕走、讓通道夾扁，我們必須在閘極加上跟它同性相斥的電壓。所以要加？",
                options: [
                    { text: "A. 負電壓", next: "q16", isCorrect: true },
                    { text: "B. 正電壓", next: "q16_help", log: "Q16救錯: 正負相吸，這樣電子反而會跑過來！" }
                ]
            },

            // --- 第 17 關：FET 輸入阻抗 ---
            "q17": {
                tag: "第 17 關：FET 小訊號",
                text: "與 BJT 相比，FET 放大器有一個非常突出的優點，使得它在測量儀器或多級放大器的第一級非常受歡迎。這個優點是？",
                options: [
                    { text: "A. 輸入阻抗極大", next: "q18", isCorrect: true },
                    { text: "B. 電壓放大倍率極高", next: "q17_help", log: "Q17錯: FET 的放大倍率通常比 BJT 小" },
                    { text: "C. 輸出阻抗極大", next: "q17_help", log: "Q17錯: 放大器輸出阻抗通常越小越好" },
                    { text: "D. 反應速度最慢", next: "q17_help", log: "Q17錯: 這不是優點" }
                ]
            },
            "q17_help": {
                tag: "💊 救援任務：不吃別人的電",
                text: "知識拆解：FET 的閘極有一層二氧化矽絕緣層(MOS)，電流根本流不進去。電流 I 趨近於 0，根據歐姆定律 R=V/I，分母為 0 代表電阻會？",
                options: [
                    { text: "A. 輸入阻抗極大", next: "q17", isCorrect: true },
                    { text: "B. 電壓放大極高", next: "q17_help", log: "Q17救錯: BJT 的增益才高啦！" }
                ]
            },

            // --- 第 18 關：CMOS ---
            "q18": {
                tag: "第 18 關：邏輯族結構",
                text: "現代數位 IC 與電腦 CPU 中最常使用的「CMOS」技術，具有極低靜態耗電的優勢。它是利用哪兩種元件「互補」組合而成的？",
                options: [
                    { text: "A. P 通道 MOSFET 與 N 通道 MOSFET", next: "q19", isCorrect: true },
                    { text: "B. NPN 與 PNP 電晶體", next: "q18_help", log: "Q18錯: 這是雙極性 BJT 技術" },
                    { text: "C. JFET 與 BJT", next: "q18_help", log: "Q18錯: 這是 BiFET 技術" },
                    { text: "D. OPA 與 邏輯閘", next: "q18_help", log: "Q18錯: 這不是半導體底層結構" }
                ]
            },
            "q18_help": {
                tag: "💊 救援任務：C的意義",
                text: "知識拆解：CMOS 的 C 代表 Complementary (互補)。MOS 代表 MOSFET。既然是互補，那就是把天秤兩端相反特性的 MOS 結合。哪兩個？",
                options: [
                    { text: "A. P 通道與 N 通道", next: "q18", isCorrect: true },
                    { text: "B. NPN 與 PNP", next: "q18_help", log: "Q18救錯: 這是 BJT，跟 MOS 無關喔！" }
                ]
            },

            // --- 第 19 關：理想 OPA ---
            "q19": {
                tag: "第 19 關：運算放大器",
                text: "在電子學中分析 OPA 電路時，通常假設它是一個「理想 OPA」。請問理想 OPA 的輸入阻抗 (Z_in) 與輸出阻抗 (Z_out) 分別為多少？",
                options: [
                    { text: "A. Z_in = 無限大，Z_out = 0", next: "q20", isCorrect: true },
                    { text: "B. Z_in = 0，Z_out = 無限大", next: "q19_help", log: "Q19錯: 完全相反" },
                    { text: "C. Z_in = 無限大，Z_out = 無限大", next: "q19_help", log: "Q19錯: 輸出阻抗無限大會推不動負載" },
                    { text: "D. Z_in = 0，Z_out = 0", next: "q19_help", log: "Q19錯: 輸入阻抗為0會把前一級的訊號吃光" }
                ]
            },
            "q19_help": {
                tag: "💊 救援任務：最完美的黑盒子",
                text: "知識拆解：理想放大器不該偷吃別人的訊號(電流為0 ➡️ 輸入阻抗無限大)，且輸出要像神一樣給力、不受負載影響(不會掉壓 ➡️ 輸出阻抗 0)。",
                options: [
                    { text: "A. 輸入無限大，輸出為 0", next: "q19", isCorrect: true },
                    { text: "B. 輸入為 0，輸出無限大", next: "q19_help", log: "Q19救錯: 這樣接上去訊號就不見，也推不動喇叭了！" }
                ]
            },

            // 🗡️ 第 20 關：傳說對決
            "q20": {
                tag: "🗡️ 第 20 關：大腦休息 (手遊)",
                text: "換個心情！在人氣 MOBA 手遊《傳說對決》中，如果隊友喊出「集合，準備團戰！」，通常最適合發起第一波開戰（衝進敵陣扛傷害）的是哪一個定位的英雄？",
                options: [
                    { text: "A. 坦克 (或戰士)", next: "q21", isCorrect: true },
                    { text: "B. 射手", next: "q20_help", log: "Q20錯: 射手太軟，衝第一會瞬間蒸發" },
                    { text: "C. 法師", next: "q20_help", log: "Q20錯: 法師血量少，要在後排輸出" },
                    { text: "D. 刺客", next: "q20_help", log: "Q20錯: 刺客負責繞後抓軟皮，不是正面開團" }
                ]
            },
            "q20_help": {
                tag: "💊 提示：肉盾精神",
                text: "衝進去一定會被對面五個人集火，所以這個角色必須「血很多、防禦很高」，像是薩尼或夸克。這種職業叫什麼？",
                options: [
                    { text: "A. 坦克", next: "q20", isCorrect: true },
                    { text: "B. 射手", next: "q20_help", log: "Q20救錯: 射手衝第一直接變成首殺啦！" }
                ]
            },

            // --- 第 21 關：虛接地 ---
            "q21": {
                tag: "第 21 關：OPA 應用",
                text: "當 OPA 加上「負回授」且工作在線性區時，其正輸入端 (+) 與負輸入端 (-) 的電壓幾乎相等，稱為「虛擬短路」。若其中一端接地 (0V)，另一端電壓也視同為 0V，這稱為什麼？",
                options: [
                    { text: "A. 虛接地 (Virtual Ground)", next: "q22", isCorrect: true },
                    { text: "B. 實接地 (Real Ground)", next: "q21_help", log: "Q21錯: 實接地是真的用電線接到地上" },
                    { text: "C. 浮接 (Floating)", next: "q21_help", log: "Q21錯: 浮接是懸空沒有固定電位" },
                    { text: "D. 短路保護", next: "q21_help", log: "Q21錯: 這是電源供應器的安全機制" }
                ]
            },
            "q21_help": {
                tag: "💊 救援任務：名詞字面推理",
                text: "知識拆解：端點「看起來」電壓是 0V（好像接地一樣），但實際上並沒有真的電線連到地上。這種假的、概念上的接地叫什麼？",
                options: [
                    { text: "A. 虛接地", next: "q21", isCorrect: true },
                    { text: "B. 實接地", next: "q21_help", log: "Q21救錯: 實接地就是真的用銅線插進土裡了！" }
                ]
            },

            // --- 第 22 關：反相放大器 ---
            "q22": {
                tag: "第 22 關：OPA 應用",
                text: "有一個 OPA 反相放大器，其輸入端串聯電阻 R1 = 10kΩ，負回授電阻 Rf = 50kΩ。請問這個電路的電壓增益 (Av) 是多少？",
                options: [
                    { text: "A. -5", next: "q23", isCorrect: true },
                    { text: "B. 5", next: "q22_help", log: "Q22錯: 反相放大器的增益必須有負號" },
                    { text: "C. 6", next: "q22_help", log: "Q22錯: 這是非反相的公式 1 + (Rf/R1)" },
                    { text: "D. -0.2", next: "q22_help", log: "Q22錯: 公式顛倒了，是 Rf / R1" }
                ]
            },
            "q22_help": {
                tag: "💊 救援任務：負的回授除輸入",
                text: "知識拆解：反相放大器的訊號是從 (-) 端進去，所以一定有「負號」。公式是 Av = - (Rf / R1)。 50k / 10k 加上負號是多少？",
                options: [
                    { text: "A. -5", next: "q22", isCorrect: true },
                    { text: "B. 5", next: "q22_help", log: "Q22救錯: 少了負號就變成非反相啦！" }
                ]
            },

            // --- 第 23 關：非反相放大器 ---
            "q23": {
                tag: "第 23 關：OPA 應用",
                text: "如果我們改用「非反相放大器」，將訊號接在 OPA 的正端 (+)，其電壓增益公式為 Av = 1 + (Rf / R1)。根據公式，此電路的增益必定符合什麼條件？",
                options: [
                    { text: "A. 恆大於或等於 1", next: "q24", isCorrect: true },
                    { text: "B. 恆小於 1", next: "q23_help", log: "Q23錯: Rf和R1都是正數，加上 1 必定大於 1" },
                    { text: "C. 必定為負數", next: "q23_help", log: "Q23錯: 非反相增益是正數" },
                    { text: "D. 可以是 0", next: "q23_help", log: "Q23錯: 除非輸入端短路到地" }
                ]
            },
            "q23_help": {
                tag: "💊 救援任務：數學的必然",
                text: "知識拆解：電阻 Rf 和 R1 都是大於等於零的實數。任何非負數加上「1」，最後的結果一定會落在什麼範圍？",
                options: [
                    { text: "A. 大於或等於 1", next: "q23", isCorrect: true },
                    { text: "B. 小於 1", next: "q23_help", log: "Q23救錯: 1 加上一個正數不可能變小啊！" }
                ]
            },

            // --- 第 24 關：比較器 ---
            "q24": {
                tag: "第 24 關：OPA 應用",
                text: "若 OPA 電路「完全沒有」接任何回授電阻（處於開迴路狀態），此時它被當作什麼電路使用？",
                options: [
                    { text: "A. 比較器 (Comparator)", next: "q25", isCorrect: true },
                    { text: "B. 積分器", next: "q24_help", log: "Q24錯: 積分器需要接電容當回授" },
                    { text: "C. 微分器", next: "q24_help", log: "Q24錯: 微分器需要電容在輸入端" },
                    { text: "D. 電壓隨耦器", next: "q24_help", log: "Q24錯: 隨耦器需要 100% 的負回授" }
                ]
            },
            "q24_help": {
                tag: "💊 救援任務：無限放大的暴走",
                text: "知識拆解：沒有負回授拉住它，OPA 的放大倍率會高達幾十萬倍。只要正端比負端大 0.001V，輸出就會瞬間衝到正最高。這就像是在「比較」兩端誰大誰小。",
                options: [
                    { text: "A. 比較器", next: "q24", isCorrect: true },
                    { text: "B. 積分器", next: "q24_help", log: "Q24救錯: 積分器必須有電容喔！" }
                ]
            },

            // --- 第 25 關：施密特觸發器 ---
            "q25": {
                tag: "第 25 關：OPA 應用",
                text: "「施密特觸發器 (Schmitt Trigger)」是將 OPA 加上了「正回授」。這樣做的主要目的是產生什麼特性，用來消除雜訊並將波形整型為方波？",
                options: [
                    { text: "A. 遲滯電壓 (Hysteresis)", next: "q26", isCorrect: true },
                    { text: "B. 虛擬短路", next: "q25_help", log: "Q25錯: 這是負回授的特性" },
                    { text: "C. 無限大頻寬", next: "q25_help", log: "Q25錯: OPA 頻寬受限於增益頻寬積" },
                    { text: "D. 完美的正弦波", next: "q25_help", log: "Q25錯: 正回授會讓輸出卡在飽和，變成方波" }
                ]
            },
            "q25_help": {
                tag: "💊 救援任務：上下限的差距",
                text: "知識拆解：正回授會讓觸發點變成兩個：上限電壓 (UTP) 與下限電壓 (LTP)。這中間有一段「不會動作的緩衝區」，能完美無視雜訊。這個緩衝區間稱為什麼？",
                options: [
                    { text: "A. 遲滯電壓", next: "q25", isCorrect: true },
                    { text: "B. 虛擬短路", next: "q25_help", log: "Q25救錯: 虛短路是「負」回授才有的！" }
                ]
            },

            // --- 第 26 關：主動濾波器 ---
            "q26": {
                tag: "第 26 關：濾波器",
                text: "主動濾波器 (Active Filter) 使用 OPA 搭配電阻和電容製成。相較於傳統 RLC 被動濾波器，主動濾波器免去了哪一種「體積龐大、容易受磁場干擾」的被動元件？",
                options: [
                    { text: "A. 電感器 (L)", next: "q27", isCorrect: true },
                    { text: "B. 電容器 (C)", next: "q26_help", log: "Q26錯: 主動濾波器仍需要電容來濾波" },
                    { text: "C. 電阻器 (R)", next: "q26_help", log: "Q26錯: OPA 電路一定需要電阻" },
                    { text: "D. 電晶體 (BJT)", next: "q26_help", log: "Q26錯: 這是主動元件" }
                ]
            },
            "q26_help": {
                tag: "💊 救援任務：又重又大的線圈",
                text: "知識拆解：要濾除特定頻率，傳統上需要會隨著頻率改變阻力的 L 和 C。但線圈(L)太笨重了無法塞進 IC 裡。主動濾波器靠 OPA 模擬，成功淘汰了誰？",
                options: [
                    { text: "A. 電感器 (L)", next: "q26", isCorrect: true },
                    { text: "B. 電容器 (C)", next: "q26_help", log: "Q26救錯: 濾波器還是得靠電容喔！" }
                ]
            },

            // --- 第 27 關：截止頻率 ---
            "q27": {
                tag: "第 27 關：濾波器",
                text: "在一階 RC 低通濾波器中，當頻率剛好達到「截止頻率 (fc)」時，其輸出的電壓大小會下降到最大值的幾倍？",
                options: [
                    { text: "A. 0.707 倍 (即 1/√2)", next: "q28", isCorrect: true },
                    { text: "B. 0.5 倍", next: "q27_help", log: "Q27錯: 這是功率的一半，不是電壓" },
                    { text: "C. 0 倍", next: "q27_help", log: "Q27錯: 濾波器沒有辦法瞬間完全砍斷波形" },
                    { text: "D. 1 倍", next: "q27_help", log: "Q27錯: 1 倍代表沒有衰減" }
                ]
            },
            "q27_help": {
                tag: "💊 救援任務：半功率點的真相",
                text: "知識拆解：截止頻率又叫「-3dB 點」或「半功率點」。功率 P = V² / R。要讓功率剩一半 (1/2)，電壓 V 必須是 1/√2 倍。大約是多少？",
                options: [
                    { text: "A. 0.707 倍", next: "q27", isCorrect: true },
                    { text: "B. 0.5 倍", next: "q27_help", log: "Q27救錯: 0.5 是功率喔，電壓要開根號！" }
                ]
            },

            // --- 第 28 關：振盪器條件 ---
            "q28": {
                tag: "第 28 關：振盪器",
                text: "若要使一個放大器電路產生不需外部輸入就能持續發出波形的「振盪 (Oscillation)」，必須加上哪一種回授網路？",
                options: [
                    { text: "A. 正回授 (Positive Feedback)", next: "q29", isCorrect: true },
                    { text: "B. 負回授 (Negative Feedback)", next: "q28_help", log: "Q28錯: 負回授是用來穩定放大器的，不會產生振盪" },
                    { text: "C. 零回授 (開迴路)", next: "q28_help", log: "Q28錯: 訊號不會循環，無法持續振盪" },
                    { text: "D. 電流回授", next: "q28_help", log: "Q28錯: 這不是決定振盪的關鍵，重點是回授的相位" }
                ]
            },
            "q28_help": {
                tag: "💊 救援任務：自己幫自己加油",
                text: "知識拆解：要維持振盪，拉回來的訊號必須跟原本前進的訊號「同相」，把波形越推越高，自己補充耗損的能量。同相位加回去，叫做什麼回授？",
                options: [
                    { text: "A. 正回授", next: "q28", isCorrect: true },
                    { text: "B. 負回授", next: "q28_help", log: "Q28救錯: 負回授會互相抵消，波形一下就平了！" }
                ]
            },

            // --- 第 29 關：巴克豪森 ---
            "q29": {
                tag: "第 29 關：振盪器",
                text: "根據巴克豪森準則 (Barkhausen Criterion)，電路要能維持穩定的等幅振盪，其迴路增益 (Aβ) 的大小必須等於多少？",
                options: [
                    { text: "A. 1", next: "q30", isCorrect: true },
                    { text: "B. 0", next: "q29_help", log: "Q29錯: 增益為0訊號就消失了" },
                    { text: "C. 無限大", next: "q29_help", log: "Q29錯: 這樣波形會無限制衝高變成方波失真" },
                    { text: "D. 0.5", next: "q29_help", log: "Q29錯: 這樣繞一圈能量少一半，波形會衰減停止" }
                ]
            },
            "q29_help": {
                tag: "💊 救援任務：不多也不少",
                text: "知識拆解：訊號在電路裡繞一圈。大於 1 波形會爆炸變成方波；小於 1 波形會越來越小直到平息。要維持「完美等幅」的波浪，繞一圈的倍率必須剛好是？",
                options: [
                    { text: "A. 1", next: "q29", isCorrect: true },
                    { text: "B. 0", next: "q29_help", log: "Q29救錯: 乘上 0 就什麼都不剩啦！" }
                ]
            },

            // 🏍️ 第 30 關：機車駕照
            "q30": {
                tag: "🏍️ 第 30 關：大腦休息 (生活)",
                text: "交通安全大會考！台灣機車駕照筆試必考題：騎乘機車行經路口，若遇到號誌為「閃爍的紅燈」，騎士應該遵守什麼規則？",
                options: [
                    { text: "A. 停車再開 (必須完全停止，確認無車後再行駛)", next: "q31", isCorrect: true },
                    { text: "B. 減速慢行 (不用停死，慢慢滑過去就好)", next: "q30_help", log: "Q30錯: 這是閃黃燈的規則" },
                    { text: "C. 加速通過 (趕快過避免危險)", next: "q30_help", log: "Q30錯: 這樣極度危險" },
                    { text: "D. 綠燈才能走 (一直等)", next: "q30_help", log: "Q30錯: 閃爍號誌代表該路口目前無紅綠燈管控" }
                ]
            },
            "q30_help": {
                tag: "💊 提示：紅色的警告",
                text: "紅色代表最高級的危險。閃紅燈的路權比較小，所以法規要求必須「把煞車按到底」，腳放下來踩地，確認安全才能走。",
                options: [
                    { text: "A. 停車再開", next: "q30", isCorrect: true },
                    { text: "B. 減速慢行", next: "q30_help", log: "Q30救錯: 閃黃燈才是減速慢行喔！" }
                ]
            },

            // --- 第 31 關：RC 相移振盪器 ---
            "q31": {
                tag: "第 31 關：低頻振盪",
                text: "在利用反相放大器組成的「RC 相移振盪器」中，通常會使用 3 組 RC 網路。請問每一組 RC 在振盪頻率時，大約負責提供多少度的相移？",
                options: [
                    { text: "A. 60 度", next: "q32", isCorrect: true },
                    { text: "B. 90 度", next: "q31_help", log: "Q31錯: 單一 RC 網路極限趨近 90，達不到 90，且三組會變 270" },
                    { text: "C. 180 度", next: "q31_help", log: "Q31錯: 三組加起來才是 180 度" },
                    { text: "D. 120 度", next: "q31_help", log: "Q31錯: 總數不對" }
                ]
            },
            "q31_help": {
                tag: "💊 救援任務：補齊 360 度",
                text: "知識拆解：反相放大器本身自帶 180 度反轉。要湊滿 360 度(同相)，外面的 RC 網路要負責提供剩下的 180 度。180 度分給 3 組 RC，每組負責多少？",
                options: [
                    { text: "A. 60 度", next: "q31", isCorrect: true },
                    { text: "B. 90 度", next: "q31_help", log: "Q31救錯: 3 乘 90 是 270，湊不齊啦！" }
                ]
            },

            // --- 第 32 關：韋恩電橋 ---
            "q32": {
                tag: "第 32 關：低頻振盪",
                text: "「韋恩電橋振盪器 (Wien-Bridge Oscillator)」是一種極為經典的音頻振盪電路。它最適合用來產生哪一種波形？",
                options: [
                    { text: "A. 低失真的正弦波", next: "q33", isCorrect: true },
                    { text: "B. 完美的方波", next: "q32_help", log: "Q32錯: 方波通常用多諧振盪器產生" },
                    { text: "C. 尖銳的三角波", next: "q32_help", log: "Q32錯: 三角波需用積分器" },
                    { text: "D. 鋸齒波", next: "q32_help", log: "Q32錯: 錯誤" }
                ]
            },
            "q32_help": {
                tag: "💊 救援任務：惠普的起家作",
                text: "知識拆解：HP 惠普公司的第一個產品就是用燈泡穩定的韋恩電橋。它利用串並聯 RC 網路，能產生非常滑順、沒有菱角的漂亮波浪。這是什麼波？",
                options: [
                    { text: "A. 正弦波", next: "q32", isCorrect: true },
                    { text: "B. 方波", next: "q32_help", log: "Q32救錯: 方波直上直下，失真極大！" }
                ]
            },

            // --- 第 33 關：石英晶體 ---
            "q33": {
                tag: "第 33 關：高頻振盪",
                text: "若我們的電子系統需要極高精準度與穩定度的時脈訊號（例如手錶、電腦 CPU），最適合使用下列哪一種振盪器？",
                options: [
                    { text: "A. 石英晶體振盪器 (Crystal Oscillator)", next: "q34", isCorrect: true },
                    { text: "B. 哈特萊振盪器 (Hartley)", next: "q33_help", log: "Q33錯: 這是 LC 振盪，受溫度影響大" },
                    { text: "C. 考畢子振盪器 (Colpitts)", next: "q33_help", log: "Q33錯: 也是 LC 振盪，穩定度普普" },
                    { text: "D. 阻緩振盪器", next: "q33_help", log: "Q33錯: 頻率極不穩定" }
                ]
            },
            "q33_help": {
                tag: "💊 救援任務：壓電效應",
                text: "知識拆解：有一種礦物切割後，通電會震動，震動會發電，這叫壓電效應。它的共振頻率準得嚇人，手錶上面都會寫它的英文 Quartz。它是誰？",
                options: [
                    { text: "A. 石英晶體振盪器", next: "q33", isCorrect: true },
                    { text: "B. 哈特萊振盪器", next: "q33_help", log: "Q33救錯: LC 振盪器很容易熱脹冷縮跑頻喔！" }
                ]
            },

            // --- 第 34 關：多諧振盪器 ---
            "q34": {
                tag: "第 34 關：波形產生",
                text: "多諧振盪器利用電容充放電來切換狀態。其中，一接上電源就會自動在 0 和 1 之間不斷跳動產生方波，完全「沒有穩定狀態」的是哪一種？",
                options: [
                    { text: "A. 無穩態多諧振盪器 (Astable)", next: "q35", isCorrect: true },
                    { text: "B. 單穩態多諧振盪器 (Monostable)", next: "q34_help", log: "Q34錯: 單穩態有一個穩定狀態，需觸發才動作" },
                    { text: "C. 雙穩態多諧振盪器 (Bistable)", next: "q34_help", log: "Q34錯: 雙穩態有兩個穩定狀態，像記憶體" },
                    { text: "D. 施密特觸發器", next: "q34_help", log: "Q34錯: 這是整形電路" }
                ]
            },
            "q34_help": {
                tag: "💊 救援任務：從名字找答案",
                text: "知識拆解：題目說它「完全沒有穩定的狀態」，一直震個不停。中文名字非常直白，就叫做「無」穩態！",
                options: [
                    { text: "A. 無穩態 (Astable)", next: "q34", isCorrect: true },
                    { text: "B. 單穩態", next: "q34_help", log: "Q34救錯: 單穩態戳一下動一下，不會自己一直震啦！" }
                ]
            },

            // --- 第 35 關：555 計時器 ---
            "q35": {
                tag: "第 35 關：IC 應用",
                text: "電子實習中最經典的「555 計時器 IC」，它內部包含三個用來設定比較器參考電壓 (2/3Vcc 與 1/3Vcc) 的分壓電阻。這三個電阻的阻值皆為多少？",
                options: [
                    { text: "A. 5 kΩ", next: "q36", isCorrect: true },
                    { text: "B. 500 Ω", next: "q35_help", log: "Q35錯: 阻值太小會很耗電" },
                    { text: "C. 5 Ω", next: "q35_help", log: "Q35錯: 這接近短路了" },
                    { text: "D. 555 Ω", next: "q35_help", log: "Q35錯: 這是陷阱選項！" }
                ]
            },
            "q35_help": {
                tag: "💊 救援任務：命名的都市傳說",
                text: "知識拆解：雖然發明人說名字是隨便取的，但在電子界大家口耳相傳，555 之所以叫 555，就是因為它裡面用了 3 顆「5 k歐姆」的電阻。是幾 k？",
                options: [
                    { text: "A. 5 kΩ", next: "q35", isCorrect: true },
                    { text: "B. 555 Ω", next: "q35_help", log: "Q35救錯: 這是出題老師最愛放的騙人選項！" }
                ]
            },

            // --- 第 36 關：A類放大 ---
            "q36": {
                tag: "第 36 關：功率放大",
                text: "在各類功率放大器中，哪一種放大器的電晶體「全週期 (360度)」都在導通狀態？它的優點是波形失真最小，但缺點是效率極低 (最高25%)。",
                options: [
                    { text: "A. A 類 (Class A)", next: "q37", isCorrect: true },
                    { text: "B. B 類 (Class B)", next: "q36_help", log: "Q36錯: B類只導通 180 度" },
                    { text: "C. AB 類 (Class AB)", next: "q36_help", log: "Q36錯: 介於 180~360 度間" },
                    { text: "D. C 類 (Class C)", next: "q36_help", log: "Q36錯: 導通角小於 180 度" }
                ]
            },
            "q36_help": {
                tag: "💊 救援任務：等級的劃分",
                text: "知識拆解：全開不休息、波形最完美，這是最原始也是音質最頂級的設計，通常排在第一名，所以是用英文字母的第一個字來命名。",
                options: [
                    { text: "A. A 類 (Class A)", next: "q36", isCorrect: true },
                    { text: "B. C 類 (Class C)", next: "q36_help", log: "Q36救錯: C 類效率超高但失真超大喔！" }
                ]
            },

            // --- 第 37 關：B類推挽 ---
            "q37": {
                tag: "第 37 關：功率放大",
                text: "為解決上述效率低下的問題，我們使用兩顆電晶體，一顆負責放大正半週，一顆負責負半週 (各自導通 180 度)。這種推挽式 (Push-Pull) 電路是哪一類放大器？",
                options: [
                    { text: "A. B 類 (Class B)", next: "q38", isCorrect: true },
                    { text: "B. A 類", next: "q37_help", log: "Q37錯: A 類是一個人全包 360 度" },
                    { text: "C. C 類", next: "q37_help", log: "Q37錯: C 類導通角小於 180" },
                    { text: "D. D 類", next: "q37_help", log: "Q37錯: 這是數位開關型" }
                ]
            },
            "q37_help": {
                tag: "💊 救援任務：一人一半",
                text: "知識拆解：A 類全通。把工作分給兩個人，一人負責一半(180度)，不用工作的時候就休息省電，效率大增。排在 A 後面的字母是？",
                options: [
                    { text: "A. B 類 (Class B)", next: "q37", isCorrect: true },
                    { text: "B. AB 類", next: "q37_help", log: "Q37救錯: AB 類是改良版，會多偷上一點點班喔！" }
                ]
            },

            // --- 第 38 關：交越失真 ---
            "q38": {
                tag: "第 38 關：功率放大",
                text: "承上題，B 類推挽式放大器在正負半週交替（電壓接近 0V）時，因為電晶體需要克服 0.7V 的切入電壓，會導致波形產生一段空窗期。這稱為什麼失真？",
                options: [
                    { text: "A. 交越失真 (Crossover Distortion)", next: "q39", isCorrect: true },
                    { text: "B. 頻率失真", next: "q38_help", log: "Q38錯: 這是因為不同頻率放大倍率不同造成的" },
                    { text: "C. 相位失真", next: "q38_help", log: "Q38錯: 這是時間延遲造成的" },
                    { text: "D. 截波失真", next: "q38_help", log: "Q38錯: 這是輸入太大撞到頂被削掉的飽和現象" }
                ]
            },
            "q38_help": {
                tag: "💊 救援任務：交接班的失誤",
                text: "知識拆解：上半週負責人下班了，下半週負責人因為要等 0.7V 才睡醒，中間有一小段時間兩個人都沒上工，訊號就斷掉了。在「交會越過」零點時的失真，叫什麼？",
                options: [
                    { text: "A. 交越失真", next: "q38", isCorrect: true },
                    { text: "B. 截波失真", next: "q38_help", log: "Q38救錯: 截波是在最頂端被砍頭，交越是在中間的 0 點！" }
                ]
            },

            // --- 第 39 關：AB類 ---
            "q39": {
                tag: "第 39 關：功率放大",
                text: "為了消除剛才提到的「交越失真」，我們在電路中加入二極體給予微小的順向偏壓，讓電晶體處於微導通狀態 (導通角略大於180度)。這成了哪一類放大器？",
                options: [
                    { text: "A. AB 類 (Class AB)", next: "q40", isCorrect: true },
                    { text: "B. A 類", next: "q39_help", log: "Q39錯: A 類是 360 度全通" },
                    { text: "C. B 類", next: "q39_help", log: "Q39錯: B 類有交越失真" },
                    { text: "D. C 類", next: "q39_help", log: "Q39錯: C 類失真最嚴重" }
                ]
            },
            "q39_help": {
                tag: "💊 救援任務：折衷的藝術",
                text: "知識拆解：A 類沒失真但超耗電，B 類很省電但有交越失真。我們取兩者的優點結合在一起，導通角介於 180~360 之間，所以名字就是把它們併起來！",
                options: [
                    { text: "A. AB 類", next: "q39", isCorrect: true },
                    { text: "B. C 類", next: "q39_help", log: "Q39救錯: C 類是拿來做射頻發射用的啦！" }
                ]
            },

            // 🏹 第 40 關：APEX
            "q40": {
                tag: "🏹 第 40 關：大腦休息 (遊戲)",
                text: "最後的娛樂題！在大逃殺遊戲《APEX 英雄》中，哪一位角色的終極技能是部署一個「滑索 (Zipline)」，讓全隊可以快速跨越地形與佔據高點？",
                options: [
                    { text: "A. 探路者 (Pathfinder)", next: "q41", isCorrect: true },
                    { text: "B. 惡靈 (Wraith)", next: "q40_help", log: "Q40錯: 惡靈是開傳送門" },
                    { text: "C. 辛烷 (Octane)", next: "q40_help", log: "Q40錯: 辛烷是放跳跳板" },
                    { text: "D. 尋血犬 (Bloodhound)", next: "q40_help", log: "Q40錯: 他是開大招抓人找足跡的" }
                ]
            },
            "q40_help": {
                tag: "💊 提示：找路的好朋友",
                text: "他是一個擁有笑臉螢幕的馬文機器人，常說「是時候盪滑索了！」。負責開路的先鋒叫做？",
                options: [
                    { text: "A. 探路者", next: "q40", isCorrect: true },
                    { text: "B. 辛烷", next: "q40_help", log: "Q40救錯: 辛烷是那個插管子一直跑的瘋子啦！" }
                ]
            },

            // --- 第 41 關：反相閘 ---
            "q41": {
                tag: "第 41 關：邏輯閘基礎",
                text: "在基礎邏輯電路中，哪一個邏輯閘的功能是「反相」？（輸入 1 則輸出 0；輸入 0 則輸出 1）",
                options: [
                    { text: "A. NOT 閘", next: "q42", isCorrect: true },
                    { text: "B. AND 閘", next: "q41_help", log: "Q41錯: 這是及閘" },
                    { text: "C. OR 閘", next: "q41_help", log: "Q41錯: 這是或閘" },
                    { text: "D. XOR 閘", next: "q41_help", log: "Q41錯: 這是互斥或閘" }
                ]
            },
            "q41_help": {
                tag: "💊 救援任務：唱反調",
                text: "知識拆解：英文裡面代表「不是、否定」的單字，就是這個邏輯閘的名字。你說 YES 他就說 NO。",
                options: [
                    { text: "A. NOT 閘", next: "q41", isCorrect: true },
                    { text: "B. AND 閘", next: "q41_help", log: "Q41救錯: AND 必須大家都同意才會過喔！" }
                ]
            },

            // --- 第 42 關：NAND 閘 ---
            "q42": {
                tag: "第 42 關：萬用閘",
                text: "將一個「及閘 (AND)」的輸出端，串接一個「反相器 (NOT)」，會形成哪一種常用的萬用邏輯閘？",
                options: [
                    { text: "A. NAND 閘 (反及閘)", next: "q43", isCorrect: true },
                    { text: "B. NOR 閘 (反或閘)", next: "q42_help", log: "Q42錯: 這是 OR + NOT" },
                    { text: "C. XNOR 閘", next: "q42_help", log: "Q42錯: 這是 XOR + NOT" },
                    { text: "D. BUFFER 閘", next: "q42_help", log: "Q42錯: 這是沒有反相的緩衝器" }
                ]
            },
            "q42_help": {
                tag: "💊 救援任務：英文拼字",
                text: "知識拆解：把 NOT 的 N，加在 AND 的前面。組合起來的英文字是什麼？",
                options: [
                    { text: "A. NAND 閘", next: "q42", isCorrect: true },
                    { text: "B. NOR 閘", next: "q42_help", log: "Q42救錯: NOR 是 NOT + OR 啦！" }
                ]
            },

            // --- 第 43 關：7805 穩壓 ---
            "q43": {
                tag: "第 43 關：電源電路",
                text: "實習課中極為常用的三端子線性穩壓 IC 「7805」，當它正常工作時，輸出端 (OUT) 的直流電壓恆為多少伏特？",
                options: [
                    { text: "A. + 5 V", next: "q44", isCorrect: true },
                    { text: "B. - 5 V", next: "q43_help", log: "Q43錯: 負電壓穩壓是 79 開頭" },
                    { text: "C. + 12 V", next: "q43_help", log: "Q43錯: 這是 7812" },
                    { text: "D. + 8 V", next: "q43_help", log: "Q43錯: 這是 7808" }
                ]
            },
            "q43_help": {
                tag: "💊 救援任務：密碼在尾巴",
                text: "知識拆解：78 系列代表「正電壓」，後面兩位數字直接告訴你它輸出的電壓值。78『05』代表幾伏特？",
                options: [
                    { text: "A. + 5 V", next: "q43", isCorrect: true },
                    { text: "B. + 12 V", next: "q43_help", log: "Q43救錯: 那你要買 7812 才能輸出 12V 喔！" }
                ]
            },

            // --- 第 44 關：SMPS ---
            "q44": {
                tag: "第 44 關：電源電路",
                text: "相較於會發出高熱的傳統線性穩壓器，現代的手機充電器與電腦電源多採用「切換式電源供應器 (SMPS)」。其最大的優點為何？",
                options: [
                    { text: "A. 轉換效率極高，體積小", next: "q45", isCorrect: true },
                    { text: "B. 電路極度簡單", next: "q44_help", log: "Q44錯: SMPS 電路比線性複雜很多" },
                    { text: "C. 輸出完全沒有雜訊", next: "q44_help", log: "Q44錯: 高頻切換會產生高頻切換雜訊" },
                    { text: "D. 只能降壓不能升壓", next: "q44_help", log: "Q44錯: SMPS 可以輕易做到升壓(Boost)" }
                ]
            },
            "q44_help": {
                tag: "💊 救援任務：不發熱的優勢",
                text: "知識拆解：它利用電晶體做高速的「開與關(切換)」，不導通時沒電流，全導通時沒壓降，所以幾乎不產生廢熱。不發熱代表能源沒有浪費，也就是？",
                options: [
                    { text: "A. 效率極高", next: "q44", isCorrect: true },
                    { text: "B. 完全沒雜訊", next: "q44_help", log: "Q44救錯: 高速開關反而會有很多雜訊喔，需要好好濾波！" }
                ]
            },

            // 🏆 第 45 關：魔王題 (故障排除)
            "q45": {
                tag: "🏆 最終關：實習除錯",
                text: "大魔王！你在實習工場組裝 OPA 反相放大器，輸入 1V 正弦波，設計增益為 -20 倍。接上示波器後，卻發現輸出的波形在 +15V 與 -15V 的地方被「削平」了。這最可能是什麼原因？",
                options: [
                    { text: "A. 放大後的電壓超過了 OPA 供電電壓，導致飽和失真", next: "end", isCorrect: true },
                    { text: "B. 輸入訊號太小了", next: "q45_help", log: "Q45錯: 太小波形不會被削平" },
                    { text: "C. 電阻燒毀斷路了", next: "q45_help", log: "Q45錯: 斷路就不會有波形了" },
                    { text: "D. 示波器探棒接反了", next: "q45_help", log: "Q45錯: 接反只會上下顛倒，不會削平" }
                ]
            },
            "q45_help": {
                tag: "💊 救援任務：能量守恆的極限",
                text: "知識拆解：設計放大 20 倍，1V 進去照理說要出 20V。但 OPA 電路板的電源通常只給 ±15V。就像你身高 200 公分，卻走進只有 150 公分高的天花板，頭當然會撞到(削平)。這叫？",
                options: [
                    { text: "A. 超過供電，飽和失真", next: "q45", isCorrect: true },
                    { text: "B. 示波器壞掉", next: "q45_help", log: "Q45救錯: 這是物理極限，不要怪示波器啦！" }
                ]
            }
        };


        // ==========================================
        // 系統變數與遊戲邏輯
        // ==========================================
        let studentName = "";
        let currentStep = "q1"; 
        let hp = 30; 
        let currentStreak = 0; 
        let diagnosticLogs = [];
        let sessionCards = []; 
        let failedQuestions = []; 
        let startTime = 0;           
        let totalTime = 0;           
        let rescueTriggered = 0;     
        let rescueFails = 0;
        let isTransitioning = false; 
        
        // 🚨 預設卡包改為第二階段 (phase2)
        let currentPackId = "phase2"; 

        // 確保網頁載入完成後才執行選單初始化
        document.addEventListener('DOMContentLoaded', () => {
            initPackSelector();
        });

        function initPackSelector() {
            const selector = document.getElementById('pack-selector');
            if (!selector) return;
            selector.innerHTML = '';
            Object.keys(cardPacks).forEach(key => {
                if (cardPacks[key].cards.length > 0) {
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            let inputName = document.getElementById('student-name').value.trim();
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            let inputName = document.getElementById('student-name').value.trim();
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            studentName = document.getElementById('student-name').value.trim();
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                btn.innerText = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            if (!cardPacks[currentPackId]) currentPackId = "phase1";
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';
        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            if(!scriptURL) return;
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData }).catch(e=>console.log(e));
        }

        async function syncCloudData() {
            let inputName = document.getElementById('student-name').value.trim();
            if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                let response = await fetch(scriptURL + "?name=" + encodeURIComponent(inputName), { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    localStorage.setItem("gachaCollection_" + inputName, result.data);
                    alert("✅ 雲端同步成功！已為您載入最新的圖鑑進度！\n您可以點擊「查看我的圖鑑」確認。");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
