        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                text: "【推演任務】電池的正極(放電洞)接在 P端，電池的負極(放電子)接在 N端。同性相斥，兩邊的載子被電池「用力往中間擠」。被擠壓的空乏區會？",
                options: [
                    { text: "變窄", next: "q9", isCorrect: true },
                    { text: "變寬", next: "q9_help", log: "Q9救錯: 被兩面包夾擠壓，寬度當然是變窄呀！" }
                ]
            },

            // --- 第 10 關：逆向偏壓 ---
            "q10": {
                tag: "第 10 關：二極體偏壓",
                text: "當二極體加上「逆向偏壓」時，空乏區變寬，此時只剩下極微小的電流流過，這股由「少數載子」所造成的微小電流稱為什麼？",
                options: [
                    { text: "逆向飽和電流 (漏電流)", next: "q11", isCorrect: true },
                    { text: "順向導通電流", next: "q10_help", log: "Q10錯: 現在是逆向狀態" },
                    { text: "突崩電流", next: "q10_help", log: "Q10錯: 這是電壓過高擊穿時的龐大電流" },
                    { text: "位移電流", next: "q10_help", log: "Q10錯: 這與二極體偏壓無關" }
                ]
            },
            "q10_help": {
                tag: "🔍 PBL 詞意解析：關不緊的水龍頭",
                text: "【解析任務】逆向偏壓就像把水龍頭關緊，但因為半導體會受熱能影響產生少數載子，導致仍會「漏」出一點點水。所以這個電流又俗稱什麼？",
                options: [
                    { text: "漏電流 (逆向飽和電流)", next: "q10", isCorrect: true },
                    { text: "突崩電流", next: "q10_help", log: "Q10救錯: 突崩是水管直接爆開的大洪水，題目說的是「極微小」的電流喔！" }
                ]
            },

            // --- 第 11 關：漏電流與溫度 ---
            "q11": {
                tag: "第 11 關：二極體特性",
                text: "承上題，二極體的「逆向飽和電流 ($I_S$)」對溫度非常敏感。根據經驗法則，溫度每上升 $10^\\circ C$，逆向飽和電流會如何變化？",
                options: [
                    { text: "增加約 1 倍 (變為原來的 2 倍)", next: "q12", isCorrect: true },
                    { text: "增加約 10 倍", next: "q11_help", log: "Q11錯: 這樣增加太快了，元件會立刻燒毀" },
                    { text: "減少一半", next: "q11_help", log: "Q11錯: 溫度上升，少數載子變多，漏電會變嚴重" },
                    { text: "維持不變", next: "q11_help", log: "Q11錯: 半導體特性極容易受溫度影響" }
                ]
            },
            "q11_help": {
                tag: "📖 PBL 翻書任務：倍增的危險",
                text: "【查閱任務】請查閱課本關於二極體的「溫度效應」。這是一個幾何級數的成長，溫度越高，漏電流越大，每隔 10度 就會翻倍！",
                options: [
                    { text: "變為原來的 2 倍", next: "q11", isCorrect: true },
                    { text: "減少一半", next: "q11_help", log: "Q11救錯: 溫度越高，熱激發的載子越多，水龍頭會漏得更嚴重喔！" }
                ]
            },

            // 🌸 第 12 關：咒術迴戰 (五條悟)
            "q12": {
                tag: "🌸 第 12 關：大腦休息 (咒術迴戰)",
                text: "《咒術迴戰》中，被譽為現代最強咒術師的「五條悟」，他的專屬領域展開稱為什麼？(可以讓對手大腦接收無盡的資訊而停機)",
                options: [
                    { text: "無量空處", next: "q13", isCorrect: true },
                    { text: "伏魔御廚子", next: "q12_help", log: "Q12錯: 這是宿儺的領域" },
                    { text: "蓋棺鐵圍山", next: "q12_help", log: "Q12錯: 這是漏瑚的領域" },
                    { text: "自閉圓頓裹", next: "q12_help", log: "Q12錯: 這是真人的領域" }
                ]
            },
            "q12_help": {
                tag: "📺 PBL 動漫回憶：拉下眼罩的瞬間",
                text: "【回憶任務】當五條老師單手結印，拉下黑色眼罩時，會把對手拉進一個宇宙般的空間，讓對手感受到「無量」的知識灌入。叫做什麼？",
                options: [
                    { text: "無量空處", next: "q12", isCorrect: true },
                    { text: "伏魔御廚子", next: "q12_help", log: "Q12救錯: 御廚子是拿來切菜(斬擊)的，五條老師這招是精神攻擊喔！" }
                ]
            },

            // --- 第 13 關：稽納二極體 ---
            "q13": {
                tag: "第 13 關：二極體應用",
                text: "一般二極體若加上過大的逆向電壓會被燒毀。但有一種特殊二極體，天生就是設計要操作在「逆向崩潰區」，用來提供穩定的參考電壓。它是？",
                options: [
                    { text: "稽納二極體 (Zener Diode)", next: "q14", isCorrect: true },
                    { text: "發光二極體 (LED)", next: "q13_help", log: "Q13錯: LED 是操作在順向區" },
                    { text: "變容二極體 (Varactor)", next: "q13_help", log: "Q13錯: 變容是利用逆向空乏區當電容用，不崩潰" },
                    { text: "蕭特基二極體 (Schottky Diode)", next: "q13_help", log: "Q13錯: 這是用來做高速開關的" }
                ]
            },
            "q13_help": {
                tag: "🔍 PBL 情報搜索：穩壓的守護神",
                text: "【搜索任務】請上網 Google 搜尋「穩壓二極體」。它的符號是在三角形前面加一個類似 Z 字形的線條，代表它的英文開頭字母。",
                options: [
                    { text: "稽納二極體 (Zener)", next: "q13", isCorrect: true },
                    { text: "變容二極體", next: "q13_help", log: "Q13救錯: 變容二極體是當作可調電容使用，並不是用來穩壓的喔！" }
                ]
            },

            // --- 第 14 關：LED 發光原理 ---
            "q14": {
                tag: "第 14 關：二極體應用",
                text: "關於發光二極體 (LED)，它能發出紅光、綠光或藍光，主要是由下列哪一個因素決定的？",
                options: [
                    { text: "半導體材料的能隙 (Energy Gap) 大小", next: "q15", isCorrect: true },
                    { text: "順向偏壓的大小", next: "q14_help", log: "Q14錯: 電壓只會影響亮度，無法改變發光波長" },
                    { text: "外部封裝塑膠殼的顏色", next: "q14_help", log: "Q14錯: 雖然殼有顏色，但光源本質是看材料" },
                    { text: "摻雜的雜質濃度多寡", next: "q14_help", log: "Q14錯: 這影響的是崩潰電壓" }
                ]
            },
            "q14_help": {
                tag: "🛠️ PBL 邏輯推演：跳台的高度",
                text: "【推演任務】LED 發光是因為電子從高處跳進電洞(低處)，釋放出能量(光)。「跳台的高度」決定了釋放能量的多寡，進而決定了光的顏色。這個跳台稱為什麼？",
                options: [
                    { text: "半導體材料的能隙", next: "q14", isCorrect: true },
                    { text: "順向偏壓的大小", next: "q14_help", log: "Q14救錯: 你拿更高的電壓去推它，它只會更亮，或者直接燒掉，不會變成別種光喔！" }
                ]
            },

            // --- 第 15 關：光電二極體 ---
            "q15": {
                tag: "第 15 關：二極體應用",
                text: "「光電二極體 (Photodiode)」常被用作光感測器或遙控器的接收端。為了讓它對光線變化最敏感，通常會將它操作在哪一種偏壓狀態？",
                options: [
                    { text: "逆向偏壓", next: "q16", isCorrect: true },
                    { text: "順向偏壓", next: "q15_help", log: "Q15錯: 順向時電流已經很大，光照產生的微小電流會被蓋過去" },
                    { text: "零偏壓", next: "q15_help", log: "Q15錯: 零偏壓沒有電場驅動載子" },
                    { text: "交流偏壓", next: "q15_help", log: "Q15錯: 這樣訊號會亂跳" }
                ]
            },
            "q15_help": {
                tag: "🧠 PBL 邏輯推演：安靜的背景",
                text: "【推演任務】如果要在吵雜的夜市聽到一根針掉地上的聲音，可能嗎？不可能！光照產生的電流很微小，所以我們必須把背景電流關到最小 (幾乎不通電的狀態)，才能測到。這是哪種偏壓？",
                options: [
                    { text: "逆向偏壓", next: "q15", isCorrect: true },
                    { text: "順向偏壓", next: "q15_help", log: "Q15救錯: 順向偏壓就是夜市模式，電流滔滔不絕，根本量不到微弱的光電流啦！" }
                ]
            },

            // --- 第 16 關：BJT 結構 ---
            "q16": {
                tag: "第 16 關：BJT 電晶體",
                text: "雙極性接面電晶體 (BJT) 包含射極(E)、基極(B)、集極(C)三個區域。請問哪一個區域的「摻雜濃度最高」，負責發射出大量載子？",
                options: [
                    { text: "射極 (Emitter, E)", next: "q17", isCorrect: true },
                    { text: "基極 (Base, B)", next: "q16_help", log: "Q16錯: 基極摻雜最淡" },
                    { text: "集極 (Collector, C)", next: "q16_help", log: "Q16錯: 集極摻雜中等，但面積最大" },
                    { text: "三者摻雜濃度一樣", next: "q16_help", log: "Q16錯: 不一樣，否則無法發揮放大作用" }
                ]
            },
            "q16_help": {
                tag: "🔍 PBL 詞意解析：看英文縮寫",
                text: "【解析任務】Emit 的英文意思是「發射」。這個區域的任務就是要瘋狂射出電子大軍，所以必須摻雜得非常濃。它對應的字母是？",
                options: [
                    { text: "射極 (E)", next: "q16", isCorrect: true },
                    { text: "基極 (B)", next: "q16_help", log: "Q16救錯: 基極的任務是偷偷開個小門，不是負責發射大軍喔！" }
                ]
            },

            // --- 第 17 關：BJT 面積 ---
            "q17": {
                tag: "第 17 關：BJT 電晶體",
                text: "承上題，在 BJT 結構中，哪一個區域的「物理面積最大」，以利於收集載子並散發運作時產生的熱量？",
                options: [
                    { text: "集極 (Collector, C)", next: "q18", isCorrect: true },
                    { text: "射極 (Emitter, E)", next: "q17_help", log: "Q17錯: 射極濃度最高，但面積不是最大" },
                    { text: "基極 (Base, B)", next: "q17_help", log: "Q17錯: 基極的面積與寬度都是最窄的" },
                    { text: "閘極 (Gate, G)", next: "q17_help", log: "Q17錯: 這是 FET 的端點，BJT 沒有閘極" }
                ]
            },
            "q17_help": {
                tag: "🛠️ PBL 邏輯推演：熱量的去處",
                text: "【推演任務】電子被發射出去後，最後都要跑到「收集站」。因為大家擠在一起衝進來會產生極大的高溫，所以這個收集站的房子必須蓋得最大來散熱。收集 (Collect) 是哪一極？",
                options: [
                    { text: "集極 (C)", next: "q17", isCorrect: true },
                    { text: "基極 (B)", next: "q17_help", log: "Q17救錯: 基極超級無敵窄，沒辦法收集跟散熱喔！" }
                ]
            },

            // 🌸 第 18 關：咒術迴戰 (伏黑)
            "q18": {
                tag: "🌸 第 18 關：大腦休息 (咒術迴戰)",
                text: "《咒術迴戰》中，伏黑惠使用的術式為禪院家相傳的「十種影法術」。其中他最常召喚出來代步、索敵，一黑一白的犬型式神叫什麼？",
                options: [
                    { text: "玉犬", next: "q19", isCorrect: true },
                    { text: "鵺", next: "q18_help", log: "Q18錯: 鵺是會飛的鳥類式神" },
                    { text: "滿象", next: "q18_help", log: "Q18錯: 滿象是大象，用來噴水的" },
                    { text: "魔虛羅", next: "q18_help", log: "Q18錯: 這是他用來同歸於盡的最強式神" }
                ]
            },
            "q18_help": {
                tag: "📺 PBL 動漫回憶：超可愛的狗狗",
                text: "【回憶任務】前期最常出現的式神，摸起來毛茸茸的，一黑一白，甚至還被五條老師當作毛絨玩具摸。牠們是？",
                options: [
                    { text: "玉犬", next: "q18", isCorrect: true },
                    { text: "魔虛羅", next: "q18_help", log: "Q18救錯: 召喚魔虛羅大家就一起死啦，怎麼可能拿來代步！" }
                ]
            },

            // --- 第 19 關：BJT 作用區 ---
            "q19": {
                tag: "第 19 關：BJT 偏壓狀態",
                text: "若要讓 BJT 電晶體擔任「線性放大器」的角色，它必須操作在「作用區 (Active Region)」。此時其兩個接面的偏壓必須如何設定？",
                options: [
                    { text: "B-E 順向，B-C 逆向", next: "q20", isCorrect: true },
                    { text: "B-E 順向，B-C 順向", next: "q19_help", log: "Q19錯: 兩個都順向會進入「飽和區」，變成短路開關" },
                    { text: "B-E 逆向，B-C 逆向", next: "q19_help", log: "Q19錯: 兩個都逆向會進入「截止區」，變成斷路開關" },
                    { text: "B-E 逆向，B-C 順向", next: "q19_help", log: "Q19錯: 這是反轉區，極少使用" }
                ]
            },
            "q19_help": {
                tag: "📖 PBL 翻書任務：前門開、後門關",
                text: "【查閱任務】請查閱 BJT 工作原理。BJT 要放大，必須讓前門(B-E)暢通讓電子進來，所以是「順向」；後門(B-C)要負責擋住高壓並收集，所以是「逆向」。",
                options: [
                    { text: "B-E 順向，B-C 逆向", next: "q19", isCorrect: true },
                    { text: "兩個都順向", next: "q19_help", log: "Q19救錯: 兩個門都大開就變成「飽和」的導線了，沒辦法控制水流放大喔！" }
                ]
            },

            // --- 第 20 關：BJT 飽和區 ---
            "q20": {
                tag: "第 20 關：BJT 偏壓狀態",
                text: "當我們把 BJT 電晶體拿來當作「數位邏輯開關」使用，且希望開關處於「導通 (ON)」狀態時，應使其操作在哪個區域？",
                options: [
                    { text: "飽和區 (Saturation Region)", next: "q21", isCorrect: true },
                    { text: "截止區 (Cutoff Region)", next: "q20_help", log: "Q20錯: 這是開關 OFF 的狀態" },
                    { text: "作用區 (Active Region)", next: "q20_help", log: "Q20錯: 這是類比放大的狀態" },
                    { text: "崩潰區 (Breakdown Region)", next: "q20_help", log: "Q20錯: 開關會燒毀" }
                ]
            },
            "q20_help": {
                tag: "🛠️ PBL 邏輯推演：水管全開",
                text: "【推演任務】開關要導通，代表水管要完全暢通，沒有任何阻力。當電流大到「無法再大、水管已經滿出來」的時候，這個狀態叫做？",
                options: [
                    { text: "飽和區", next: "q20", isCorrect: true },
                    { text: "截止區", next: "q20_help", log: "Q20救錯: 截止是完全不通水，也就是開關 OFF 的狀態喔！" }
                ]
            },

            // --- 第 21 關：BJT 電流公式 ---
            "q21": {
                tag: "第 21 關：BJT 參數計算",
                text: "在 BJT 電晶體中，射極電流 ($I_E$)、基極電流 ($I_B$) 與集極電流 ($I_C$) 之間的關係，下列何者永遠成立？",
                options: [
                    { text: " $I_E = I_B + I_C$ ", next: "q22", isCorrect: true },
                    { text: " $I_C = I_B + I_E$ ", next: "q21_help", log: "Q21錯: IE 是最大的，不能放在等號右邊被加" },
                    { text: " $I_B = I_E + I_C$ ", next: "q21_help", log: "Q21錯: IB 是最小的" },
                    { text: " $I_E = I_C - I_B$ ", next: "q21_help", log: "Q21錯: 符號顛倒了" }
                ]
            },
            "q21_help": {
                tag: "🧠 PBL 邏輯推演：水流分配",
                text: "【推演任務】想像射極 (E) 是主要的水管，發射出 100% 的水流。水流遇到分岔，極少部分 (1%) 流進基極 (B)，剩下的大部分 (99%) 流進集極 (C)。所以誰等於誰加誰？",
                options: [
                    { text: "IE = IB + IC", next: "q21", isCorrect: true },
                    { text: "IB = IE + IC", next: "q21_help", log: "Q21救錯: IB 是超級無敵小的電流，怎麼可能是兩個大電流相加啦！" }
                ]
            },

            // --- 第 22 關：Alpha 值 ---
            "q22": {
                tag: "第 22 關：BJT 參數計算",
                text: "BJT 的「共基極電流增益」用希臘字母 $\\alpha$ (Alpha) 表示，它的定義是「輸出電流 ($I_C$) 與 輸入電流 ($I_E$) 的比值」。請問 $\\alpha$ 的值通常落在哪個範圍？",
                options: [
                    { text: "非常接近 1，但小於 1 (如 0.98)", next: "q23", isCorrect: true },
                    { text: "遠大於 1 (如 100)", next: "q22_help", log: "Q22錯: 這是 Beta 的範圍" },
                    { text: "等於 0", next: "q22_help", log: "Q22錯: 這樣就沒有電流傳遞了" },
                    { text: "可以大於 2", next: "q22_help", log: "Q22錯: IC 永遠不可能大於 IE" }
                ]
            },
            "q22_help": {
                tag: "🛠️ PBL 邏輯推演：誰比較大",
                text: "【推演任務】剛剛學過 $I_E = I_B + I_C$。既然 $I_E$ 是全部的總和，$I_C$ 只是分出去的一部分，那 $\\alpha = I_C / I_E$ 這個分數，分子小於分母，結果一定會怎樣？",
                options: [
                    { text: "小於 1，但很接近 1", next: "q22", isCorrect: true },
                    { text: "大於 1", next: "q22_help", log: "Q22救錯: 分子小於分母，算出來絕對不會超過 1 喔！" }
                ]
            },

            // --- 第 23 關：Beta 值 ---
            "q23": {
                tag: "第 23 關：BJT 參數計算",
                text: "承上題，「共射極電流增益」用 $\\beta$ (Beta) 表示，定義為 $I_C / I_B$。如果某電晶體的 $\\alpha = 0.98$，請利用公式換算，其 $\\beta$ 值為多少？",
                options: [
                    { text: "49", next: "q24", isCorrect: true },
                    { text: "50", next: "q23_help", log: "Q23錯: 這是 1+Beta 的值" },
                    { text: "98", next: "q23_help", log: "Q23錯: 計算錯誤" },
                    { text: "0.02", next: "q23_help", log: "Q23錯: 這是 1-Alpha 的值" }
                ]
            },
            "q23_help": {
                tag: "📖 PBL 翻書任務：參數換算公式",
                text: "【查閱任務】統測必考公式：$\\beta = \\alpha / (1 - \\alpha)$。把 0.98 帶進去：0.98 / (1 - 0.98) = 0.98 / 0.02。拿紙筆算一下！",
                options: [
                    { text: "49", next: "q23", isCorrect: true },
                    { text: "50", next: "q23_help", log: "Q23救錯: 0.98 除以 0.02 等於 49，不要多加 1 喔！" }
                ]
            },

            // 🌸 第 24 關：咒術迴戰 (七海建人)
            "q24": {
                tag: "🌸 第 24 關：大腦休息 (咒術迴戰)",
                text: "《咒術迴戰》中，超厭世的前上班族咒術師「七海建人 (娜娜明)」，他的專屬術式「十劃咒法」，會將目標強制劃分為幾比幾的比例，並攻擊那個點造成暴擊？",
                options: [
                    { text: "7 : 3", next: "q25", isCorrect: true },
                    { text: "5 : 5", next: "q24_help", log: "Q24錯: 這樣就只是對半砍而已" },
                    { text: "8 : 2", next: "q24_help", log: "Q24錯: 比例不對" },
                    { text: "9 : 1", next: "q24_help", log: "Q24錯: 比例不對" }
                ]
            },
            "q24_help": {
                tag: "📺 PBL 動漫回憶：他的名字",
                text: "【回憶任務】仔細想想他的名字「七海建人」(Nanami)。在日文裡，他的名字發音跟這兩個數字的組合非常有關聯喔！",
                options: [
                    { text: "7 : 3", next: "q24", isCorrect: true },
                    { text: "5 : 5", next: "q24_help", log: "Q24救錯: 七海的術式就是 7:3 啦！" }
                ]
            },

            // --- 第 25 關：CE 放大器 ---
            "q25": {
                tag: "第 25 關：BJT 放大器",
                text: "在 BJT 的三種放大器組態中，「共射極 (CE)」放大器最常被使用。請問它有一個非常獨特的缺點(或特徵)，是其他兩種組態沒有的？",
                options: [
                    { text: "輸出訊號與輸入訊號反相 (相差 180 度)", next: "q26", isCorrect: true },
                    { text: "電壓增益小於 1", next: "q25_help", log: "Q25錯: CE 的電壓增益很大" },
                    { text: "電流增益小於 1", next: "q25_help", log: "Q25錯: 這是 CB 組態的特徵" },
                    { text: "輸入阻抗無限大", next: "q25_help", log: "Q25錯: 這是 FET 的特徵" }
                ]
            },
            "q25_help": {
                tag: "🔍 PBL 詞意解析：反相放大",
                text: "【解析任務】請回想實驗課接 CE 電路看示波器時。當輸入波形往上衝(電壓變大)時，電晶體導通更多電流，導致輸出端(接在集極的電阻下緣)的電壓反而被拉下來。這代表波形會？",
                options: [
                    { text: "波形反相 (180度)", next: "q25", isCorrect: true },
                    { text: "電壓增益小於 1", next: "q25_help", log: "Q25救錯: CE 的電壓和電流增益都很大(功率增益最高)，唯一要注意的是它會上下顛倒(反相)！" }
                ]
            },

            // --- 第 26 關：早期效應 ---
            "q26": {
                tag: "第 26 關：BJT 進階特性",
                text: "在 BJT 中，當集極-基極 (C-B) 的逆向偏壓增加時，會導致 B-C 介面的空乏區向基極內部擴張，使得「有效的基極寬度變窄」。這個現象稱為什麼？",
                options: [
                    { text: "早期效應 (Early Effect)", next: "q27", isCorrect: true },
                    { text: "密勒效應 (Miller Effect)", next: "q26_help", log: "Q26錯: 這是關於回授電容放大的效應" },
                    { text: "霍爾效應 (Hall Effect)", next: "q26_help", log: "Q26錯: 這是磁場產生電壓的效應" },
                    { text: "壓電效應 (Piezoelectric Effect)", next: "q26_help", log: "Q26錯: 這是壓力產生電壓的效應" }
                ]
            },
            "q26_help": {
                tag: "📖 PBL 翻書任務：發現者的名字",
                text: "【查閱任務】這個現象也被稱為「基極寬度調變效應」。它是以美國工程師 James M. _______ 的姓氏來命名的。這個英文字也是「提早」的意思。",
                options: [
                    { text: "早期效應 (Early)", next: "q26", isCorrect: true },
                    { text: "密勒效應", next: "q26_help", log: "Q26救錯: 密勒 (Miller) 是在算高頻響應時把電容拆成兩半的效應喔！" }
                ]
            },

            // --- 第 27 關：FET 控制方式 ---
            "q27": {
                tag: "第 27 關：FET 基礎",
                text: "BJT 被稱為「電流控制元件」，因為它用微小的 IB 控制巨大的 IC。那麼，場效電晶體 (FET) 是一種什麼控制元件？",
                options: [
                    { text: "電壓控制元件", next: "q28", isCorrect: true },
                    { text: "電流控制元件", next: "q27_help", log: "Q27錯: 這是 BJT" },
                    { text: "溫度控制元件", next: "q27_help", log: "Q27錯: 不對" },
                    { text: "電阻控制元件", next: "q27_help", log: "Q27錯: 不對" }
                ]
            },
            "q27_help": {
                tag: "🛠️ PBL 邏輯推演：場效的意義",
                text: "【推演任務】FET 的全名是 Field Effect Transistor。它是利用「電場」的效應來把通道夾扁。而產生靜電場的來源，是不需要流動的「電壓」。所以它是？",
                options: [
                    { text: "電壓控制元件", next: "q27", isCorrect: true },
                    { text: "電流控制元件", next: "q27_help", log: "Q27救錯: FET 的閘極幾乎沒有電流流進去，它是純粹靠「電壓」隔空發功的！" }
                ]
            },

            // --- 第 28 關：FET 載子 ---
            "q28": {
                tag: "第 28 關：FET 基礎",
                text: "BJT 全名是雙極性接面電晶體 (Bipolar)，因為它內部同時依靠電子與電洞來導電。請問 FET 屬於什麼極性的元件？",
                options: [
                    { text: "單極性元件 (Unipolar)", next: "q29", isCorrect: true },
                    { text: "雙極性元件 (Bipolar)", next: "q28_help", log: "Q28錯: 這是 BJT 的特色" },
                    { text: "無極性元件", next: "q28_help", log: "Q28錯: FET 還是有依賴載子導電" },
                    { text: "多極性元件", next: "q28_help", log: "Q28錯: 沒有這種分類" }
                ]
            },
            "q28_help": {
                tag: "🔍 PBL 詞意解析：只有一種員工",
                text: "【解析任務】N通道的 FET 只靠「電子」導電；P通道的 FET 只靠「電洞」導電。無論哪一種，它每次運作都只靠「單一」一種載子。所以稱為？",
                options: [
                    { text: "單極性元件", next: "q28", isCorrect: true },
                    { text: "雙極性元件", next: "q28_help", log: "Q28救錯: 雙極性是 BJT (Bipolar) 專用的名稱喔！" }
                ]
            },

            // --- 第 29 關：FET 輸入阻抗 ---
            "q29": {
                tag: "第 29 關：FET 基礎",
                text: "與 BJT 相比，FET 在測量儀器或多級放大器的第一級非常受歡迎，主要是因為它具備哪一項非常突出的優點？",
                options: [
                    { text: "輸入阻抗極高", next: "q30", isCorrect: true },
                    { text: "電壓增益極大", next: "q29_help", log: "Q29錯: FET 的電壓增益通常比 BJT 小" },
                    { text: "輸出阻抗極大", next: "q29_help", log: "Q29錯: 放大器通常希望輸出阻抗小" },
                    { text: "不需要直流偏壓", next: "q29_help", log: "Q29錯: 任何放大器都需要偏壓" }
                ]
            },
            "q29_help": {
                tag: "🧠 PBL 邏輯推演：不吃別人的電",
                text: "【推演任務】FET 的輸入端(閘極)幾乎沒有電流流得進去。根據歐姆定律 R = V / I，當電流 (I) 趨近於零時，它的電阻 (阻抗) 就會變得如何？",
                options: [
                    { text: "輸入阻抗極高", next: "q29", isCorrect: true },
                    { text: "電壓增益極大", next: "q29_help", log: "Q29救錯: FET 的放大能力 (gm) 其實比 BJT 差，它最大的賣點是不會消耗前端的訊號(阻抗高)！" }
                ]
            },

            // 🌸 第 30 關：咒術迴戰 (釘崎)
            "q30": {
                tag: "🌸 第 30 關：大腦休息 (咒術迴戰)",
                text: "《咒術迴戰》中，個性豪爽的東京校一年級女學生「釘崎野薔薇」，她戰鬥時使用的招牌咒術武器（芻靈咒法）是什麼？",
                options: [
                    { text: "釘子、鐵鎚與草人", next: "q31", isCorrect: true },
                    { text: "武士刀", next: "q30_help", log: "Q30錯: 這是三輪霞或乙骨使用的" },
                    { text: "狙擊槍", next: "q30_help", log: "Q30錯: 這是真依的武器" },
                    { text: "弓箭", next: "q30_help", log: "Q30錯: 不是這個" }
                ]
            },
            "q30_help": {
                tag: "📺 PBL 動漫回憶：她的名字",
                text: "【回憶任務】想一下她的姓氏「釘崎」。她最擅長把咒力注入某個尖銳的物品，然後用力敲進敵人的身體裡！",
                options: [
                    { text: "釘子與鐵鎚", next: "q30", isCorrect: true },
                    { text: "武士刀", next: "q30_help", log: "Q30救錯: 拿武士刀敲草人太奇怪了吧！" }
                ]
            },

            // --- 第 31 關：JFET 偏壓 ---
            "q31": {
                tag: "第 31 關：JFET 特性",
                text: "接面場效電晶體 (JFET) 正常工作時，其閘極 (G) 與源極 (S) 之間的 PN 接面，必須加上何種偏壓，以確保輸入電流趨近於零？",
                options: [
                    { text: "逆向偏壓", next: "q32", isCorrect: true },
                    { text: "順向偏壓", next: "q31_help", log: "Q31錯: 順向偏壓會產生大電流，燒毀 JFET" },
                    { text: "零偏壓", next: "q31_help", log: "Q31錯: 零偏壓時通道全開，無法控制" },
                    { text: "交流偏壓", next: "q31_help", log: "Q31錯: 偏壓必須是直流" }
                ]
            },
            "q31_help": {
                tag: "🛠️ PBL 邏輯推演：關緊大門",
                text: "【推演任務】如果加上順向偏壓，PN接面就會導通，電流就會狂灌進去燒毀元件。所以我們必須反過來接，讓空乏區變大來「夾扁」通道。這叫什麼偏壓？",
                options: [
                    { text: "逆向偏壓", next: "q31", isCorrect: true },
                    { text: "順向偏壓", next: "q31_help", log: "Q31救錯: 順向偏壓會讓 JFET 當場燒毀給你看喔！" }
                ]
            },

            // --- 第 32 關：夾止電壓 ---
            "q32": {
                tag: "第 32 關：JFET 特性",
                text: "在 JFET 中，當汲極-源極電壓 ($V_{DS}$) 增加到某個特定值時，通道會被空乏區夾扁，導致汲極電流 ($I_D$) 達到飽和不再明顯上升。這個特定電壓稱為？",
                options: [
                    { text: "夾止電壓 (Pinch-off Voltage, $V_P$)", next: "q33", isCorrect: true },
                    { text: "臨界電壓 (Threshold Voltage, $V_T$)", next: "q32_help", log: "Q32錯: 這是 E-MOSFET 產生通道所需的電壓" },
                    { text: "崩潰電壓", next: "q32_help", log: "Q32錯: 崩潰是電壓過高導致電流失控暴增" },
                    { text: "切入電壓", next: "q32_help", log: "Q32錯: 這是二極體的 0.7V" }
                ]
            },
            "q32_help": {
                tag: "🔍 PBL 詞意解析：捏住水管",
                text: "【解析任務】想像你用手把澆花的水管「捏住、夾緊 (Pinch)」。水流雖然還過得去，但流量已經被限制住了，達到飽和。所以這個電壓叫？",
                options: [
                    { text: "夾止電壓 ($V_P$)", next: "q32", isCorrect: true },
                    { text: "臨界電壓 ($V_T$)", next: "q32_help", log: "Q32救錯: 臨界電壓是 E-MOSFET 用來「打開」通道的，這裡是要「夾扁」通道喔！" }
                ]
            },

            // --- 第 33 關：MOSFET 種類 ---
            "q33": {
                tag: "第 33 關：MOSFET 特性",
                text: "哪一種 MOSFET 在製造時「天生就沒有通道」，必須在閘極加上足夠的電壓，吸引少數載子聚集形成「反轉層」後，通道才會出現並導電？",
                options: [
                    { text: "增強型 MOSFET (E-MOSFET)", next: "q34", isCorrect: true },
                    { text: "空乏型 MOSFET (D-MOSFET)", next: "q33_help", log: "Q33錯: D-MOSFET 天生就有通道" },
                    { text: "JFET", next: "q33_help", log: "Q33錯: JFET 天生也有通道" },
                    { text: "BJT", next: "q33_help", log: "Q33錯: BJT 不是 MOSFET" }
                ]
            },
            "q33_help": {
                tag: "📖 PBL 翻書任務：無中生有",
                text: "【查閱任務】它天生是斷開的(常閉型)。你必須給它電壓，強迫它「增強、建立」出一條通道，它才會通電。請找出 E-MOSFET 的中文名稱。",
                options: [
                    { text: "增強型 E-MOSFET", next: "q33", isCorrect: true },
                    { text: "空乏型 D-MOSFET", next: "q33_help", log: "Q33救錯: 空乏型天生就有通道，可以直接通電喔！" }
                ]
            },

            // --- 第 34 關：臨界電壓 ---
            "q34": {
                tag: "第 34 關：MOSFET 特性",
                text: "承上題，讓 E-MOSFET 從「斷路」變成剛好「開始產生通道」所需的最小閘極電壓，稱為什麼電壓？",
                options: [
                    { text: "臨界電壓 (Threshold Voltage, $V_T$)", next: "q35", isCorrect: true },
                    { text: "夾止電壓 (Pinch-off Voltage, $V_P$)", next: "q34_help", log: "Q34錯: 這是 JFET 夾扁通道的電壓" },
                    { text: "切入電壓", next: "q34_help", log: "Q34錯: 這是二極體導通的 0.7V" },
                    { text: "崩潰電壓", next: "q34_help", log: "Q34錯: 這會燒毀元件" }
                ]
            },
            "q34_help": {
                tag: "🧠 PBL 邏輯推演：跨越門檻",
                text: "【推演任務】就像要推動一顆大石頭，你要先克服一個「門檻」。超過這個界線、邊界 (Threshold) 後，通道才會瞬間形成。所以叫什麼電壓？",
                options: [
                    { text: "臨界電壓 ($V_T$)", next: "q34", isCorrect: true },
                    { text: "夾止電壓 ($V_P$)", next: "q34_help", log: "Q34救錯: $V_P$ 是用來把通道夾扁的，這裡是需要電壓把通道「打開」喔！" }
                ]
            },

            // --- 第 35 關：CMOS ---
            "q35": {
                tag: "第 35 關：數位積體電路",
                text: "現代電腦 CPU 最常使用的 CMOS 邏輯閘，是由哪兩種電晶體「互補」組合而成的？它最大的優點是靜態消耗功率極低。",
                options: [
                    { text: "NMOS 與 PMOS", next: "q36", isCorrect: true },
                    { text: "NPN 與 PNP", next: "q35_help", log: "Q35錯: 這是 BJT，組成的是 TTL 邏輯" },
                    { text: "JFET 與 BJT", next: "q35_help", log: "Q35錯: 不會這樣混搭" },
                    { text: "E-MOS 與 D-MOS", next: "q35_help", log: "Q35錯: CMOS 是利用 N型和 P型的互補" }
                ]
            },
            "q35_help": {
                tag: "🔍 PBL 詞意解析：字母縮寫",
                text: "【解析任務】CMOS 的 C 代表 Complementary (互補)。有黑就有白，有 N 就有 P。所以它是哪兩種 MOS 組合在一起的？",
                options: [
                    { text: "NMOS 與 PMOS", next: "q35", isCorrect: true },
                    { text: "NPN 與 PNP", next: "q35_help", log: "Q35救錯: 這是 BJT 電晶體，耗電量比較大喔！" }
                ]
            },

            // 🌸 第 36 關：咒術迴戰 (宿儺)
            "q36": {
                tag: "🌸 第 36 關：大腦休息 (咒術迴戰)",
                text: "《咒術迴戰》中，寄宿在虎杖悠仁體內的終極大反派「兩面宿儺」，他在千年前的平安時代，擁有什麼樣的稱號？",
                options: [
                    { text: "詛咒之王", next: "q37", isCorrect: true },
                    { text: "最強式神", next: "q36_help", log: "Q36錯: 最強式神是魔虛羅" },
                    { text: "天與暴君", next: "q36_help", log: "Q36錯: 這是伏黑甚爾的稱號" },
                    { text: "咒術高專校長", next: "q36_help", log: "Q36錯: 校長是夜蛾正道" }
                ]
            },

        // 系統變數與遊戲邏輯

        let studentName = "";
        let currentStep = "q1"; 
        let hp = 30; 
        let currentStreak = 0; 
        let diagnosticLogs = [];
        let sessionCards = []; 
        let failedQuestions = []; 
        let startTime = 0;           
        let totalTime = 0;           
        let rescueTriggered = 0;     
        let rescueFails = 0;
        let isTransitioning = false; 
        
        // 🚨 預設卡包改為第三階段 (phase3)
        let currentPackId = "phase3"; 

        // 確保網頁載入完成後才執行選單初始化
        document.addEventListener('DOMContentLoaded', () => {
            initPackSelector();
        });

        function initPackSelector() {
            const selector = document.getElementById('pack-selector');
            if (!selector) return;
            selector.innerHTML = '';
            Object.keys(cardPacks).forEach(key => {
                if (cardPacks[key].cards.length > 0 || key === "phase3") { // 強制顯示 phase3 以利測試
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            // 💡 全面升級 .replace(/\s+/g, '') 避免空白鍵抓不到資料
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            // 💡 全面升級 .replace(/\s+/g, '') 避免空白鍵抓不到資料
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            // 💡 全面升級 .replace(/\s+/g, '') 避免空白鍵抓不到資料
            studentName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            
            if(!q) { alert("題目載入錯誤！請檢查 quizData 設定。"); return; }

            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂") || q.tag.includes("日劇") || q.tag.includes("校園")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                // 💡 改用 innerHTML，讓 MathJax 能夠正確解析按鈕裡的標籤
                btn.innerHTML = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });

            // 💡 呼叫 MathJax 重新渲染動態載入的數學公式
            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('game-area')]).catch((err) => console.log(err.message));
            }
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            // 防呆：如果選擇的卡包還沒有卡片，就退回 phase1
            if (!cardPacks[currentPackId] || cardPacks[currentPackId].cards.length === 0) {
                alert("⚠️ 目前選擇的卡包尚未準備好，系統自動切換為第一階段！");
                currentPackId = "phase1";
            }
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }
        
        // 🚨 這裡請填入您正確的 Apps Script URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';
        
        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            if(!scriptURL) return;
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData }).catch(e=>console.log(e));
        }

        async function syncCloudData() {
            // 💡 全面升級 .replace(/\s+/g, '') 避免空白鍵抓不到資料
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }
            if(!scriptURL) { alert("⚠️ 尚未設定 Google Sheet 網址，無法同步！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                // 💡 在網址最後面加上時間戳記 (&t=...)，強迫瀏覽器每次都要去雲端抓最新資料，拒絕快取！
                let fetchUrl = scriptURL + "?name=" + encodeURIComponent(inputName) + "&t=" + new Date().getTime();
                let response = await fetch(fetchUrl, { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    // 💡 智慧合併！比對雲端與本地的卡片數量，永遠保留「數量最多」的紀錄！
                    let cloudData = JSON.parse(result.data);
                    let storageKey = "gachaCollection_" + inputName;
                    let localData = JSON.parse(localStorage.getItem(storageKey)) || [];

                    cloudData.forEach(cloudCard => {
                        let existing = localData.find(c => c.id === cloudCard.id);
                        if (existing) {
                            existing.count = Math.max(existing.count, cloudCard.count); 
                        } else {
                            localData.push(cloudCard);
                        }
                    });

                    localStorage.setItem(storageKey, JSON.stringify(localData));
                    alert("✅ 雲端同步成功！已為您載入最新圖鑑進度！\n(系統已自動比對並保留您的最高進度)");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
