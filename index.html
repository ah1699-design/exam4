    <script>
        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                    { text: "0", next: "q6_help", log: "Q6錯: 這是純直流的頻率" },
                    { text: "$4 f_i$", next: "q6_help", log: "Q6錯: 錯誤" }
                ]
            },
            "q6_help": {
                tag: "💊 PBL 救援任務：下半週翻上來",
                text: "【圖形想像】本來正弦波是一個完整週期(上+下)跳動一次。全波整流把「下半週也翻上來」了，所以原本的時間內變成了「兩個波峰」。頻率變成幾倍？",
                options: [
                    { text: "$2 f_i$", next: "q6", isCorrect: true },
                    { text: "$f_i$", next: "q6_help", log: "Q6救錯: 半波整流少了一半所以頻率維持不變，全波整流波峰變多，頻率會變兩倍喔！" }
                ]
            },

            // --- 第 7 題：濾波電容特性 ---
            "q7": {
                tag: "第 7 關：濾波電路",
                text: "在電阻電容濾波電路中，若我們將電容器的電容值 (C) 「增大」，對輸出的漣波因數 (r%) 會有什麼影響？",

                    { text: "漣波因數不變", next: "q7_help", log: "Q7錯: 電容會影響濾波" },
                    { text: "輸出電壓變為零", next: "q7_help", log: "Q7錯: 錯誤" }
                ]
            },
            "q7_help": {
                tag: "💊 PBL 救援任務：大水塔的穩定力",
                text: "【生活比喻】電容就像水庫。水庫 (C) 越大，越能平穩地調節放水，不會忽大忽小。水流起伏越小，代表「漣波」就越？",
                options: [
                    { text: "變小，效果變好", next: "q7", isCorrect: true },
                    { text: "變大，效果變差", next: "q7_help", log: "Q7救錯: 水庫大，波浪起伏就會變小，濾波效果是變好的喔！" }
                ]
            },

            // --- 第 8 題：BJT構造 ---
            "q8": {
                tag: "第 8 關：BJT 基本構造",
                text: "在雙極性接面電晶體 (BJT) 的三個極中，就「摻雜濃度」而言，最高的是哪一極？",
                options: [
                    { text: "射極 (Emitter, E)", next: "q9", isCorrect: true },

                ]
            },
            "q8_help": {
                tag: "💊 PBL 救援任務：發射子彈的槍口",
                text: "【名詞直觀】射極 (Emitter) 的任務是「發射/噴出」大量的電子或電洞。為了有充足的彈藥可以發射，它的摻雜濃度必須是全村最高的！",
                options: [
                    { text: "射極 (E)", next: "q8", isCorrect: true },
                    { text: "集極 (C)", next: "q8_help", log: "Q8救錯: 集極的任務是「收集」，所以它面積最大，但濃度最低喔！" }

            // --- 第 9 題：BJT 偏壓狀態 ---
            "q9": {
                tag: "第 9 關：BJT 工作區",
                text: "若要讓 BJT 電晶體工作於「主動區」作為線性放大器使用，其 BE 接面與 CB 接面的偏壓方式應為何？",

                ]
            },
            "q9_help": {
                tag: "💊 PBL 救援任務：前門開，後門關",
                text: "【邏輯推演】要當放大器，必須讓射極(E)的電子順利衝進基極(B) [前門順向打開]，然後利用集極(C)的高壓把電子強行吸過去 [後門逆向關閉以阻擋反向電流]。所以偏壓是？",
                options: [
                    { text: "BE 順偏，CB 逆偏", next: "q9", isCorrect: true },
                    { text: "BE 順偏，CB 順偏", next: "q9_help", log: "Q9救錯: 兩個都順向的話就「飽和」了，那是當數位開關 ON 用的喔！" }
                ]
            },

            // --- 第 10 題：BJT 組態比較 ---
            "q10": {
                tag: "第 10 關：放大器組態",
                text: "在 BJT 的三種放大組態 (CE, CB, CC) 中，哪一種組態的「功率增益 ($A_p$)」為最高？",
                options: [
                    { text: "共射極 (CE) 組態", next: "q11", isCorrect: true },
                    { text: "共基極 (CB) 組態", next: "q10_help", log: "Q10錯: CB 只有電壓增益高，電流增益小於1" },
                    { text: "共集極 (CC) 組態", next: "q10_help", log: "Q10錯: CC 只有電流增益高，電壓增益小於1" },
                    { text: "三者功率增益一樣高", next: "q10_help", log: "Q10錯: 只有一者最高" }
                ]
            },
            "q10_help": {
                tag: "💊 PBL 救援任務：兩全其美",
                text: "【特性推演】功率 = 電壓 $\\times$ 電流。CB 只有電壓高，CC 只有電流高。只有 CE (共射極) 是「電壓和電流都有放大」，相乘起來的功率當然是全場最高！",
                options: [
                    { text: "共射極 (CE)", next: "q10", isCorrect: true },
                    { text: "共集極 (CC)", next: "q10_help", log: "Q10救錯: CC 又叫電壓隨耦器，電壓沒有放大，所以功率不是最高喔！" }
                ]
            },

            // --- 第 11 題：分壓式偏壓 ---
            "q11": {
                tag: "第 11 關：BJT 直流偏壓",
                text: "在所有 BJT 單級偏壓電路中，「分壓式偏壓 (Voltage-Divider Bias)」最大的優點是什麼？",
                options: [
                    { text: "工作點最穩定，幾乎不受 $\\beta$ 值變化的影響", next: "q12", isCorrect: true },
                    { text: "電壓增益最大", next: "q11_help", log: "Q11錯: 偏壓電路不決定交流增益的最大值" },
                    { text: "使用的電阻最少", next: "q11_help", log: "Q11錯: 它用了四個電阻，比其他偏壓多" },
                    { text: "可以放大直流訊號", next: "q11_help", log: "Q11錯: 偏壓是提供穩定的直流環境" }
                ]
            },
            "q11_help": {
                tag: "💊 PBL 救援任務：不受干擾的基極",
                text: "【電路直覺】分壓式偏壓在基極放了兩個電阻直接把 $V_B$ 的電壓「釘死」了。不管電晶體的溫度怎麼變、$\\beta$ 值怎麼飄，基極電壓都不會動。所以它的特色是？",
                options: [
                    { text: "工作點最穩定", next: "q11", isCorrect: true },
                    { text: "使用的電阻最少", next: "q11_help", log: "Q11救錯: 它用了 $R_{B1}, R_{B2}, R_C, R_E$ 四顆電阻，一點都不少喔！" }
                ]
            },

            // --- 第 12 題：多級放大交連 ---
            "q12": {
                tag: "第 12 關：多級放大器",
                text: "「直接耦合放大電路」(Direct Coupling) 沒有使用交連電容器。請問它最大的缺點是什麼？",
                options: [
                    { text: "各級間直流未隔離，工作點容易互相影響產生漂移", next: "q13", isCorrect: true },
                    { text: "低頻響應非常差", next: "q12_help", log: "Q12錯: 因為沒有電容，低頻響應非常好，可達 0Hz" },
                    { text: "不能放大直流訊號", next: "q12_help", log: "Q12錯: 直接耦合剛好最適合放大直流" },
                    { text: "成本非常高", next: "q12_help", log: "Q12錯: 省了電容，成本其實較低且適合積體電路" }
                ]
            },
            "q12_help": {
                tag: "💊 PBL 救援任務：牽一髮動全身",
                text: "【觀念推演】電容器在直流中視同「斷路(一堵牆)」。如果把牆拿掉(直接耦合)，前一級的直流電壓就會直接衝進下一級。只要前面溫度稍微改變，後面就會跟著大亂！這叫做？",
                options: [
                    { text: "工作點容易漂移", next: "q12", isCorrect: true },
                    { text: "低頻響應非常差", next: "q12_help", log: "Q12救錯: 電容才是低頻的殺手，沒有電容反而低頻超級好喔！" }
                ]
            },

            // --- 第 13 題：MOSFET 控制方式 ---
            "q13": {
                tag: "第 13 關：MOSFET 特性",
                text: "BJT 是「電流」控制元件。請問場效應電晶體 (FET) 是利用閘-源極間的什麼物理量來控制輸出電流，因此被稱為何種控制元件？",
                options: [
                    { text: "電壓控制元件", next: "q14", isCorrect: true },
                    { text: "電流控制元件", next: "q13_help", log: "Q13錯: 這是 BJT 的特性" },
                    { text: "功率控制元件", next: "q13_help", log: "Q13錯: 沒有這種說法" },
                    { text: "電阻控制元件", next: "q13_help", log: "Q13錯: 雖然像可變電阻，但控制源是電壓" }

            },
            "q13_help": {
                tag: "💊 PBL 救援任務：不用流汗的閘門",
                text: "【元件本質】MOSFET 的閘極 (Gate) 有一層絕緣層，電流根本進不去 ($I_G=0$)。它純粹是靠兩端的「電位差 (電壓)」產生電場來吸引電子。所以它是？",
                options: [
                    { text: "電壓控制元件", next: "q13", isCorrect: true },
                    { text: "電流控制元件", next: "q13_help", log: "Q13救錯: 它的輸入電流 $I_G=0$，根本沒電流怎麼控制呢？是電壓喔！" }
                ]
            },

            // --- 第 14 題：增強型 vs 空乏型 ---
            "q14": {
                tag: "第 14 關：MOSFET 分類",
                text: "關於 N 通道 MOSFET 的分類，當 $V_{GS} = 0V$ 時，「原本就沒有通道，必須加正電壓才會產生通道導電」的是哪一型？",
                options: [
                    { text: "增強型 (Enhancement)", next: "q15", isCorrect: true },
                    { text: "空乏型 (Depletion)", next: "q14_help", log: "Q14錯: 空乏型天生就有通道，Vgs=0時就有電流" },
                    { text: "接面型 (JFET)", next: "q14_help", log: "Q14錯: JFET 也是天生有通道的" },
                    { text: "雙極性 (BJT)", next: "q14_help", log: "Q14錯: 這是完全不同的元件" }
                ]

            "q14_help": {
                tag: "💊 PBL 救援任務：白手起家",
                text: "【名詞直譯】有一種 MOSFET 出廠時就是斷路的，必須給它施加電壓「增強」它，把電子吸上來無中生有建立通道。顧名思義，這叫做？",
                options: [
                    { text: "增強型", next: "q14", isCorrect: true },
                    { text: "空乏型", next: "q14_help", log: "Q14救錯: 空乏型是天生就有一條路，你要給負電壓把它「排擠/空乏」掉喔！" }
                ]
            },

            // --- 第 15 題：CMOS 邏輯設計 ---
            "q15": {
                tag: "第 15 關：CMOS 數位電路",
                text: "在設計 CMOS 邏輯電路時，負責下拉到地的「NMOS」網路，如果要執行「AND (及/相乘)」運算，電晶體應該如何連接？",
                options: [
                    { text: "串聯", next: "q16", isCorrect: true },
                    { text: "並聯", next: "q15_help", log: "Q15錯: NMOS 並聯是執行 OR (或) 運算" },
                    { text: "反接", next: "q15_help", log: "Q15錯: 沒有這種接法" },
                    { text: "不連接", next: "q15_help", log: "Q15錯: 必須連接才能作用" }

                text: "【邏輯推演】AND 的意思是「A 跟 B 都要通電，才會過關」。就像走在一條直直的獨木橋上，遇到兩道門，必須兩個都開才過得去。這種接法叫做？",
                options: [
                    { text: "串聯", next: "q15", isCorrect: true },

            // --- 第 16 題：理想 OPA 特性 ---
            "q16": {
                tag: "第 16 關：運算放大器",
                text: "「理想」的運算放大器 (OP-AMP) 具有許多完美的特性。下列敘述何者正確？",
                options: [
                    { text: "輸入阻抗為無限大 ($R_i \\rightarrow \\infty$)", next: "q17", isCorrect: true },
                    { text: "輸出阻抗為無限大 ($R_o \\rightarrow \\infty$)", next: "q16_help", log: "Q16錯: 輸出阻抗必須為零，才能推出大電流" },

            },
            "q16_help": {

                options: [
                    { text: "無限大", next: "q16", isCorrect: true },
                    { text: "輸出阻抗無限大", next: "q16_help", log: "Q16救錯: 輸出要能推動任何沉重的喇叭，所以輸出阻抗必須是零 (暢通無阻) 喔！" }
                ]
            },

            // --- 第 17 題：反相放大器 ---
            "q17": {
                tag: "第 17 關：OPA 應用",
                text: "基本「反相放大器」的電壓增益 ($A_v = V_o / V_i$) 公式為何？ (假設輸入端電阻為 $R_1$，回授電阻為 $R_f$)",
                options: [
                    { text: "$-R_f / R_1$", next: "q18", isCorrect: true },
                    { text: "$1 + R_f / R_1$", next: "q17_help", log: "Q17錯: 這是非反相放大器的公式" },
                    { text: "$-R_1 / R_f$", next: "q17_help", log: "Q17錯: 分子分母顛倒了" },
                    { text: "$R_f / R_1$", next: "q17_help", log: "Q17錯: 漏掉了代表反相的負號" }
                ]
            },
            "q17_help": {
                tag: "💊 PBL 救援任務：虛接地的槓桿",
                text: "【公式記憶】「反相」代表訊號從負端 (-) 進入，波形會上下顛倒，所以公式一定帶有「負號」。而放大的倍率是由「後面的回授 $R_f$」除以「前面的 $R_1$」。",
                options: [
                    { text: "$-R_f / R_1$", next: "q17", isCorrect: true },
                    { text: "$1 + R_f / R_1$", next: "q17_help", log: "Q17救錯: 帶有 1 加號的，是從正端進入的「非反相放大器」公式喔！" }
                ]
            },

            // --- 第 18 題：非反相放大器 ---
            "q18": {
                tag: "第 18 關：OPA 應用",
                text: "承上題，如果是「非反相放大器」 (訊號由正端 + 進入)，其電壓增益 ($A_v$) 公式為何？",
                options: [
                    { text: "$1 + R_f / R_1$", next: "q19", isCorrect: true },
                    { text: "$-R_f / R_1$", next: "q18_help", log: "Q18錯: 這是反相放大器的公式" },
                    { text: "$R_f / (R_1 + R_f)$", next: "q18_help", log: "Q18錯: 這是普通分壓公式" },
                    { text: "1", next: "q18_help", log: "Q18錯: 這是電壓隨耦器的增益" }
                ]
            },
            "q18_help": {
                tag: "💊 PBL 救援任務：本身就有底子",
                text: "【公式記憶】從正端進入的非反相放大器，就算你把回授拿掉 ($R_f=0$)，它也至少會把原汁原味的訊號傳過去 (增益為 1)。所以在 $R_f/R_1$ 的前面，必須加上？",
                options: [
                    { text: "$1 + R_f / R_1$", next: "q18", isCorrect: true },
                    { text: "$-R_f / R_1$", next: "q18_help", log: "Q18救錯: 這是帶有負號的反相放大器喔！" }
                ]
            },

            // --- 第 19 題：微分器波形 ---
            "q19": {
                tag: "第 19 關：波形處理電路",
                text: "利用 OPA 組成的基本「微分器」，若輸入一個「三角波 (Triangle Wave)」，輸出會轉換成什麼波形？",

                ]
            },

                tag: "💊 PBL 救援任務：尋找斜率",
                text: "【數學直覺】微分就是在求「斜率」。三角波是一條斜直線，直線的斜率是一個「固定的常數」。一正一負固定的常數接起來，看起來就像什麼形狀？",
                options: [
                    { text: "平平的方波", next: "q19", isCorrect: true },
                    { text: "尖尖的脈衝波", next: "q19_help", log: "Q19救錯: 脈衝波是拿方波(直上直下)去微分才會出現的瞬間突波喔！" }
                ]
            },

            // --- 第 20 題：積分器波形 ---
            "q20": {
                tag: "第 20 關：波形處理電路",
                text: "承上題，若是利用 OPA 組成「積分器」，並輸入一個「方波 (Square Wave)」，輸出會轉換成什麼波形？",
                options: [
                    { text: "三角波 (Triangle Wave)", next: "q21", isCorrect: true },
                    { text: "脈衝波 (Pulse Wave)", next: "q20_help", log: "Q20錯: 這是微分器的產物" },
                    { text: "正弦波 (Sine Wave)", next: "q20_help", log: "Q20錯: 積分無法把方波變正弦波" },
                    { text: "鋸齒波 (Sawtooth Wave)", next: "q20_help", log: "Q20錯: 鋸齒波需要不對稱的方波" }
                ]
            },
            "q20_help": {
                tag: "💊 PBL 救援任務：累積的面積",
                text: "【數學直覺】方波是一個常數。積分就是算「累積的面積」。常數的面積會隨著時間「斜斜地均勻往上爬」。往上爬再往下爬，接起來就是？",
                options: [
                    { text: "三角波", next: "q20", isCorrect: true },
                    { text: "正弦波", next: "q20_help", log: "Q20救錯: 正弦波是圓弧形的，積分器只能畫出直直的斜線 (三角波) 喔！" }
                ]
            },

            // --- 第 21 題：比較器 ---
            "q21": {
                tag: "第 21 關：比較器",
                text: "沒有接任何回授網路的 OPA 會變成「比較器」。請問比較器的輸出電壓 $V_o$ 理論上只有哪兩種極端的狀態？",
                options: [
                    { text: "$+V_{sat}$ (正飽和) 與 $-V_{sat}$ (負飽和)", next: "q22", isCorrect: true },
                    { text: "0V 與 5V", next: "q21_help", log: "Q21錯: 這是 TTL 數位邏輯的電壓，OPA 飽和電壓通常接近電源電壓" },
                    { text: "無限大 與 0", next: "q21_help", log: "Q21錯: 電壓不可能無限大" },
                    { text: "隨輸入呈線性放大", next: "q21_help", log: "Q21錯: 沒回授，增益無限大，會直接飽和" }
                ]
            },
            "q21_help": {
                tag: "💊 PBL 救援任務：沒煞車的跑車",
                text: "【元件直覺】OPA 天生有幾萬倍的放大能力。如果不接負回授(沒煞車)，只要正負端有一點點微小的差異，它就會瞬間放大並「撞到牆壁極限」。這個極限電壓稱為？",
                options: [
                    { text: "正負飽和電壓 ($\\pm V_{sat}$)", next: "q21", isCorrect: true },
                    { text: "線性放大", next: "q21_help", log: "Q21救錯: 沒煞車是無法線性平穩駕駛的，一定會直接撞到飽和牆壁！" }
                ]
            },

            // --- 第 22 題：巴克豪森準則 ---
            "q22": {
                tag: "第 22 關：振盪器原理",
                text: "根據巴克豪森準則 (Barkhausen Criterion)，振盪電路若要產生「等幅振盪」，其閉迴路增益的大小 $|A\\beta|$ 必須等於多少？",
                options: [
                    { text: "1", next: "q23", isCorrect: true },
                    { text: "0", next: "q22_help", log: "Q22錯: 這樣訊號會消失" },
                    { text: "無限大", next: "q22_help", log: "Q22錯: 這樣會失真變方波" },
                    { text: "-1", next: "q22_help", log: "Q22錯: 相位必須是 0 或 360 度，不能有負號(180度)" }
                ]
            },
            "q22_help": {
                tag: "💊 PBL 救援任務：不增不減的平衡",
                text: "【邏輯推演】訊號繞一圈回來，如果大於 1，波浪會越滾越大到爆炸；如果小於 1，波浪會慢慢平息消失。要維持「永遠一樣高」的等幅波浪，繞一圈的倍率必須剛好是？",
                options: [
                    { text: "1", next: "q22", isCorrect: true },
                    { text: "無限大", next: "q22_help", log: "Q22救錯: 無限大波形就會撞到極限變成平頂的方波囉！" }
                ]
            },

            // --- 第 23 題：相移振盪器 ---
            "q23": {
                tag: "第 23 關：RC 振盪器",
                text: "在 RC 相移振盪電路中，由於反相放大器已經提供了 $180^\\circ$ 相移，剩下的 $180^\\circ$ 必須由 RC 網路提供。請問至少需要串聯幾節 RC 網路才夠？",
                options: [
                    { text: "3 節", next: "q24", isCorrect: true },
                    { text: "1 節", next: "q23_help", log: "Q23錯: 1節最多只能相移不到90度" },
                    { text: "2 節", next: "q23_help", log: "Q23錯: 2節極限不到180度" },
                    { text: "4 節", next: "q23_help", log: "Q23錯: 雖然可以，但最少只需要 3 節" }
                ]
            },
            "q23_help": {
                tag: "💊 PBL 救援任務：湊滿180度",
                text: "【觀念推演】一節真實的 RC 電路最多只能轉不到 90 度。兩節湊起來也轉不到 180 度。必須要有「幾節」大家各自分擔 60 度，才能穩穩地湊滿 180 度的目標？",
                options: [
                    { text: "3 節", next: "q23", isCorrect: true },
                    { text: "2 節", next: "q23_help", log: "Q23救錯: 2 節極限轉不到 180，訊號就接不起來囉，一定要 3 節！" }
                ]
            },

            // --- 第 24 題：韋恩電橋 ---
            "q24": {
                tag: "第 24 關：RC 振盪器",
                text: "韋恩電橋 (Wien Bridge) 振盪電路中，其 RC 回授網路在諧振時會將訊號衰減為原本的 $1/3$ (即 $\\beta = 1/3$)。為了維持振盪，放大器的增益 (A) 至少要多少？",
                options: [
                    { text: "3", next: "q25", isCorrect: true },
                    { text: "1", next: "q24_help", log: "Q24錯: 這樣乘起來只有 1/3，會衰減" },
                    { text: "29", next: "q24_help", log: "Q24錯: 這是 RC 相移振盪器的要求" },
                    { text: "0.5", next: "q24_help", log: "Q24錯: 必須大於 1" }
                ]
            },
            "q24_help": {
                tag: "💊 PBL 救援任務：彌補衰減",
                text: "【數學計算】巴克豪森準則說 $A \\times \\beta = 1$。現在網路把訊號縮小變成 $1/3$ ($\\beta$) 了，放大器 $A$ 必須把它放大幾倍，乘起來才會剛好回到 1？",
                options: [
                    { text: "3 倍", next: "q24", isCorrect: true },
                    { text: "29 倍", next: "q24_help", log: "Q24救錯: 29倍是上一題「相移振盪器」的嚴苛條件，韋恩電橋只要 3 倍喔！" }
                ]
            },

            // --- 第 25 題：石英晶體振盪器 ---
            "q25": {
                tag: "第 25 關：LC 振盪器",
                text: "石英晶體振盪器 (Crystal Oscillator) 利用壓電效應產生振盪。請問它在所有振盪器中最突出的優點是什麼？",
                options: [
                    { text: "頻率極度穩定", next: "q26", isCorrect: true },
                    { text: "輸出功率極大", next: "q25_help", log: "Q25錯: 石英很脆弱，不能輸出大功率" },
                    { text: "頻率可以大幅度自由調整", next: "q25_help", log: "Q25錯: 石英的頻率是切割形狀決定的，極難微調" },
                    { text: "電壓增益無限大", next: "q25_help", log: "Q25錯: 它只是回授網路，不是放大器" }
                ]
            },
            "q25_help": {
                tag: "💊 PBL 救援任務：手錶準確的秘密",
                text: "【生活經驗】為什麼我們戴的「石英錶」一年下來誤差不到幾秒鐘？就是因為石英晶體震動的頻率不受溫度干擾，超級無敵準確！它的特色是？",
                options: [
                    { text: "頻率極度穩定", next: "q25", isCorrect: true },
                    { text: "頻率可以大幅度自由調整", next: "q25_help", log: "Q25救錯: 石英切多厚，頻率就定死了，根本沒辦法調，它的賣點是「穩定」喔！" }
                ]
            },

            // --- 第 26 題：樞密特回授 ---
            "q26": {
                tag: "第 26 關：樞密特觸發器",
                text: "樞密特觸發器 (Schmitt Trigger) 之所以能產生上、下限觸發電壓不同的「磁滯現象」，是因為電路中使用了哪一種回授機制？",
                options: [
                    { text: "正回授", next: "q27", isCorrect: true },
                    { text: "負回授", next: "q26_help", log: "Q26錯: 負回授是線性放大器用的" },
                    { text: "無回授", next: "q26_help", log: "Q26錯: 沒回授是一般比較器，沒有磁滯區間" },
                    { text: "電流並聯負回授", next: "q26_help", log: "Q26錯: 這是 BJT 放大的名詞" }
                ]
            },
            "q26_help": {
                tag: "💊 PBL 救援任務：推它一把",
                text: "【結構聯想】一般 OPA 放大器都是接在負端(負回授)。但樞密特要產生瞬間的「觸發跳變」，它必須順著電壓變化的方向「狠狠推一把」，也就是把電阻接回「正端(+)」。",
                options: [
                    { text: "正回授", next: "q26", isCorrect: true },
                    { text: "負回授", next: "q26_help", log: "Q26救錯: 負回授會讓電路變穩定平滑，樞密特需要的是極端的跳變喔！" }
                ]
            },

            // --- 第 27 題：磁滯電壓 ---
            "q27": {
                tag: "第 27 關：樞密特觸發器",
                text: "在樞密特觸發器中，「上觸發準位 ($V_{UT}$)」與「下觸發準位 ($V_{LT}$)」兩者之間的電壓差，稱為什麼？",
                options: [
                    { text: "磁滯電壓 ($V_H$)", next: "q28", isCorrect: true },
                    { text: "崩潰電壓 ($V_Z$)", next: "q27_help", log: "Q27錯: 這是二極體的特性" },
                    { text: "峰對峰電壓 ($V_{p-p}$)", next: "q27_help", log: "Q27錯: 這是指波形本身的震幅" },
                    { text: "抵補電壓 ($V_{OS}$)", next: "q27_help", log: "Q27錯: 這是 OPA 內部的誤差" }
                ]
            },
            "q27_help": {
                tag: "💊 PBL 救援任務：遲鈍的區間",
                text: "【名詞直翻】開和關在不同的電壓點，中間會有一段電壓是「維持原狀、猶豫遲鈍不反應」的區間。這個 Hysteresis 區間翻譯作什麼電壓？",
                options: [
                    { text: "磁滯電壓", next: "q27", isCorrect: true },
                    { text: "峰對峰電壓", next: "q27_help", log: "Q27救錯: 峰對峰值是看輸入波形的最高到最低點，不是看觸發區間喔！" }
                ]
            },

            // --- 第 28 題：555單穩態 ---
            "q28": {
                tag: "第 28 關：555 計時器",
                text: "利用 555 計時器組成的「單穩態多諧振盪器」，其輸出的脈波寬度 (時間 $t_p$) 近似公式為何？",
                options: [
                    { text: "$t_p = 1.1 RC$", next: "q29", isCorrect: true },
                    { text: "$t_p = 0.693 RC$", next: "q28_help", log: "Q28錯: 這是無穩態的半週期公式" },
                    { text: "$t_p = 1.44 RC$", next: "q28_help", log: "Q28錯: 這是無穩態頻率分子的近似值" },
                    { text: "$t_p = 2 RC$", next: "q28_help", log: "Q28錯: 無此公式" }
                ]
            },
            "q28_help": {
                tag: "💊 PBL 救援任務：ln(3) 的秘密",
                text: "【常數記憶】單穩態的充電目標是從 0 充到 2/3 Vcc，經過數學推導會得出 $\\ln(3)$。$\\ln(3)$ 的數值大約是 1.098...。所以在電子學公式中我們都取多少？",
                options: [
                    { text: "$1.1 RC$", next: "q28", isCorrect: true },
                    { text: "$0.693 RC$", next: "q28_help", log: "Q28救錯: 0.693 是 $\\ln(2)$ 的近似值，那是無穩態用的，單穩態是 1.1 喔！" }
                ]
            },

            // --- 第 29 題：555無穩態 ---
            "q29": {
                tag: "第 29 關：555 計時器",
                text: "利用 555 計時器組成的「無穩態多諧振盪器」，其振盪頻率 ($f$) 的近似公式為何？",
                options: [
                    { text: "$f = 1.44 / [(R_1 + 2R_2) C]$", next: "q30", isCorrect: true },
                    { text: "$f = 0.693 / [(R_1 + 2R_2) C]$", next: "q29_help", log: "Q29錯: 0.693 是算週期 T 用的，不是頻率 f" },
                    { text: "$f = 1.1 / (RC)$", next: "q29_help", log: "Q29錯: 1.1 是單穩態用的常數" },
                    { text: "$f = 1 / (2\\pi RC)$", next: "q29_help", log: "Q29錯: 這是正弦波振盪器的頻率" }
                ]
            },
            "q29_help": {
                tag: "💊 PBL 救援任務：倒數的魔術",
                text: "【公式推演】週期 $T$ 前面有 $0.693$。頻率 $f$ 是 $T$ 的倒數 ($1/T$)。拿計算機把 1 除以 0.693，大約會等於多少？",
                options: [
                    { text: "1.44 在分子的公式", next: "q29", isCorrect: true },
                    { text: "0.693 在分子的公式", next: "q29_help", log: "Q29救錯: 0.693 是算時間 T 用的，算頻率 f 必須倒過來變 1.44 喔！" }
                ]
            },

            // --- 第 30 題：555內部電壓 ---
            "q30": {
                tag: "第 30 關：555 內部結構",
                text: "555 計時器內部有三個 5kΩ 電阻做分壓。請問連接到「第 2 腳 (觸發腳 Trigger)」的比較器，其動作門檻(參考電壓)為多少？",
                options: [
                    { text: "$1/3 V_{cc}$", next: "q31", isCorrect: true },
                    { text: "$2/3 V_{cc}$", next: "q30_help", log: "Q30錯: 這是第 6 腳的門檻" },
                    { text: "$1/2 V_{cc}$", next: "q30_help", log: "Q30錯: 內部沒有 1/2 分壓" },
                    { text: "$V_{cc}$", next: "q30_help", log: "Q30錯: 錯誤" }
                ]
            },
            "q30_help": {
                tag: "💊 PBL 救援任務：最底層的守衛",
                text: "【接腳特性】第 2 腳接在下方的比較器。參考電壓是取三個 5k 電阻串聯中「最底下那 1 顆」的分壓。3 顆裡面的 1 顆，比例是？",
                options: [
                    { text: "$1/3 V_{cc}$", next: "q30", isCorrect: true },
                    { text: "$2/3 V_{cc}$", next: "q30_help", log: "Q30救錯: 2/3 是上面比較器 (第6腳) 的門檻喔！" }
                ]
            },

            // --- 第 31 題：555腳位6 ---
            "q31": {
                tag: "第 31 關：555 內部結構",
                text: "承上題，連接到 555 計時器「第 6 腳 (臨界腳 Threshold)」的比較器，其重置門檻(參考電壓)為多少？",
                options: [
                    { text: "$2/3 V_{cc}$", next: "q32", isCorrect: true },
                    { text: "$1/3 V_{cc}$", next: "q31_help", log: "Q31錯: 這是第 2 腳的門檻" },
                    { text: "$1/2 V_{cc}$", next: "q31_help", log: "Q31錯: 內部沒有 1/2 分壓" },
                    { text: "$V_{cc}$", next: "q31_help", log: "Q31錯: 錯誤" }
                ]
            },
            "q31_help": {
                tag: "💊 PBL 救援任務：上面的守衛",
                text: "【接腳特性】第 6 腳接在上方的比較器。參考電壓是取三個 5k 電阻中，疊在「下面兩顆」之上的分壓。3 顆佔了 2 顆，比例是？",
                options: [
                    { text: "$2/3 V_{cc}$", next: "q31", isCorrect: true },
                    { text: "$1/3 V_{cc}$", next: "q31_help", log: "Q31救錯: 剛剛的第2腳才是 1/3 喔！" }
                ]
            },

            // --- 第 32 題：波峰因數 ---
            "q32": {
                tag: "第 32 關：波形參數",
                text: "在交流電中，將波形的「最大值 (峰值 $V_m$)」除以「有效值 ($V_{rms}$)」，這個比值稱為什麼因數？",
                options: [
                    { text: "波峰因數", next: "q33", isCorrect: true },
                    { text: "波形因數", next: "q32_help", log: "Q32錯: 這是有效值除以平均值" },
                    { text: "功率因數", next: "q32_help", log: "Q32錯: 這是實功除以視在功" },
                    { text: "品質因數", next: "q32_help", log: "Q32錯: 這是諧振電路用的" }
                ]
            },
            "q32_help": {
                tag: "💊 PBL 救援任務：找最高的點",
                text: "【名詞直觀】這個比值分子放的是「最大值」，也就是波形最尖銳的「山峰」。用來描述這個波的尖銳程度，所以我們叫它什麼因數？",
                options: [
                    { text: "波峰因數", next: "q32", isCorrect: true },
                    { text: "波形因數", next: "q32_help", log: "Q32救錯: 波形因數是看「平均」，波峰因數才是看「最大值(峰值)」喔！" }
                ]
            },

            // --- 第 33 題：電感相位 ---
            "q33": {
                tag: "第 33 關：交流元件",
                text: "在「純電感 (L)」的交流電路中，端電壓 (V) 與流過的電流 (I) 的相位關係為何？",
                options: [
                    { text: "電壓領先電流 $90^\\circ$", next: "q34", isCorrect: true },
                    { text: "電流領先電壓 $90^\\circ$", next: "q33_help", log: "Q33錯: 這是電容器的特性" },
                    { text: "兩者同相 ($0^\\circ$)", next: "q33_help", log: "Q33錯: 這是電阻的特性" },
                    { text: "電壓領先電流 $45^\\circ$", next: "q33_help", log: "Q33錯: 純元件一定差90度" }
                ]
            },
            "q33_help": {
                tag: "💊 PBL 救援任務：ELI 口訣",
                text: "【經典口訣】背誦電子學名言：「ELI the ICE man」。前三個字母 ELI 代表在電感 (L) 中，電壓 (E) 排在前面，電流 (I) 排在後面。所以是誰領先？",
                options: [
                    { text: "電壓領先電流 90度", next: "q33", isCorrect: true },
                    { text: "電流領先電壓 90度", next: "q33_help", log: "Q33救錯: 電流領先是 ICE (電容) 的特性啦，口訣要記清楚！" }
                ]
            },

            // --- 第 34 題：並聯諧振阻抗 ---
            "q34": {
                tag: "第 34 關：諧振電路",
                text: "在 RLC 「並聯」交流電路中發生諧振 ($f = f_p$) 時，電路的「總阻抗」會呈現什麼狀態？",
                options: [
                    { text: "最大值", next: "q35", isCorrect: true },
                    { text: "最小值", next: "q34_help", log: "Q34錯: 這是串聯諧振的特性" },
                    { text: "零", next: "q34_help", log: "Q34錯: 發生短路才會是零" },
                    { text: "無窮大，完全斷路", next: "q34_help", log: "Q34錯: 還有電阻 R 並聯，不會完全斷路" }
                ]
            },
            "q34_help": {
                tag: "💊 PBL 救援任務：並聯是大水壩",
                text: "【觀念推演】串聯諧振就像水管通了，阻抗最小。但「並聯」諧振時，L 和 C 會在內部自己循環丟能量，對外面的電源來說，它們就像一面推不動的高牆。所以並聯諧振的阻抗是？",
                options: [
                    { text: "最大值", next: "q34", isCorrect: true },
                    { text: "最小值", next: "q34_help", log: "Q34救錯: 最小值是「串聯諧振」，並聯像高牆阻力最大喔！" }
                ]
            },

            // --- 第 35 題：達靈頓 ---
            "q35": {
                tag: "🏆 最終關：多級放大器",
                text: "最後一題大魔王！將兩個 BJT 組成「達靈頓 (Darlington) 放大器」，其最主要的特色是什麼？",
                options: [
                    { text: "電流增益極高 (約等於 $\\beta_1 \\times \\beta_2$)", next: "end", isCorrect: true },
                    { text: "電壓增益極高", next: "q35_help", log: "Q35錯: 達靈頓本質是 CC+CC，電壓增益小於1" },
                    { text: "高頻響應極佳", next: "q35_help", log: "Q35錯: 達靈頓的高頻響應其實不佳" },
                    { text: "輸入阻抗極低", next: "q35_help", log: "Q35錯: 它的輸入阻抗非常高" }
                ]
            },
            "q35_help": {
                tag: "💊 PBL 最終挑戰：放大再放大",
                text: "【電路直覺】達靈頓電路是把第一顆電晶體的射極(輸出電流)，直接灌進第二顆的基極當作輸入。所以放大倍率會被「乘兩次」。BJT 主要是放大什麼？",
                options: [
                    { text: "電流增益極高", next: "q35", isCorrect: true },
                    { text: "電壓增益極高", next: "q35_help", log: "Q35救錯: 達靈頓是共集極的變形，主要用來做「電流放大」與阻抗匹配喔！" }
                ]
            }
        };

        // ==========================================
        // 系統變數與遊戲邏輯
        // ==========================================
        let studentName = "";
        let currentStep = "q1"; 
        let hp = 30; 
        let currentStreak = 0; 
        let diagnosticLogs = [];
        let sessionCards = []; 
        let failedQuestions = []; 
        let startTime = 0;           
        let totalTime = 0;           
        let rescueTriggered = 0;     
        let rescueFails = 0;
        let isTransitioning = false; 
        
        // 🚨 預設卡包自動切換為第四階段 (phase4)
        let currentPackId = "phase4"; 

        document.addEventListener('DOMContentLoaded', () => {
            initPackSelector();
        });

        function initPackSelector() {
            const selector = document.getElementById('pack-selector');
            if (!selector) return;
            selector.innerHTML = '';
            Object.keys(cardPacks).forEach(key => {
                if (cardPacks[key].cards.length > 0) { 
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                if (spMaster.pblTask && spMaster.unlockCode) {
                    let userInput = prompt(`🛑 傳說覺醒任務觸發！🛑\n\n${spMaster.pblTask}\n\n(任務完成後，請向老師索取通關密碼，並輸入於下方：)`);
                    
                    if (userInput === null) return; 
                    else if (userInput.trim() !== spMaster.unlockCode) {
                        alert("❌ 密碼錯誤！請確認你已經確實完成任務，並向老師取得正確密碼！");
                        playSound('wrong');
                        return; 
                    }
                }

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            studentName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            
            if(!q) { alert("題目載入錯誤！請檢查 quizData 設定。"); return; }

            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂") || q.tag.includes("日劇") || q.tag.includes("校園")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                btn.innerHTML = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });

            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('game-area')]).catch((err) => console.log(err.message));
            }
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            if (!cardPacks[currentPackId] || cardPacks[currentPackId].cards.length === 0) {
                alert("⚠️ 目前選擇的卡包尚未準備好，系統自動切換為第一階段！");
                currentPackId = "phase1";
            }
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }
        
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';
        
        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            if(!scriptURL) return;
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData }).catch(e=>console.log(e));
        }

        async function syncCloudData() {
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }
            if(!scriptURL) { alert("⚠️ 尚未設定 Google Sheet 網址，無法同步！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                let fetchUrl = scriptURL + "?name=" + encodeURIComponent(inputName) + "&t=" + new Date().getTime();
                let response = await fetch(fetchUrl, { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    let cloudData = JSON.parse(result.data);
                    let storageKey = "gachaCollection_" + inputName;
                    let localData = JSON.parse(localStorage.getItem(storageKey)) || [];

                    cloudData.forEach(cloudCard => {
                        let existing = localData.find(c => c.id === cloudCard.id);
                        if (existing) {
                            existing.count = Math.max(existing.count, cloudCard.count); 
                        } else {
                            localData.push(cloudCard);
                        }
                    });

                    localStorage.setItem(storageKey, JSON.stringify(localData));
                    alert("✅ 雲端同步成功！已為您載入最新圖鑑進度！\n(系統已自動比對並保留您的最高進度)");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
</body>
