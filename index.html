        body.rescue-mode { background-color: #4a1010; }

        .container {
            background-color: #2c3e50; width: 90%; max-width: 650px;

        h1 { color: #f1c40f; margin-bottom: 5px; }
        .subtitle { color: #95a5a6; margin-bottom: 20px; font-size: 14px; }
        
        #student-setup { display: block; }
        #game-area { display: none; }
        #result-area { display: none; }

        input[type="text"] {
            width: 80%; padding: 15px; font-size: 18px; border-radius: 8px; 
            border: 2px solid #3498db; background: #1a1a2e; color: white; 
            text-align: center; margin-bottom: 20px;
        }

        /* 卡包選擇器 UI */
        .pack-selector-container {
            margin: 20px 0; padding: 15px; background: #16213e; border-radius: 10px;
        }
        .pack-selector-title { font-size: 16px; color: #f39c12; margin-bottom: 10px; font-weight: bold; }
        .pack-grid {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
        }
        .pack-option {
            background: #2c3e50; border: 2px solid #34495e; border-radius: 8px;
            padding: 10px 15px; cursor: pointer; transition: 0.3s;
            font-size: 16px; font-weight: bold; color: #cbd5e1; flex: 1; min-width: 120px;
        }
        .pack-option:hover { background: #34495e; }
        .pack-option.active {
            background: #2980b9; border-color: #3498db; color: #fff;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.6); transform: scale(1.05);
        }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #16213e; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px;
        }
        .hp-bar { font-size: 18px; color: #e74c3c; text-align: left; display: flex; align-items: center; gap: 10px;}
        .streak-badge { background: #d35400; color: white; padding: 3px 8px; border-radius: 5px; font-size: 14px; font-weight: bold; }
        .inventory { font-size: 14px; color: #f1c40f; text-align: right; font-weight: bold;}
        
        .tag {
            display: inline-block; background: #e74c3c; color: white;
            padding: 5px 10px; border-radius: 5px; font-size: 14px; margin-bottom: 15px; font-weight: bold;

        .question-text { font-size: 22px; line-height: 1.5; margin-bottom: 30px; }

        .btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 15px;
            font-size: 18px; cursor: pointer; border: none; border-radius: 8px;
            background-color: #34495e; color: white; font-weight: bold; transition: 0.2s; box-shadow: 0 4px #2c3e50;
        }
        .btn:hover { background-color: #3498db; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-start { background-color: #27ae60; box-shadow: 0 4px #1e8449; margin-top: 10px; }
        .btn-collection { background-color: #8e44ad; box-shadow: 0 4px #732d91; }

        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                    { text: "B. 多核心 (Multi-core)", next: "q14_help", log: "Q14救錯: 多核心是蓋好幾間工廠，管線化是一間工廠裡的生產線流水作業！" }
                ]
            },

            // ⚾ 第 15 關：WBC 捷克傳奇
            "q15": {
                tag: "⚾ 第 15 關：大腦休息 (WBC)",
                text: "2023 WBC 賽場上有一支充滿熱血的歐洲隊伍，他們的球員本業多半是消防員、地理老師或財務分析師，卻靠著下班後的練習打進了最高殿堂，甚至三振了大谷翔平。這是哪一國的代表隊？",
                options: [
                    { text: "A. 捷克", next: "q16", isCorrect: true },
                    { text: "B. 義大利", next: "q15_help", log: "Q15錯: 義大利有很多大聯盟球員" },
                    { text: "C. 荷蘭", next: "q15_help", log: "Q15錯: 荷蘭隊實力非常強勁" },
                    { text: "D. 英國", next: "q15_help", log: "Q15錯: 英國隊雖然是首度參賽，但不是業餘傳奇的主角" }
                ]
            },
            "q15_help": {
                tag: "💊 提示：中歐的奇蹟",
                text: "這支球隊的帽子上有個大大的 'C'，他們的努力精神感動了全世界，就連日本隊也對他們脫帽致敬。",
                options: [
                    { text: "A. 捷克 (Czech)", next: "q15", isCorrect: true },
                    { text: "B. 荷蘭", next: "q15_help", log: "Q15救錯: 荷蘭有很多 MLB 巨星，不是業餘球員喔！" }
                ]
            },

            // --- 第 16 關：RISC vs CISC ---
            "q16": {
                tag: "第 16 關：指令集架構",
                text: "微處理機的指令集架構主要分為 CISC 與 RISC。其中，強調「指令長度固定、指令數量少且簡單、高度管線化」的是哪一種架構？",
                options: [
                    { text: "A. RISC (精簡指令集)", next: "q17", isCorrect: true },
                    { text: "B. CISC (複雜指令集)", next: "q16_help", log: "Q16錯: CISC 的指令長短不一且複雜" },
                    { text: "C. VLIW", next: "q16_help", log: "Q16錯: 這是超長指令字架構" },
                    { text: "D. EPIC", next: "q16_help", log: "Q16錯: 這是明確平行指令運算" }
                ]
            },
            "q16_help": {
                tag: "💊 救援任務：簡約就是快",
                text: "知識拆解：CISC 的 C 是 Complex (複雜)，RISC 的 R 是 Reduced (精簡)。手機裡的 ARM 處理器就是這類「精簡、固定長度、跑得快」的代表。",
                options: [
                    { text: "A. RISC", next: "q16", isCorrect: true },
                    { text: "B. CISC", next: "q16_help", log: "Q16救錯: 題目說「少且簡單」，CISC是複雜的喔！" }
                ]
            },

            // --- 第 17 關：立即定址 ---
            "q17": {
                tag: "第 17 關：定址模式",
                text: "在組合語言的定址模式中，如果指令後面的運算元「直接就是一個數值資料」（例如：MOV A, #55H），這稱為什麼定址法？",
                options: [
                    { text: "A. 立即定址 (Immediate Addressing)", next: "q18", isCorrect: true },
                    { text: "B. 直接定址 (Direct Addressing)", next: "q17_help", log: "Q17錯: 直接定址是給記憶體地址" },
                    { text: "C. 暫存器定址 (Register Addressing)", next: "q17_help", log: "Q17錯: 這是資料放在暫存器裡" },
                    { text: "D. 間接定址 (Indirect Addressing)", next: "q17_help", log: "Q17錯: 這是透過指標找資料" }
                ]
            },
            "q17_help": {
                tag: "💊 救援任務：所見即所得",
                text: "知識拆解：不需要去記憶體找，也不用去暫存器翻。指令寫 55，資料就是 55，CPU 抓進來「立刻」就可以用。這叫？",
                options: [
                    { text: "A. 立即定址", next: "q17", isCorrect: true },
                    { text: "B. 直接定址", next: "q17_help", log: "Q17救錯: 直接定址是給門牌號碼，還要走去拿；立即定址是直接把現金塞給你！" }
                ]
            },

            // --- 第 18 關：暫存器定址 ---
            "q18": {
                tag: "第 18 關：定址模式",
                text: "接續上題，如果指令是寫成「ADD A, R1」，代表要把 A 和 R1 這兩個「暫存器」裡面的內容相加。這稱為什麼定址法？",
                options: [
                    { text: "A. 暫存器定址 (Register Addressing)", next: "q19", isCorrect: true },
                    { text: "B. 立即定址", next: "q18_help", log: "Q18錯: 沒有直接給數值" },
                    { text: "C. 直接定址", next: "q18_help", log: "Q18錯: 不是給記憶體位址" },
                    { text: "D. 索引定址", next: "q18_help", log: "Q18錯: 這是加法計算位址用的" }
                ]
            },
            "q18_help": {
                tag: "💊 救援任務：看名字選答案",
                text: "知識拆解：資料就放在 CPU 內部的「暫存器(Register)」裡面，這也是執行速度最快的一種定址方式。中文叫？",
                options: [
                    { text: "A. 暫存器定址", next: "q18", isCorrect: true },
                    { text: "B. 直接定址", next: "q18_help", log: "Q18救錯: R1 是暫存器，不是記憶體位址喔！" }
                ]
            },

            // --- 第 19 關：組合語言特性 ---
            "q19": {
                tag: "第 19 關：程式語言分類",
                text: "關於「組合語言 (Assembly Language)」，下列敘述何者正確？",
                options: [
                    { text: "A. 屬於低階語言，與硬體 CPU 架構高度相關", next: "q20", isCorrect: true },
                    { text: "B. 屬於高階語言，人類很容易閱讀", next: "q19_help", log: "Q19錯: 高階語言是 C, Python 等" },
                    { text: "C. 寫好的程式可以在任何不同廠牌的 CPU 上直接執行", next: "q19_help", log: "Q19錯: 組合語言不可攜，換 CPU 就要重寫" },
                    { text: "D. 電腦可以直接看懂，不需要透過組譯器轉換", next: "q19_help", log: "Q19錯: 電腦只懂 0 和 1 (機器語言)" }
                ]
            },
            "q19_help": {
                tag: "💊 救援任務：貼近硬體的語言",
                text: "知識拆解：組合語言是用 ADD, MOV 這些助憶碼來寫的，它是直接操控暫存器的「低階語言」。因為每家廠商(Intel, ARM)硬體不同，所以指令也不共通。",
                options: [
                    { text: "A. 低階語言，與硬體高度相關", next: "q19", isCorrect: true },
                    { text: "B. 可在任何 CPU 直接執行", next: "q19_help", log: "Q19救錯: 不能跨平台喔！Intel 的組合語言放進 Apple 的晶片會完全看不懂。" }
                ]
            },

            // ⚾ 第 20 關：WBC 投球限制
            "q20": {
                tag: "⚾ 第 20 關：大腦休息 (WBC)",
                text: "WBC 經典賽為了保護各國職棒的投手，不讓他們在春訓期間手臂過度疲勞，特別訂定了一項嚴格的賽制規定。請問是哪一項？",
                options: [
                    { text: "A. 單場最高用球數限制 (如第一輪最多 65 球)", next: "q21", isCorrect: true },
                    { text: "B. 限制投手球速不能超過 150 公里", next: "q20_help", log: "Q20錯: 球速沒有限制" },
                    { text: "C. 規定不能投變化球", next: "q20_help", log: "Q20錯: 球種沒有限制" },
                    { text: "D. 一場比賽每個投手只能投一局", next: "q20_help", log: "Q20錯: 是看球數，不是強制一局" }
                ]
            },
            "q20_help": {
                tag: "💊 提示：保護黃金手臂",
                text: "因為比賽在三月打，很多投手還沒完全開機。大聯盟嚴格要求大會，一旦投手丟超過「特定的顆數」，就算解決到一半也必須強制換人。",
                options: [
                    { text: "A. 用球數限制", next: "q20", isCorrect: true },
                    { text: "B. 限制投球局數", next: "q20_help", log: "Q20救錯: 是算球數的！如果被瘋狂打界外，可能半局就下班了。" }
                ]
            },

            // --- 第 21 關：SRAM vs DRAM ---
            "q21": {
                tag: "第 21 關：記憶體元件",
                text: "電腦主機板上的記憶體分為很多種。其中，哪一種記憶體速度最快，不需要週期性充電(Refresh)，通常被用來做為 CPU 內部的「快取記憶體 (Cache)」？",
                options: [
                    { text: "A. SRAM (靜態隨機存取記憶體)", next: "q22", isCorrect: true },
                    { text: "B. DRAM (動態隨機存取記憶體)", next: "q21_help", log: "Q21錯: 這是主記憶體，需要充電" },
                    { text: "C. ROM (唯讀記憶體)", next: "q21_help", log: "Q21錯: ROM 速度慢且無法隨意寫入" },
                    { text: "D. Flash (快閃記憶體)", next: "q21_help", log: "Q21錯: 這是隨身碟用的" }
                ]
            },
            "q21_help": {
                tag: "💊 救援任務：靜靜的很快",
                text: "知識拆解：由正反器(Flip-flop)組成的記憶體，只要通電資料就穩穩在那邊「靜態(Static)」保存，速度極快但造價昂貴。開頭字母是 S。",
                options: [
                    { text: "A. SRAM", next: "q21", isCorrect: true },
                    { text: "B. DRAM", next: "q21_help", log: "Q21救錯: DRAM 是用小電容做的，會漏電需要一直動態(Dynamic)補水(充電)喔！" }
                ]
            },

            // --- 第 22 關：DRAM 充放電 ---
            "q22": {
                tag: "第 22 關：記憶體元件",
                text: "承上題，電腦的「主記憶體」通常是插好幾根 8GB、16GB 的記憶體條，它們是使用 DRAM 技術。為什麼 DRAM 必須要不斷地進行「更新 (Refresh)」動作？",
                options: [
                    { text: "A. 因為 DRAM 內部使用小電容儲存電荷，會隨時間漏電", next: "q23", isCorrect: true },
                    { text: "B. 為了讓 CPU 讀取速度變快", next: "q22_help", log: "Q22錯: 更新動作反而會暫停讀寫，拖慢速度" },
                    { text: "C. 因為資料會被磁場干擾", next: "q22_help", log: "Q22錯: 這是磁碟機的問題" },
                    { text: "D. 為了清除不要的垃圾資料", next: "q22_help", log: "Q22錯: 這是軟體作業系統在做的事" }
                ]
            },
            "q22_help": {
                tag: "💊 救援任務：漏水的小水桶",
                text: "知識拆解：DRAM (動態記憶體) 裡面是由一個電晶體加一個微小的「電容器」組成的。電容就像裝水的小水桶，時間久了水會漏掉(資料不見)，所以必須一直補水(充電更新)。",
                options: [
                    { text: "A. 因為電容會漏電", next: "q22", isCorrect: true },
                    { text: "B. 為了讓速度變快", next: "q22_help", log: "Q22救錯: 更新的時候 CPU 不能讀取，其實會稍微拖累一點速度喔！" }
                ]
            },

            // --- 第 23 關：DMA ---
            "q23": {
                tag: "第 23 關：I/O 存取技術",
                text: "當硬碟需要傳送大量資料到記憶體時，為了不讓 CPU 一直傻等做苦工，會將匯流排的控制權交給一個「專門的晶片」來搬運資料。這項技術簡稱為何？",
                options: [
                    { text: "A. DMA (直接記憶體存取)", next: "q24", isCorrect: true },
                    { text: "B. Interrupt (中斷)", next: "q23_help", log: "Q23錯: 中斷還是要 CPU 親自處理" },
                    { text: "C. Polling (輪詢)", next: "q23_help", log: "Q23錯: 這是 CPU 最浪費時間的做法" },
                    { text: "D. USB (通用序列匯流排)", next: "q23_help", log: "Q23錯: 這是外部傳輸介面" }
                ]
            },
            "q23_help": {
                tag: "💊 救援任務：搬磚外包公司",
                text: "知識拆解：Direct Memory Access。讓周邊設備「直接(Direct)」跟記憶體連線搬東西，CPU 就可以去旁邊睡覺或做其他高階運算。縮寫是？",
                options: [
                    { text: "A. DMA", next: "q23", isCorrect: true },
                    { text: "B. Interrupt (中斷)", next: "q23_help", log: "Q23救錯: 中斷是指叫 CPU 停下來幫忙，但我們現在是希望 CPU 去旁邊休息不要管！" }
                ]
            },

            // --- 第 24 關：中斷處理 ---
            "q24": {
                tag: "第 24 關：中斷機制",
                text: "當 CPU 正在執行主程式時，突然發生「中斷 (Interrupt)」，CPU 必須暫停手邊工作去處理突發事件。此時 CPU 會將目前的「程式計數器 (PC)」等重要資料，暫時保存在哪裡？",
                options: [
                    { text: "A. 堆疊 (Stack)", next: "q25", isCorrect: true },
                    { text: "B. 硬碟 (Hard Drive)", next: "q24_help", log: "Q24錯: 硬碟太慢了，來不及存" },
                    { text: "C. 算術邏輯單元 (ALU)", next: "q24_help", log: "Q24錯: ALU 只有算數學，不能存資料" },
                    { text: "D. 唯讀記憶體 (ROM)", next: "q24_help", log: "Q24錯: ROM 不能寫入資料" }
                ]
            },
            "q24_help": {
                tag: "💊 救援任務：書籤夾在書本裡",
                text: "知識拆解：就像你看書看到一半被媽媽叫去買醬油，你要把書籤夾進去才不會忘記看到哪裡。CPU 會把目前的狀態「推入 (Push)」到記憶體中一個「後進先出(LIFO)」的特殊區域。這叫？",
                options: [
                    { text: "A. 堆疊 (Stack)", next: "q24", isCorrect: true },
                    { text: "B. 硬碟", next: "q24_help", log: "Q24救錯: 存在硬碟太慢了，處理完突發狀況回來會等很久喔！" }
                ]
            },

            // ⚾ 第 25 關：WBC 村上宗隆
            "q25": {
                tag: "⚾ 第 25 關：大腦休息 (WBC)",
                text: "2023 WBC 準決賽 日本對戰墨西哥，日本隊九局下半落後 1 分。當時陷入低潮被全網狂罵的日本強打者，頂住巨大壓力揮出了「再見二壘安打」逆轉晉級，完成救贖。這位打者是誰？",
                options: [
                    { text: "A. 村上宗隆", next: "q26", isCorrect: true },
                    { text: "B. 吉田正尚", next: "q25_help", log: "Q25錯: 吉田在前面打出了追平三分砲，也很關鍵" },
                    { text: "C. 大谷翔平", next: "q25_help", log: "Q25錯: 大谷是敲出二壘安打帶動攻勢上壘的那個人" },
                    { text: "D. 山川穗高", next: "q25_help", log: "Q25錯: 關鍵時刻代打的是山川，但這球不是他打的" }
                ]
            },
            "q25_help": {
                tag: "💊 提示：村神降臨",
                text: "他在日職打出破紀錄的單季 56 轟，被日本球迷尊稱為「村神」。雖然經典賽前幾場狂被三振，但最後一棒把大谷和周東送回本壘！",
                options: [
                    { text: "A. 村上宗隆", next: "q25", isCorrect: true },
                    { text: "B. 吉田正尚", next: "q25_help", log: "Q25救錯: 吉田正尚是那個超穩定的猛男，沒有陷入低潮啦！" }
                ]
            },

            // --- 第 26 關：記憶體對應 I/O ---
            "q26": {
                tag: "第 26 關：I/O 存取",
                text: "在微電腦設計中，如果把外部設備（如鍵盤、螢幕）當作「記憶體的一部份」，給它一個記憶體位址，CPU 可以用一般的 MOV 指令來存取它。這稱為什麼架構？",
                options: [
                    { text: "A. 記憶體對應 I/O (Memory-Mapped I/O)", next: "q27", isCorrect: true },
                    { text: "B. 獨立式 I/O (Isolated I/O)", next: "q26_help", log: "Q26錯: 這是把 I/O 位址跟記憶體分開的架構" },
                    { text: "C. 中斷式 I/O", next: "q26_help", log: "Q26錯: 這是傳輸觸發方式，不是位址架構" },
                    { text: "D. 直接記憶體存取 (DMA)", next: "q26_help", log: "Q26錯: 這是晶片代工搬資料的技術" }
                ]
            },
            "q26_help": {
                tag: "💊 救援任務：名稱就在題目裡",
                text: "知識拆解：題目說「把外部設備當作『記憶體』來『對應』」。所以這個架構的名字非常直白，就叫做？",
                options: [
                    { text: "A. 記憶體對應 I/O", next: "q26", isCorrect: true },
                    { text: "B. 獨立式 I/O", next: "q26_help", log: "Q26救錯: 獨立式是 I/O 自己有專屬的地址空間(如 IN/OUT 指令)，跟記憶體分開的！" }
                ]
            },

            // --- 第 27 關：輪詢 Polling ---
            "q27": {
                tag: "第 27 關：I/O 存取",
                text: "早期電腦讀取鍵盤的方式，是 CPU 寫一個無窮迴圈「一直不斷去問鍵盤：你有沒有被按下？」。這種極度浪費 CPU 效能的方式稱為？",
                options: [
                    { text: "A. 輪詢 (Polling)", next: "q28", isCorrect: true },
                    { text: "B. 中斷 (Interrupt)", next: "q27_help", log: "Q27錯: 中斷是鍵盤按下了才主動去叫 CPU" },
                    { text: "C. 握手 (Handshaking)", next: "q27_help", log: "Q27錯: 這是資料傳輸前的確認協議" },
                    { text: "D. 多工 (Multitasking)", next: "q27_help", log: "Q27錯: 這是作業系統同時跑多個程式的能力" }
                ]
            },
            "q27_help": {
                tag: "💊 救援任務：像警察巡邏",
                text: "知識拆解：CPU 就像警察一樣，一個個去「輪流查詢」所有的周邊設備有沒有事。英文叫 Polling。",
                options: [
                    { text: "A. 輪詢 (Polling)", next: "q27", isCorrect: true },
                    { text: "B. 中斷 (Interrupt)", next: "q27_help", log: "Q27救錯: 中斷比較聰明，是鍵盤有事才去報警，不會浪費警察時間！" }
                ]
            },

            // --- 第 28 關：看門狗計時器 ---
            "q28": {
                tag: "第 28 關：單晶片周邊",
                text: "單晶片(MCU)放在工業環境中，可能會因為雜訊干擾而當機(死機)。為了防止系統卡死，常會內建一個計時器，如果程式當掉沒有定時去「餵」它，它就會強制把系統 Reset 重開機。這個元件稱為？",
                options: [
                    { text: "A. 看門狗計時器 (Watchdog Timer, WDT)", next: "q29", isCorrect: true },
                    { text: "B. 脈寬調變器 (PWM)", next: "q28_help", log: "Q28錯: 這是用來控制馬達轉速或LED亮度的" },
                    { text: "C. 類比數位轉換器 (ADC)", next: "q28_help", log: "Q28錯: 這是讀取類比訊號的" },
                    { text: "D. 即時時鐘 (RTC)", next: "q28_help", log: "Q28錯: 這是顯示現在幾點幾分用的" }
                ]
            },
            "q28_help": {
                tag: "💊 救援任務：會咬人的狗",
                text: "知識拆解：這個計時器就像一隻兇猛的狗。正常運作時，程式每一段時間都會去「餵食(Clear)」牠。如果程式死當忘了餵，牠餓過頭就會咬系統一口，強制重開機！",
                options: [
                    { text: "A. 看門狗計時器 (WDT)", next: "q28", isCorrect: true },
                    { text: "B. 即時時鐘 (RTC)", next: "q28_help", log: "Q28救錯: RTC 只是個時鐘，不會強制重開機喔！" }
                ]
            },

            // --- 第 29 關：PWM 脈寬調變 ---
            "q29": {
                tag: "第 29 關：單晶片周邊",
                text: "若想利用單晶片的「數位腳位 (只有 0V 和 5V)」來控制馬達的速度或是 LED 的漸暗漸亮，最常使用的是哪一種技術來模擬類比電壓？",
                options: [
                    { text: "A. PWM (脈寬調變)", next: "q30", isCorrect: true },
                    { text: "B. UART (非同步收發)", next: "q29_help", log: "Q29錯: 這是用來跟電腦傳輸資料的" },
                    { text: "C. I2C 匯流排", next: "q29_help", log: "Q29錯: 這是感測器通訊協定" },
                    { text: "D. WDT (看門狗)", next: "q29_help", log: "Q29錯: 這是防止當機的" }
                ]
            },
            "q29_help": {
                tag: "💊 救援任務：開關的藝術",
                text: "知識拆解：PWM (Pulse Width Modulation) 是透過極快地切換「開(5V)」與「關(0V)」的比例。如果 80% 時間開、20% 時間關，平均起來就像是輸出了 4V 的類比電壓。",
                options: [
                    { text: "A. PWM (脈寬調變)", next: "q29", isCorrect: true },
                    { text: "B. UART", next: "q29_help", log: "Q29救錯: UART 是 TX/RX 傳送文字資料用的，不能控馬達喔！" }
                ]
            },

            // ⚾ 第 30 關：WBC 應援團
            "q30": {
                tag: "⚾ 第 30 關：大腦休息 (WBC)",
                text: "2023 WBC A組預賽在台灣台中洲際棒球場舉行。比賽期間，令大聯盟官網記者與外國球隊震撼不已，甚至稱之為「世界奇觀」的場邊特色是什麼？",
                options: [
                    { text: "A. 兩萬人站立齊唱與啦啦隊的「台式應援」", next: "q31", isCorrect: true },
                    { text: "B. 球場賣的超巨大熱狗堡", next: "q30_help", log: "Q30錯: 這不是重點" },
                    { text: "C. 台灣球迷都戴著斗笠看球", next: "q30_help", log: "Q30錯: 並沒有這種習俗" },
                    { text: "D. 比賽中會施放無人機煙火", next: "q30_help", log: "Q30錯: 只有開幕或特定儀式才有" }
                ]
            },
            "q30_help": {
                tag: "💊 提示：Team Taiwan",
                text: "大聯盟記者在推特上發文：「這聽起來像是一場有兩萬人的搖滾演唱會」。女孩們的帶動跳與每一位球員專屬的應援曲，徹底震撼了世界。",
                options: [
                    { text: "A. 啦啦隊的「台式應援」", next: "q30", isCorrect: true },
                    { text: "B. 球場賣的超巨大熱狗堡", next: "q30_help", log: "Q30救錯: 雖然食物很好吃，但震撼外國人的是聲音跟氣氛啦！" }
                ]
            },

            // --- 第 31 關：串列傳輸 UART ---
            "q31": {
                tag: "第 31 關：通訊介面",
                text: "單晶片(如 Arduino)最常透過 USB 線與電腦顯示視窗進行「串列通訊」。這種只需要 TX (傳送) 和 RX (接收) 兩條資料線就能雙向溝通的介面簡稱為何？",
                options: [
                    { text: "A. UART", next: "q32", isCorrect: true },
                    { text: "B. LPT", next: "q31_help", log: "Q31錯: 這是早期的並列印表機埠" },
                    { text: "C. HDMI", next: "q31_help", log: "Q31錯: 這是影音傳輸線" },
                    { text: "D. VGA", next: "q31_help", log: "Q31錯: 這是早期的類比螢幕線" }
                ]
            },
            "q31_help": {
                tag: "💊 救援任務：通用非同步收發",
                text: "知識拆解：Universal Asynchronous Receiver/Transmitter。它是最經典的非同步串列傳輸，因為不共用時脈線，所以雙方必須約定好一樣的「鮑率(Baud Rate)」。",
                options: [
                    { text: "A. UART", next: "q31", isCorrect: true },
                    { text: "B. HDMI", next: "q31_help", log: "Q31救錯: HDMI 線裡面有十九根腳位，不是只有兩根線喔！" }
                ]
            },

            // --- 第 32 關：鮑率 Baud Rate ---
            "q32": {
                tag: "第 32 關：通訊介面",
                text: "承上題，在設定 UART 序列埠通訊時，我們常常需要設定一個數值如「9600」。這個代表「每秒傳輸多少個位元」的速度單位稱為什麼？",
                options: [
                    { text: "A. 鮑率 (Baud Rate / bps)", next: "q33", isCorrect: true },
                    { text: "B. 赫茲 (Hz)", next: "q32_help", log: "Q32錯: 這是頻率單位" },
                    { text: "C. 瓦特 (Watt)", next: "q32_help", log: "Q32錯: 這是功率單位" },
                    { text: "D. 浮點數 (Flops)", next: "q32_help", log: "Q32錯: 這是運算效能單位" }
                ]
            },
            "q32_help": {
                tag: "💊 救援任務：傳輸的速度",
                text: "知識拆解：bps = bits per second。在早期的數據機時代，這個字被用來紀念電報發明人 Baudot，所以我們中文都直接音譯。",
                options: [
                    { text: "A. 鮑率 (Baud Rate)", next: "q32", isCorrect: true },
                    { text: "B. 赫茲 (Hz)", next: "q32_help", log: "Q32救錯: Hz 是指時脈一秒震動幾次，傳輸資料的速度是用 bps (鮑率) 喔！" }
                ]
            },

            // --- 第 33 關：ADC 解析度 ---
            "q33": {
                tag: "第 33 關：單晶片周邊",
                text: "若一個單晶片內建了「10位元」的 ADC (類比轉數位轉換器)。這代表它可以將讀取到的電壓值，切割成多少個不同刻度的數位數值？",
                options: [
                    { text: "A. 1024 個 (2的10次方)", next: "q34", isCorrect: true },
                    { text: "B. 10 個", next: "q33_help", log: "Q33錯: 不是直接對應位元數" },
                    { text: "C. 256 個 (2的8次方)", next: "q33_help", log: "Q33錯: 這是 8 位元的解析度" },
                    { text: "D. 1000 個", next: "q33_help", log: "Q33錯: 二進位世界沒有剛好 1000 的整數" }
                ]
            },
            "q33_help": {
                tag: "💊 救援任務：二的十次方",
                text: "知識拆解：二進位的世界是算 2 的次方。8 位元是 256 (0~255)；往上乘兩次，9位元是 512，10位元是？",
                options: [
                    { text: "A. 1024 個", next: "q33", isCorrect: true },
                    { text: "B. 1000 個", next: "q33_help", log: "Q33救錯: 1k 在二進位世界精確的數字是 1024 啦！" }
                ]
            },

            // --- 第 34 關：累加器 ACC ---
            "q34": {
                tag: "第 34 關：CPU 暫存器",
                text: "在執行算術運算 (如加法) 時，最忙碌的暫存器是哪一個？它通常負責提供其中一個運算元，並且在算完後「把結果存回自己肚子裡」。",
                options: [
                    { text: "A. 累加器 (ACC)", next: "q35", isCorrect: true },
                    { text: "B. 程式計數器 (PC)", next: "q34_help", log: "Q34錯: 這是管地址的" },
                    { text: "C. 堆疊指標 (SP)", next: "q34_help", log: "Q34錯: 這是管堆疊深度的" },
                    { text: "D. 指令暫存器 (IR)", next: "q34_help", log: "Q34錯: 這是存指令的" }
                ]
            },
            "q34_help": {
                tag: "💊 救援任務：一直疊加",
                text: "知識拆解：因為運算結果會一直加回到它身上累積起來 (A = A + B)，所以英文叫 Accumulator。簡稱是？",
                options: [
                    { text: "A. 累加器 (ACC)", next: "q34", isCorrect: true },
                    { text: "B. 程式計數器 (PC)", next: "q34_help", log: "Q34救錯: PC 是指引方向的，不負責算數學喔！" }
                ]
            },

            // ⚾ 第 35 關：WBC 突破僵局
            "q35": {
                tag: "⚾ 第 35 關：大腦休息 (WBC)",
                text: "為了解決棒球比賽打到延長賽過於漫長、拖垮投手手臂的問題，WBC 經典賽從第 10 局開始會採用「突破僵局制」。請問其規則是什麼？",
                options: [
                    { text: "A. 開局直接奉送二壘有人，且無人出局", next: "q36", isCorrect: true },
                    { text: "B. 開局直接滿壘", next: "q35_help", log: "Q35錯: 滿壘太容易得分了" },
                    { text: "C. 兩出局開始打", next: "q35_help", log: "Q35錯: 這樣反而很難得分" },
                    { text: "D. 雙方教練猜拳決定勝負", next: "q35_help", log: "Q35錯: 這不是正規比賽做法" }
                ]
            },
            "q35_help": {
                tag: "💊 提示：得點圈有人",
                text: "為了加快得分速度，裁判會讓前一局最後出局的打者直接站上「得點圈」，只要一支安打就有極大機率得分。",
                options: [
                    { text: "A. 無人出局，二壘有人", next: "q35", isCorrect: true },
                    { text: "B. 開局直接滿壘", next: "q35_help", log: "Q35救錯: 滿壘的話投手壓力太大了，目前是放二壘而已喔！" }
                ]
            },

            // --- 第 36 關：記憶體容量計算 ---
            "q36": {
                tag: "第 36 關：系統匯流排",
                text: "若一顆 CPU 的「位址匯流排 (Address Bus)」共有 16 根線 (16 bits)。這代表這顆 CPU 最大可以定址(存取)多少容量的記憶體空間？",
                options: [
                    { text: "A. 64 KB (2的16次方)", next: "q37", isCorrect: true },
                    { text: "B. 16 KB", next: "q36_help", log: "Q36錯: 不是直接加 K" },
                    { text: "C. 1 MB", next: "q36_help", log: "Q36錯: 1MB 需要 20 根位址線 (2^20)" },
                    { text: "D. 4 GB", next: "q36_help", log: "Q36錯: 4GB 需要 32 根位址線 (2^32)" }
                ]
            },
            "q36_help": {
                tag: "💊 救援任務：指數的威力",
                text: "知識拆解：10 根線 = 2^10 = 1024 = 1K。 16 根線等於 2^16，也就是把它拆成 2^6 乘上 2^10。 2的6次方是 64，配上後面的 K，所以是？",
                options: [
                    { text: "A. 64 KB", next: "q36", isCorrect: true },
                    { text: "B. 1 MB", next: "q36_help", log: "Q36救錯: 要 1 MB 必須要有 20 根線 (2^20) 喔！" }
                ]
            },

            // --- 第 37 關：旗標暫存器 ---
            "q37": {
                tag: "第 37 關：CPU 暫存器",
                text: "CPU 在做完數學運算後，如果發生了「進位 (Carry)」、「結果為零 (Zero)」、或「溢位 (Overflow)」，這些特殊的狀態會記錄在哪一個暫存器中？",
                options: [
                    { text: "A. 狀態 / 旗標暫存器 (Status / Flag Register)", next: "q38", isCorrect: true },
                    { text: "B. 累加器 (ACC)", next: "q37_help", log: "Q37錯: ACC 放的是運算『結果的數值』，不是狀態" },
                    { text: "C. 程式計數器 (PC)", next: "q37_help", log: "Q37錯: PC 放的是地址" },
                    { text: "D. 指令暫存器 (IR)", next: "q37_help", log: "Q37錯: IR 存放指令" }
                ]
            },
            "q37_help": {
                tag: "💊 救援任務：舉起信號旗",
                text: "知識拆解：就像賽車場上，如果有人車禍，裁判就會舉起「黃旗」警告大家。CPU 如果算數算到爆掉(進位)，它的這個暫存器裡面的某個位元就會變成 1 (舉旗)。",
                options: [
                    { text: "A. 旗標暫存器 (Flag)", next: "q37", isCorrect: true },
                    { text: "B. 累加器 (ACC)", next: "q37_help", log: "Q37救錯: ACC 放的是答案(比如 5+3=8 的 8)，進位與否是存在旁邊的旗標裡！" }
                ]
            },

            // --- 第 38 關：大小端 Endianness ---
            "q38": {
                tag: "第 38 關：資料儲存",
                text: "當我們把一筆很大的 32 位元資料 (例如 0x12345678) 存進 8 位元的記憶體時，如果把最低位的位元組 (78) 存在記憶體最低的位址，這種排列方式稱為？",
                options: [
                    { text: "A. 小端序 (Little-Endian)", next: "q39", isCorrect: true },
                    { text: "B. 大端序 (Big-Endian)", next: "q38_help", log: "Q38錯: 大端序是把最高位(12)存在最低位址" },
                    { text: "C. 循序存取", next: "q38_help", log: "Q38錯: 這是磁帶的存取特性" },
                    { text: "D. 隨機存取", next: "q38_help", log: "Q38錯: 這是 RAM 的特性" }
                ]
            },
            "q38_help": {
                tag: "💊 救援任務：尾巴先放",
                text: "知識拆解：最低位(Least Significant Byte) 就是數字的尾巴。如果尾巴(小的一端)優先排在記憶體的最前面，英文就叫做 Little-Endian。",
                options: [
                    { text: "A. 小端序 (Little-Endian)", next: "q38", isCorrect: true },
                    { text: "B. 大端序 (Big-Endian)", next: "q38_help", log: "Q38救錯: 大端序是頭部(高位)先放進去喔！" }
                ]
            },

            // --- 第 39 關：三態緩衝器 ---
            "q39": {
                tag: "第 39 關：匯流排控制",
                text: "系統匯流排是共用的通道。為了避免兩個裝置同時把資料丟上匯流排造成「撞車短路」，每個裝置的出口都會加上一個控制開關。當它不傳資料時，會呈現「高阻抗」狀態宛如斷線。這個元件是？",
                options: [
                    { text: "A. 三態緩衝器 (Tri-state Buffer)", next: "q40", isCorrect: true },
                    { text: "B. 解碼器 (Decoder)", next: "q39_help", log: "Q39錯: 這是把位址轉成選擇信號用的" },
                    { text: "C. 加法器 (Adder)", next: "q39_help", log: "Q39錯: 這是運算單元" },
                    { text: "D. 多工器 (Multiplexer)", next: "q39_help", log: "Q39錯: 這是多選一的開關" }
                ]
            },
            "q39_help": {
                tag: "💊 救援任務：第三種狀態",
                text: "知識拆解：數位邏輯一般只有 0 和 1 兩個狀態。但為了保護匯流排，發明了第 3 種狀態：「高阻抗(Hi-Z)」，也就是不理你、假裝自己斷線。有三種狀態的緩衝器叫做？",
                options: [
                    { text: "A. 三態緩衝器", next: "q39", isCorrect: true },
                    { text: "B. 多工器", next: "q39_help", log: "Q39救錯: 多工器是 N 個輸入選 1 個輸出，無法切斷與匯流排的連結喔！" }
                ]
            },

            // ⚾ 第 40 關：WBC 佐佐木朗希
            "q40": {
                tag: "⚾ 第 40 關：大腦休息 (WBC)",
                text: "日本隊在 2023 WBC 有一位被稱為「令和怪物」的年輕強投，他曾投出 164 公里的恐怖火球，甚至在比賽中不小心砸到捷克隊打者，賽後還親自提著兩大袋零食去對手飯店道歉。他是誰？",
                options: [
                    { text: "A. 佐佐木朗希", next: "q41", isCorrect: true },
                    { text: "B. 山本由伸", next: "q40_help", log: "Q40錯: 山本是極其精準的王牌，後來去躲人隊了" },
                    { text: "C. 今永昇太", next: "q40_help", log: "Q40錯: 今永是決賽先發左投" },
                    { text: "D. 達比修有", next: "q40_help", log: "Q40錯: 達比修是老大哥精神領袖" }
                ]
            },
            "q40_help": {
                tag: "💊 提示：令和怪物",
                text: "他在日職投出過完全比賽，最誇張的是連續三振了 13 名打者！因為太年輕又太猛，被媒體冠上「令和怪物」的稱號。",
                options: [
                    { text: "A. 佐佐木朗希", next: "q40", isCorrect: true },
                    { text: "B. 達比修有", next: "q40_help", log: "Q40救錯: 達比修有年紀比較大，不是新生代的令和怪物啦！" }
                ]
            },

            // --- 第 41 關：快取對映 ---
            "q41": {
                tag: "第 41 關：記憶體架構",
                text: "快取記憶體 (Cache) 的對映方式中，哪一種方式讓主記憶體的每一塊，都只能固定塞進 Cache 的「唯一一個特定位置」？(優點是硬體最簡單找得快，缺點是容易發生衝突被踢掉)",
                options: [
                    { text: "A. 直接對映 (Direct Mapping)", next: "q42", isCorrect: true },
                    { text: "B. 全關聯對映 (Fully Associative)", next: "q41_help", log: "Q41錯: 全關聯是可以隨便塞任何空位" },
                    { text: "C. 集合關聯對映 (Set Associative)", next: "q41_help", log: "Q41錯: 這是折衷方案" },
                    { text: "D. 虛擬記憶體對映", next: "q41_help", log: "Q41錯: 這是硬碟與RAM之間的關係" }
                ]
            },
            "q41_help": {
                tag: "💊 救援任務：一個蘿蔔一個坑",
                text: "知識拆解：1 號記憶體只能住 1 號房，2 號只能住 2 號房。「直接」規定死死的，沒有任何彈性。這叫什麼對映？",
                options: [
                    { text: "A. 直接對映", next: "q41", isCorrect: true },
                    { text: "B. 全關聯對映", next: "q41_help", log: "Q41救錯: 全關聯是隨便你住哪間都可以，最自由但也最難找喔！" }
                ]
            },

            // --- 第 42 關：USB 架構 ---
            "q42": {
                tag: "第 42 關：匯流排與介面",
                text: "目前電腦最普及的 USB (通用序列匯流排)，在網路拓撲結構上，是屬於哪一種連接形狀？(允許透過 Hub 擴充，最多連接 127 個裝置)",
                options: [
                    { text: "A. 樹狀拓撲 (Tree / Tiered Star)", next: "q43", isCorrect: true },
                    { text: "B. 環狀拓撲 (Ring)", next: "q42_help", log: "Q42錯: USB不是頭尾相連的環" },
                    { text: "C. 網狀拓撲 (Mesh)", next: "q42_help", log: "Q42錯: 裝置間不會互相連來連去" },
                    { text: "D. 匯流排拓撲 (Bus)", next: "q42_help", log: "Q42錯: 雖然名字有匯流排，但物理結構不是一條主幹拉到底" }
                ]
            },
            "q42_help": {
                tag: "💊 救援任務：主機長出枝葉",
                text: "知識拆解：電腦主機(Root)接出一個 Hub，這個 Hub 又可以分接好幾個設備，就像大樹的樹幹長出樹枝，樹枝又長出樹葉一樣。這叫什麼拓撲？",
                options: [
                    { text: "A. 樹狀拓撲", next: "q42", isCorrect: true },
                    { text: "B. 環狀拓撲", next: "q42_help", log: "Q42救錯: 你滑鼠的線並不會去連鍵盤形成一個圈圈啊！" }
                ]
            },

            // --- 第 43 關：不可遮罩中斷 ---
            "q43": {
                tag: "第 43 關：中斷機制",
                text: "在 CPU 的中斷接腳中，有一種最高緊急等級的中斷，軟體「絕對無法」忽略或關閉它，通常用於嚴重的硬體故障（如電源快沒電了）。這稱為？",
                options: [
                    { text: "A. 不可遮罩中斷 (NMI)", next: "q44", isCorrect: true },
                    { text: "B. 可遮罩中斷 (INTR)", next: "q43_help", log: "Q43錯: 這個可以用軟體 CLI 指令關閉" },
                    { text: "C. 軟體中斷 (Software Interrupt)", next: "q43_help", log: "Q43錯: 這是程式自己呼叫的" },
                    { text: "D. 內部中斷 (Internal Interrupt)", next: "q43_help", log: "Q43錯: 例如除以零錯誤" }
                ]
            },
            "q43_help": {
                tag: "💊 救援任務：無法閉上眼睛",
                text: "知識拆解：Mask 有遮罩、面具、無視的意思。既然這個中斷緊急到「不能無視、不能遮起來」，那它的英文簡稱 Non-Maskable Interrupt 翻譯過來是？",
                options: [
                    { text: "A. 不可遮罩中斷 (NMI)", next: "q43", isCorrect: true },
                    { text: "B. 可遮罩中斷 (INTR)", next: "q43_help", log: "Q43救錯: 可遮罩代表 CPU 可以設定不要理它，但電源快斷了不能不理啊！" }
                ]
            },

            // --- 第 44 關：PCIe ---
            "q44": {
                tag: "第 44 關：匯流排與介面",
                text: "現代電腦顯示卡與主機板連接的主流介面是 PCIe (PCI Express)。與早期的 PCI 相比，PCIe 最大的技術突破是將傳輸方式從「並列(Parallel)」改成了什麼？",
                options: [
                    { text: "A. 高速串列傳輸 (Serial)", next: "q45", isCorrect: true },
                    { text: "B. 無線傳輸 (Wireless)", next: "q44_help", log: "Q44錯: 顯示卡還是要插在主機板上" },
                    { text: "C. 類比傳輸 (Analog)", next: "q44_help", log: "Q44錯: 電腦內部都是數位信號" },
                    { text: "D. 光纖傳輸 (Optical)", next: "q44_help", log: "Q44錯: 雖然有光纖技術，但主機板槽仍是銅線" }
                ]
            },
            "q44_help": {
                tag: "💊 救援任務：排隊比並排快",
                text: "知識拆解：以前以為幾十條線「並排」傳輸比較快，但頻率變高後線跟線之間會互相干擾。後來發現只用幾對線做「高速排成一列 (串列)」反而能飆出極速！",
                options: [
                    { text: "A. 高速串列傳輸", next: "q44", isCorrect: true },
                    { text: "B. 類比傳輸", next: "q44_help", log: "Q44救錯: 數位時代早就淘汰類比傳輸了！" }
                ]
            },

            // 🏆 第 45 關：大谷翔平的再見滑球
            "q45": {
                tag: "🏆 最終關：大腦休息 (WBC)",
                text: "最後一題！2023 WBC 冠軍戰，九局上半兩出局滿球數，大谷翔平對決楚奧特投出的「最後一顆球」，以極其誇張的橫向位移讓他揮棒落空。請問大谷這顆魔球是什麼球種？",
                options: [
                    { text: "A. 滑球 (Sweeper / Slider)", next: "end", isCorrect: true },
                    { text: "B. 快速直球 (Fastball)", next: "q45_help", log: "Q45錯: 大谷前面投過 100 mph 的直球，但最後一球不是" },
                    { text: "C. 指叉球 (Splitter)", next: "q45_help", log: "Q45錯: 這是大谷也很擅長的下墜球種，但最後一顆不是" },
                    { text: "D. 變速球 (Changeup)", next: "q45_help", log: "Q45錯: 大谷較少投變速球" }
                ]
            },
            "q45_help": {
                tag: "💊 提示：橫掃千軍",
                text: "這顆球從好球帶中間，硬生生地向外側「橫向滑動」了將近 43 公分，就像是用掃把橫掃過去一樣，被美國媒體稱為 Sweeper。",
                options: [
                    { text: "A. 滑球 (Sweeper)", next: "q45", isCorrect: true },
                    { text: "B. 快速直球", next: "q45_help", log: "Q45救錯: 直球是不會這樣誇張橫向轉彎的！" }
                ]
            }
        };

        // ==========================================
        // 系統變數與遊戲邏輯
        // ==========================================
        let studentName = "";
        let currentStep = "q1"; 
        let hp = 30; 
        let currentStreak = 0; 
        let diagnosticLogs = [];
        let sessionCards = []; 
        let failedQuestions = []; 
        let startTime = 0;           
        let totalTime = 0;           
        let rescueTriggered = 0;     
        let rescueFails = 0;
        let isTransitioning = false; 
        
        // 🚨 預設卡包改為第二階段 (phase2)
        let currentPackId = "phase2"; 

        // 確保網頁載入完成後才執行選單初始化
        document.addEventListener('DOMContentLoaded', () => {
            initPackSelector();
        });

        function initPackSelector() {
            const selector = document.getElementById('pack-selector');
            if (!selector) return;
            selector.innerHTML = '';
            Object.keys(cardPacks).forEach(key => {
                if (cardPacks[key].cards.length > 0) {
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            let inputName = document.getElementById('student-name').value.trim();
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            let inputName = document.getElementById('student-name').value.trim();
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            studentName = document.getElementById('student-name').value.trim();
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                btn.innerText = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            if (!cardPacks[currentPackId]) currentPackId = "phase1";
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';
        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            if(!scriptURL) return;
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData }).catch(e=>console.log(e));
        }

        async function syncCloudData() {
            let inputName = document.getElementById('student-name').value.trim();
            if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                let response = await fetch(scriptURL + "?name=" + encodeURIComponent(inputName), { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    localStorage.setItem("gachaCollection_" + inputName, result.data);
                    alert("✅ 雲端同步成功！已為您載入最新的圖鑑進度！\n您可以點擊「查看我的圖鑑」確認。");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
