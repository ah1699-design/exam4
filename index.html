        body.rescue-mode { background-color: #4a1010; }

        .container {
            background-color: #2c3e50; width: 90%; max-width: 650px;

        h1 { color: #f1c40f; margin-bottom: 5px; }
        .subtitle { color: #95a5a6; margin-bottom: 20px; font-size: 14px; }
        
        #student-setup { display: block; }
        #game-area { display: none; }
        #result-area { display: none; }

        input[type="text"] {
            width: 80%; padding: 15px; font-size: 18px; border-radius: 8px; 
            border: 2px solid #3498db; background: #1a1a2e; color: white; 
            text-align: center; margin-bottom: 20px;
        }

        /* 卡包選擇器 UI */
        .pack-selector-container {
            margin: 20px 0; padding: 15px; background: #16213e; border-radius: 10px;
        }
        .pack-selector-title { font-size: 16px; color: #f39c12; margin-bottom: 10px; font-weight: bold; }
        .pack-grid {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
        }
        .pack-option {
            background: #2c3e50; border: 2px solid #34495e; border-radius: 8px;
            padding: 10px 15px; cursor: pointer; transition: 0.3s;
            font-size: 16px; font-weight: bold; color: #cbd5e1; flex: 1; min-width: 120px;
        }
        .pack-option:hover { background: #34495e; }
        .pack-option.active {
            background: #2980b9; border-color: #3498db; color: #fff;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.6); transform: scale(1.05);
        }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #16213e; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px;
        }
        .hp-bar { font-size: 18px; color: #e74c3c; text-align: left; display: flex; align-items: center; gap: 10px;}
        .streak-badge { background: #d35400; color: white; padding: 3px 8px; border-radius: 5px; font-size: 14px; font-weight: bold; }
        .inventory { font-size: 14px; color: #f1c40f; text-align: right; font-weight: bold;}
        
        .tag {
            display: inline-block; background: #e74c3c; color: white;
            padding: 5px 10px; border-radius: 5px; font-size: 14px; margin-bottom: 15px; font-weight: bold;

        .question-text { font-size: 22px; line-height: 1.5; margin-bottom: 30px; }

        .btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 15px;
            font-size: 18px; cursor: pointer; border: none; border-radius: 8px;
            background-color: #34495e; color: white; font-weight: bold; transition: 0.2s; box-shadow: 0 4px #2c3e50;
        }
        .btn:hover { background-color: #3498db; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-start { background-color: #27ae60; box-shadow: 0 4px #1e8449; margin-top: 10px; }
        .btn-collection { background-color: #8e44ad; box-shadow: 0 4px #732d91; }

        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                text: "知識拆解：共「陰」極代表所有 LED 的負極(接地)都綁在一起了。既然下面已經接地(0V)，上面就必須給予高電壓(1)，電流才能流過去發光！",
                options: [
                    { text: "A. 高電位 (1)", next: "q15", isCorrect: true },
                    { text: "B. 低電位 (0)", next: "q15_help", log: "Q15救錯: 大家都已經在低電位(陰)了，你再給低電位就沒有電壓差了！" }
                ]
            },

            // --- 第 16 關：同位元檢查 ---
            "q16": {
                tag: "第 16 關：錯誤偵測",
                text: "數位傳輸時常會加上 1 個「同位元 (Parity Bit)」來檢查有沒有傳錯。在「偶同位 (Even Parity)」系統中，若資料為 1011001，我們加上的同位元應該是 0 還是 1？",
                options: [
                    { text: "A. 0", next: "q17", isCorrect: true },
                    { text: "B. 1", next: "q16_help", log: "Q16錯: 加上 1 總共會有 5 個 1，變成奇同位" },
                    { text: "C. 視距離而定", next: "q16_help", log: "Q16錯: 同位元只跟資料中 1 的個數有關" },
                    { text: "D. 可有可無", next: "q16_help", log: "Q16錯: 同位元必須精準設定" }
                ]
            },
            "q16_help": {
                tag: "💊 救援任務：湊成偶數",
                text: "知識拆解：偶同位就是要讓整包資料加起來「1 的總數是偶數」。現在 1011001 裡面已經有 4 個 1 了。4 已經是偶數，所以我們不用再加 1 了，只要補上？",
                options: [
                    { text: "A. 0", next: "q16", isCorrect: true },
                    { text: "B. 1", next: "q16_help", log: "Q16救錯: 再補 1 個上去就變 5 個 1，變成奇數了啦！" }
                ]
            },

            // --- 第 17 關：比較器設計 ---
            "q17": {
                tag: "第 17 關：數位比較器",
                text: "1 位元的數位比較器用來比較 A、B 兩數。當 A = B 時，輸出高電位 (1)。請問此功能可以由哪一種邏輯閘獨立實現？",
                options: [
                    { text: "A. XNOR 閘 (反互斥或閘)", next: "q18", isCorrect: true },
                    { text: "B. XOR 閘", next: "q17_help", log: "Q17錯: 這是 A ≠ B 時才輸出 1" },
                    { text: "C. AND 閘", next: "q17_help", log: "Q17錯: AND 只有 1=1 時為 1，0=0 時為 0" },
                    { text: "D. OR 閘", next: "q17_help", log: "Q17錯: 只要有 1 就為 1" }
                ]
            },
            "q17_help": {
                tag: "💊 救援任務：相同為真",
                text: "知識拆解：「A=B」代表他們兩個完全一樣(00 或 11)。「相同才輸出 1」的邏輯閘，就是互斥或閘(XOR)加上反相(NOT)。也就是？",
                options: [
                    { text: "A. XNOR 閘", next: "q17", isCorrect: true },
                    { text: "B. XOR 閘", next: "q17_help", log: "Q17救錯: XOR 叫做『互斥』，是不一樣才會輸出 1 喔！" }
                ]
            },

            // --- 第 18 關：加法器與減法器 ---
            "q18": {
                tag: "第 18 關：組合邏輯應用",
                text: "在數位電路中，要將加法器變成「減法器 (A - B)」，我們通常會將被減數 B 轉換成二補數後再相加。實務上會用什麼邏輯閘加上控制訊號，來決定 B 要不要反相？",
                options: [
                    { text: "A. XOR 閘", next: "q19", isCorrect: true },
                    { text: "B. AND 閘", next: "q18_help", log: "Q18錯: AND 無法做受控反相" },
                    { text: "C. OR 閘", next: "q18_help", log: "Q18錯: OR 無法做受控反相" },
                    { text: "D. NOT 閘", next: "q18_help", log: "Q18錯: NOT 閘會永久反相，無法控制加減切換" }
                ]
            },
            "q18_help": {
                tag: "💊 救援任務：可控的反相器",
                text: "知識拆解：XOR 閘有個超強特性：當控制端為 0，B 原封不動過去(做加法)；當控制端為 1，B 就會反相變成 B'(做減法前置作業)。這顆神奇的閘是？",
                options: [
                    { text: "A. XOR 閘", next: "q18", isCorrect: true },
                    { text: "B. NOT 閘", next: "q18_help", log: "Q18救錯: NOT 閘永遠都是反的，這樣電路就只能做減法不能做加法了！" }
                ]
            },

            // --- 第 19 關：循序與組合的差異 ---
            "q19": {
                tag: "第 19 關：循序邏輯基礎",
                text: "「循序邏輯電路 (Sequential Logic)」與「組合邏輯電路 (Combinational Logic)」最根本的差別，在於循序邏輯具備了什麼特性？",
                options: [
                    { text: "A. 具有記憶功能 (有回授路徑)", next: "q20", isCorrect: true },
                    { text: "B. 速度比較快", next: "q19_help", log: "Q19錯: 循序邏輯有記憶元件，速度通常受限於時脈" },
                    { text: "C. 不需要電源", next: "q19_help", log: "Q19錯: 兩者皆需要電源" },
                    { text: "D. 只能做加減法", next: "q19_help", log: "Q19錯: 這是組合邏輯(加法器)的任務" }
                ]
            },
            "q19_help": {
                tag: "💊 救援任務：記住過去",
                text: "知識拆解：加法器算完就忘記了。但紅綠燈必須「記住」現在是綠燈，下一秒才知道要換黃燈。這種把輸出繞回輸入的電路，擁有了什麼功能？",
                options: [
                    { text: "A. 記憶功能", next: "q19", isCorrect: true },
                    { text: "B. 速度快", next: "q19_help", log: "Q19救錯: 多了記憶元件反而會讓時序變複雜喔！" }
                ]
            },

            // 🏃 第 20 關：路跑呼吸
            "q20": {
                tag: "🏃 第 20 關：大腦休息 (路跑)",
                text: "路跑知識補充！在跑 8.3Km 時，為了避免跑到一半岔氣肚子痛，教練通常會建議新手採用怎樣的「呼吸節奏」最能穩定供氧？",
                options: [
                    { text: "A. 兩吸兩吐 (吸吸-吐吐，配合腳步)", next: "q21", isCorrect: true },
                    { text: "B. 全程憋氣衝刺", next: "q20_help", log: "Q20錯: 這樣會缺氧暈倒" },
                    { text: "C. 嘴巴大口猛吸", next: "q20_help", log: "Q20錯: 容易口乾舌燥並吃進冷空氣" },
                    { text: "D. 不規律喘氣", next: "q20_help", log: "Q20錯: 不規律容易打亂心率引發岔氣" }
                ]
            },
            "q20_help": {
                tag: "💊 提示：節奏感是王道",
                text: "長跑最講究規律。配合左右腳落地的節奏，鼻子深吸兩次，嘴巴穩穩吐出兩次，是最經典的長跑心法！",
                options: [
                    { text: "A. 兩吸兩吐", next: "q20", isCorrect: true },
                    { text: "B. 嘴巴大口猛吸", next: "q20_help", log: "Q20救錯: 這樣很快就會口乾舌燥，無法撐完 8.3 公里！" }
                ]
            },

            // --- 第 21 關：SR 閂鎖器 ---
            "q21": {
                tag: "第 21 關：正反器",
                text: "在使用 NOR 閘組成的基本「SR 閂鎖器 (Latch)」中，S (Set) 與 R (Reset) 絕對不可以同時輸入 1。因為這會導致什麼結果？",
                options: [
                    { text: "A. 輸出狀態無法預測 (禁忌狀態)", next: "q22", isCorrect: true },
                    { text: "B. 輸出進入切換狀態 (Toggle)", next: "q21_help", log: "Q21錯: 這是 JK 或 T 正反器的功能" },
                    { text: "C. 輸出保持不變", next: "q21_help", log: "Q21錯: 這是 S=0, R=0 的狀態" },
                    { text: "D. 晶片會立刻燒毀", next: "q21_help", log: "Q21錯: 只是邏輯錯亂，不會物理燒毀" }
                ]
            },
            "q21_help": {
                tag: "💊 救援任務：矛盾的大對決",
                text: "知識拆解：S(Set)是叫它變成1，R(Reset)是叫它變成0。你同時命令它變1又要變0，它會精神分裂，導致 Q 和 Q' 違背反相原則。這被稱為什麼？",
                options: [
                    { text: "A. 禁忌狀態 (無法預測)", next: "q21", isCorrect: true },
                    { text: "B. 切換狀態 (Toggle)", next: "q21_help", log: "Q21救錯: SR 正反器沒有 Toggle 的能力，只會當機給你看！" }
                ]
            },

            // --- 第 22 關：D 正反器 ---
            "q22": {
                tag: "第 22 關：正反器",
                text: "為了解決 SR 正反器會產生禁忌狀態的問題，我們把 S 和 R 中間加一個 NOT 閘串在一起，變成只有一個輸入端。這形成了哪一種正反器？",
                options: [
                    { text: "A. D 正反器 (Data / Delay)", next: "q23", isCorrect: true },
                    { text: "B. T 正反器", next: "q22_help", log: "Q22錯: T 是由 JK 綁在一起變成的" },
                    { text: "C. JK 正反器", next: "q22_help", log: "Q22錯: JK 是改良 SR 回授路徑解決禁忌" },
                    { text: "D. RS 正反器", next: "q22_help", log: "Q22錯: 這是原本的" }
                ]
            },
            "q22_help": {
                tag: "💊 救援任務：輸入什麼就存什麼",
                text: "知識拆解：把 S 和 R 用反相器連起來，保證永遠是一正一反，絕不會有 1,1 出現。這種乖乖聽話，輸入 1 輸出就跟著 1 的正反器叫？",
                options: [
                    { text: "A. D 正反器", next: "q22", isCorrect: true },
                    { text: "B. T 正反器", next: "q22_help", log: "Q22救錯: T 正反器會切換狀態，D 才是完全複製資料 (Data) 的喔！" }
                ]
            },

            // --- 第 23 關：JK 正反器 ---
            "q23": {
                tag: "第 23 關：正反器",
                text: "號稱「萬能正反器」的 JK 正反器，不僅解決了禁忌狀態，還多了一個新功能。當 J=1 且 K=1，並打入一個時脈 (Clock) 時，輸出狀態會如何？",
                options: [
                    { text: "A. 反轉 / 切換 (Toggle)", next: "q24", isCorrect: true },
                    { text: "B. 保持不變 (No Change)", next: "q23_help", log: "Q23錯: 這是 J=0, K=0 時" },
                    { text: "C. 強制設為 1 (Set)", next: "q23_help", log: "Q23錯: 這是 J=1, K=0 時" },
                    { text: "D. 進入禁忌狀態", next: "q23_help", log: "Q23錯: JK 已經消除了禁忌" }
                ]
            },
            "q23_help": {
                tag: "💊 救援任務：0變1，1變0",
                text: "知識拆解：JK 的最大賣點！當兩個開關都催到滿(1,1)，每按一次時鐘，燈泡就會 0變1，再按一次又 1變0。這個閃爍動作稱為？",
                options: [
                    { text: "A. 切換 (Toggle)", next: "q23", isCorrect: true },
                    { text: "B. 保持不變", next: "q23_help", log: "Q23救錯: 保持不變是甚麼都沒做(0,0)的時候啦！" }
                ]
            },

            // --- 第 24 關：觸發方式 ---
            "q24": {
                tag: "第 24 關：時脈觸發",
                text: "在正反器的符號中，如果 Clock 輸入端有一個「小三角形 (▷)」，這代表該正反器是採用哪一種觸發方式？",
                options: [
                    { text: "A. 邊緣觸發 (Edge Trigger)", next: "q25", isCorrect: true },
                    { text: "B. 準位觸發 (Level Trigger)", next: "q24_help", log: "Q24錯: 準位觸發沒有三角形" },
                    { text: "C. 異步觸發 (Asynchronous)", next: "q24_help", log: "Q24錯: 時脈本身就是用來同步的" },
                    { text: "D. 負邏輯觸發", next: "q24_help", log: "Q24錯: 負邏輯會有小圓圈" }
                ]
            },
            "q24_help": {
                tag: "💊 救援任務：瞬間的判定",
                text: "知識拆解：準位觸發是「只要在高電位就會一直動作」，容易出錯。畫上小三角形代表它只在時脈「上升或下降的那一瞬間(邊緣)」才抓取資料！",
                options: [
                    { text: "A. 邊緣觸發", next: "q24", isCorrect: true },
                    { text: "B. 準位觸發", next: "q24_help", log: "Q24救錯: 沒有三角形的才叫準位觸發喔！" }
                ]
            },

            // --- 第 25 關：T 正反器除頻 ---
            "q25": {
                tag: "第 25 關：正反器應用",
                text: "如果我們把一個時脈頻率為 1000 Hz 的方波，輸入到一個 T=1 的「T 正反器」中。請問輸出的頻率會變成多少？",
                options: [
                    { text: "A. 500 Hz", next: "q26", isCorrect: true },
                    { text: "B. 2000 Hz", next: "q25_help", log: "Q25錯: 正反器無法倍頻" },
                    { text: "C. 1000 Hz", next: "q25_help", log: "Q25錯: 經過 Toggle 頻率會減半" },
                    { text: "D. 0 Hz", next: "q25_help", log: "Q25錯: 波形還在震盪" }
                ]
            },
            "q25_help": {
                tag: "💊 救援任務：砍半神器",
                text: "知識拆解：T 正反器(Toggle)每看到兩次輸入的上升緣，輸出才會完成一次高低變化。也就是說，它天生具備「除以 2 (除頻)」的功能。1000 除以 2 是？",
                options: [
                    { text: "A. 500 Hz", next: "q25", isCorrect: true },
                    { text: "B. 2000 Hz", next: "q25_help", log: "Q25救錯: 正反器會把頻率變慢，不會變快啦！" }
                ]
            },

            // --- 第 26 關：時間參數 ---
            "q26": {
                tag: "第 26 關：循序邏輯特性",
                text: "為了確保正反器能正確抓到資料，資料必須在時脈邊緣到來「之前」，就先穩定保持一段時間。這段前置作業時間稱為？",
                options: [
                    { text: "A. 建立時間 (Setup Time)", next: "q27", isCorrect: true },
                    { text: "B. 維持時間 (Hold Time)", next: "q26_help", log: "Q26錯: 這是時脈『之後』要撐住的時間" },
                    { text: "C. 傳遞延遲 (Propagation Delay)", next: "q26_help", log: "Q26錯: 這是電路輸出反應所需的時間" },
                    { text: "D. 週期時間 (Cycle Time)", next: "q26_help", log: "Q26錯: 這是時脈的長度" }
                ]
            },
            "q26_help": {
                tag: "💊 救援任務：拍照請擺好Pose",
                text: "知識拆解：時脈邊緣就像照相機快門。在按下快門「前」，你要先擺好 Pose 站穩(建立狀態)。按完快門後還要撐住一下(維持)。題目問的是「之前」！",
                options: [
                    { text: "A. 建立時間", next: "q26", isCorrect: true },
                    { text: "B. 維持時間", next: "q26_help", log: "Q26救錯: 維持是按完快門『之後』的事情喔！" }
                ]
            },

            // --- 第 27 關：非同步計數器 ---
            "q27": {
                tag: "第 27 關：計數器",
                text: "「非同步計數器 (Asynchronous Counter)」又稱為漣波計數器。其最大的特徵是什麼？",
                options: [
                    { text: "A. 時脈 (Clock) 只接給第一顆正反器，後面的正反器由前一顆的輸出觸發", next: "q28", isCorrect: true },
                    { text: "B. 所有的正反器都接在同一個時脈 (Clock) 訊號上", next: "q27_help", log: "Q27錯: 這是同步計數器的特徵" },
                    { text: "C. 只能往下倒數計數，不能上數", next: "q27_help", log: "Q27錯: 它可以設計成上數或下數" },
                    { text: "D. 不會產生任何時間延遲", next: "q27_help", log: "Q27錯: 非同步的致命缺點就是延遲會累積" }
                ]
            },
            "q27_help": {
                tag: "💊 救援任務：骨牌效應",
                text: "知識拆解：「非同步」就是大家不同步！時鐘只有老大看得到，老大動了才去推老二，老二動了再推老三。像漣波(水波)一樣傳遞。",
                options: [
                    { text: "A. 時脈只接給第一顆，像骨牌一樣傳遞", next: "q27", isCorrect: true },
                    { text: "B. 大家接同一個時脈", next: "q27_help", log: "Q27救錯: 大家看同一個時鐘就變成「同步」計數器了啦！" }
                ]
            },

            // --- 第 28 關：計數器模數 ---
            "q28": {
                tag: "第 28 關：計數器設計",
                text: "如果我們用 4 顆正反器來設計一個二進位上數計數器，它最多可以計數幾個不同的狀態 (Modulus)？",
                options: [
                    { text: "A. 16 個 (Mod-16)", next: "q29", isCorrect: true },
                    { text: "B. 4 個 (Mod-4)", next: "q28_help", log: "Q28錯: 正反器數量不等於狀態數" },
                    { text: "C. 8 個 (Mod-8)", next: "q28_help", log: "Q28錯: 這是 3 顆正反器的極限" },
                    { text: "D. 10 個 (Mod-10)", next: "q28_help", log: "Q28錯: 雖然 4 顆能做十進位，但『最多』可到 16" }
                ]
            },
            "q28_help": {
                tag: "💊 救援任務：二的魔法",
                text: "知識拆解：1 顆正反器有 0, 1 兩種狀態。串連 4 顆，可以從 0000 數到 1111。2 的 4 次方等於多少？",
                options: [
                    { text: "A. 16 個", next: "q28", isCorrect: true },
                    { text: "B. 8 個", next: "q28_help", log: "Q28救錯: 2 × 2 × 2 × 2 = 16 喔！" }
                ]
            },

            // --- 第 29 關：BCD 計數器 ---
            "q29": {
                tag: "第 29 關：計數器應用",
                text: "承上題，如果我們需要一個「十進位計數器 (Mod-10 / BCD)」，數到 9 (1001) 之後就要歸零跳回 0。請問我們「最少」需要幾顆正反器才能兜出來？",
                options: [
                    { text: "A. 4 顆", next: "q30", isCorrect: true },
                    { text: "B. 3 顆", next: "q29_help", log: "Q29錯: 3 顆最多只能數到 7 (8種狀態)" },
                    { text: "C. 10 顆", next: "q29_help", log: "Q29錯: 不需要這麼多" },
                    { text: "D. 5 顆", next: "q29_help", log: "Q29錯: 雖然 5 顆可以，但不是『最少』" }
                ]
            },
            "q29_help": {
                tag: "💊 救援任務：強迫提早下車",
                text: "知識拆解：十進位需要 10 個狀態。3 顆正反器只有 8 種(不夠用)，所以我們必須升級用 4 顆(有16種)。然後用邏輯閘強迫它在數到 10 的瞬間強制歸零。最少需要幾顆？",
                options: [
                    { text: "A. 4 顆", next: "q29", isCorrect: true },
                    { text: "B. 3 顆", next: "q29_help", log: "Q29救錯: 3 顆極限只有 8 種，裝不下 10 個數字啦！" }
                ]
            },

            // 🏃 第 30 關：路跑裝備
            "q30": {
                tag: "🏃 第 30 關：大腦休息 (路跑)",
                text: "跑 8.3Km 時，為了避免身體過熱與摩擦破皮，絕對「不建議」穿著哪一種材質的衣服去跑步？",
                options: [
                    { text: "A. 100% 純棉 T-shirt", next: "q31", isCorrect: true },
                    { text: "B. 聚酯纖維排汗衫", next: "q30_help", log: "Q30錯: 這是最棒的跑衣材質" },
                    { text: "C. 輕薄緊身跑褲", next: "q30_help", log: "Q30錯: 緊身褲能減少大腿摩擦" },
                    { text: "D. 運動機能襪", next: "q30_help", log: "Q30錯: 機能襪能防起水泡" }
                ]
            },
            "q30_help": {
                tag: "💊 提示：吸水變鐵甲",
                text: "這種材質雖然平常穿很舒服，但一吸滿汗水就會變得很重，而且完全不透氣，貼在皮膚上一直摩擦會超級痛！",
                options: [
                    { text: "A. 100% 純棉", next: "q30", isCorrect: true },
                    { text: "B. 聚酯纖維排汗衫", next: "q30_help", log: "Q30救錯: 排汗衫是人造纖維，是跑步的最佳神隊友喔！" }
                ]
            },

            // --- 第 31 關：環形計數器 ---
            "q31": {
                tag: "第 31 關：移位暫存器",
                text: "將移位暫存器的「最後一個輸出 (Q_last)」直接拉回去接「第一個輸入 (D_first)」，形成一個 1 在裡面不斷繞圈圈的電路，稱為什麼？",
                options: [
                    { text: "A. 環形計數器 (Ring Counter)", next: "q32", isCorrect: true },
                    { text: "B. 強生計數器 (Johnson Counter)", next: "q31_help", log: "Q31錯: 強生計數器是拉反相輸出回去" },
                    { text: "C. 漣波計數器", next: "q31_help", log: "Q31錯: 這是用 T 正反器串聯的" },
                    { text: "D. 隨機亂數產生器", next: "q31_help", log: "Q31錯: 這個電路規律很固定" }
                ]
            },
            "q31_help": {
                tag: "💊 救援任務：首尾相連",
                text: "知識拆解：頭接尾，尾接頭，形成一個完美的圓圈。燈號 1000 ➡️ 0100 ➡️ 0010 ➡️ 0001 ➡️ 1000 一直跑。這叫什麼形狀？",
                options: [
                    { text: "A. 環形計數器", next: "q31", isCorrect: true },
                    { text: "B. 強生計數器", next: "q31_help", log: "Q31救錯: 強生計數器是把尾巴『反相(打結)』後才接回去喔！" }
                ]
            },

            // --- 第 32 關：強生計數器 ---
            "q32": {
                tag: "第 32 關：移位暫存器",
                text: "承上題，如果使用 4 顆正反器做成「強生計數器 (Johnson Counter, 扭環形)」，它一個循環總共會有幾個不同的狀態？",
                options: [
                    { text: "A. 8 個 (2N)", next: "q33", isCorrect: true },
                    { text: "B. 4 個 (N)", next: "q32_help", log: "Q32錯: 這是普通環形計數器的狀態數" },
                    { text: "C. 16 個 (2^N)", next: "q32_help", log: "Q32錯: 這是二進位計數器的極限" },
                    { text: "D. 10 個", next: "q32_help", log: "Q32錯: 數量不對" }
                ]
            },
            "q32_help": {
                tag: "💊 救援任務：加倍奉還",
                text: "知識拆解：N 個正反器，環形計數器只有 N 個狀態；但強生計數器因為尾巴加了反相(扭了一下)，狀態數會變成原本的兩倍 (2N)。4 顆的兩倍是？",
                options: [
                    { text: "A. 8 個", next: "q32", isCorrect: true },
                    { text: "B. 16 個", next: "q32_help", log: "Q32救錯: 16 個是普通二進位的計算法(2的N次方)啦！" }
                ]
            },

            // --- 第 33 關：暫存器傳輸形式 ---
            "q33": {
                tag: "第 33 關：資料傳輸",
                text: "如果我們要把一個 8-bit 的資料，透過「一條實體線路」傳送給另一個暫存器。我們應該使用哪一種形式的移位暫存器？",
                options: [
                    { text: "A. PISO (並列輸入，串列輸出)", next: "q34", isCorrect: true },
                    { text: "B. PIPO (並列輸入，並列輸出)", next: "q33_help", log: "Q33錯: 這樣需要 8 條線" },
                    { text: "C. SIPO (串列輸入，並列輸出)", next: "q33_help", log: "Q33錯: 這是接收端的處理方式" },
                    { text: "D. D-Flip-Flop 直連", next: "q33_help", log: "Q33錯: 沒有移位功能" }
                ]
            },
            "q33_help": {
                tag: "💊 救援任務：擠進單行道",
                text: "知識拆解：你有 8 個兵要過一座很窄的獨木橋(一條線)。所以必須大家先同時排好隊(並列輸入 Parallel-In)，然後一個一個走過橋(串列輸出 Serial-Out)。簡稱是？",
                options: [
                    { text: "A. PISO", next: "q33", isCorrect: true },
                    { text: "B. PIPO", next: "q33_help", log: "Q33救錯: PIPO 是並排過橋，需要蓋 8 座橋(8條線)才行喔！" }
                ]
            },

            // --- 第 34 關：Moore 與 Mealy ---
            "q34": {
                tag: "第 34 關：狀態機模型",
                text: "在設計循序邏輯的狀態機 (State Machine) 時，「Moore 機 (摩爾機)」的最大特徵是其「輸出 (Output)」只跟什麼有關？",
                options: [
                    { text: "A. 僅跟電路『目前的狀態 (Present State)』有關", next: "q35", isCorrect: true },
                    { text: "B. 跟『目前狀態』與『外部輸入 (Input)』都有關", next: "q34_help", log: "Q34錯: 這是 Mealy 機的特徵" },
                    { text: "C. 僅跟『外部輸入』有關", next: "q34_help", log: "Q34錯: 那就退化成組合邏輯了" },
                    { text: "D. 只跟時脈 (Clock) 頻率有關", next: "q34_help", log: "Q34錯: 時脈只決定切換速度" }
                ]
            },
            "q34_help": {
                tag: "💊 救援任務：不受外界干擾",
                text: "知識拆解：統測愛考名詞比較！Mealy 機的輸出會被外人(輸入)影響；而 Moore (摩爾) 機很自我，輸出只由「自己肚子裡的現在狀態」決定。所以是？",
                options: [
                    { text: "A. 僅跟『目前狀態』有關", next: "q34", isCorrect: true },
                    { text: "B. 跟『目前狀態』與『外部輸入』有關", next: "q34_help", log: "Q34救錯: 這是 Mealy (米利) 機的特徵喔！" }
                ]
            },

            // --- 第 35 關：狀態圖 ---
            "q35": {
                tag: "第 35 關：狀態圖設計",
                text: "設計計數器時畫的「狀態圖 (State Diagram)」中，『圓圈』和『箭頭』分別代表什麼意義？",
                options: [
                    { text: "A. 圓圈代表「狀態」，箭頭代表「狀態轉換(條件)」", next: "q36", isCorrect: true },
                    { text: "B. 圓圈代表「輸入」，箭頭代表「輸出」", next: "q35_help", log: "Q35錯: 圓圈裡面寫的是 Q 的狀態值" },
                    { text: "C. 圓圈代表「邏輯閘」，箭頭代表「電線」", next: "q35_help", log: "Q35錯: 這是電路圖，不是狀態圖" },
                    { text: "D. 圓圈代表「正反器」，箭頭代表「時脈」", next: "q35_help", log: "Q35錯: 不對" }
                ]
            },
            "q35_help": {
                tag: "💊 救援任務：大富翁的格子",
                text: "知識拆解：狀態圖就像大富翁！地上的「圓圈」是你現在站的位置(狀態)，而指引你走到下一格的「箭頭」就是轉換的過程與條件。所以是？",
                options: [
                    { text: "A. 圓圈=狀態，箭頭=轉換", next: "q35", isCorrect: true },
                    { text: "B. 圓圈=輸入，箭頭=輸出", next: "q35_help", log: "Q35救錯: 輸出通常寫在圓圈裡面(Moore)或箭頭旁邊(Mealy)，圓圈本身是狀態！" }
                ]
            },

            // --- 第 36 關：CMOS 優點 ---
            "q36": {
                tag: "第 36 關：邏輯族特性",
                text: "現代數位 IC 幾乎全面捨棄早期的 TTL 而採用 CMOS 技術。請問 CMOS 最大的優點是什麼？",
                options: [
                    { text: "A. 靜態消耗功率極低 (非常省電)", next: "q37", isCorrect: true },
                    { text: "B. 工作速度比 TTL 快非常多", next: "q36_help", log: "Q36錯: 早期 CMOS 其實比 TTL 慢" },
                    { text: "C. 完全不怕靜電破壞", next: "q36_help", log: "Q36錯: CMOS 最怕靜電 (ESD)" },
                    { text: "D. 只能接受 5V 電壓", next: "q36_help", log: "Q36錯: CMOS 電壓範圍很寬 (如3V~15V)" }
                ]
            },
            "q36_help": {
                tag: "💊 救援任務：手機的命脈",
                text: "知識拆解：因為 CMOS 是用 PMOS 和 NMOS 互補，只要沒有在切換(0變1或1變0)，電路幾乎是斷路的，不會漏電。這讓手機能待機一整天！最大的優點是？",
                options: [
                    { text: "A. 非常省電", next: "q36", isCorrect: true },
                    { text: "B. 完全不怕靜電", next: "q36_help", log: "Q36救錯: CMOS 的二氧化矽層超薄，手一摸靜電就會把它擊穿燒毀！" }
                ]
            },

            // --- 第 37 關：Fan-out 扇出數 ---
            "q37": {
                tag: "第 37 關：邏輯族特性",
                text: "數位電路規格中的「扇出數 (Fan-out)」，代表什麼意思？",
                options: [
                    { text: "A. 一個邏輯閘的輸出，最多能安全推動幾個相同邏輯閘的輸入", next: "q38", isCorrect: true },
                    { text: "B. 一個邏輯閘最多可以有幾個輸入端", next: "q37_help", log: "Q37錯: 這是 Fan-in (扇入數)" },
                    { text: "C. 邏輯閘內部的散熱風扇數量", next: "q37_help", log: "Q37錯: 這是搞笑選項" },
                    { text: "D. 訊號從輸入傳到輸出的時間延遲", next: "q37_help", log: "Q37錯: 這是傳遞延遲 (Propagation Delay)" }
                ]
            },
            "q37_help": {
                tag: "💊 救援任務：老大帶小弟",
                text: "知識拆解：Fan-OUT 的 Out 代表「輸出端」。這就像一個大哥(輸出端)的體力極限，最多能帶領幾個小弟(別人的輸入端)而不被拖垮電壓。這叫？",
                options: [
                    { text: "A. 最多能推動幾個輸入", next: "q37", isCorrect: true },
                    { text: "B. 最多能有幾個輸入", next: "q37_help", log: "Q37救錯: 問輸入端數量的是 Fan-IN (扇入數) 喔！" }
                ]
            },

            // --- 第 38 關：Noise Margin 雜訊邊際 ---
            "q38": {
                tag: "第 38 關：邏輯族特性",
                text: "「雜訊邊際 (Noise Margin)」是衡量邏輯電路好壞的重要指標。它代表什麼意義？",
                options: [
                    { text: "A. 電路能容忍外界雜訊干擾，而不造成誤判的最大電壓值", next: "q39", isCorrect: true },
                    { text: "B. 邏輯閘運作時自己產生的雜訊大小", next: "q38_help", log: "Q38錯: 這是測量抗干擾能力，不是產生雜訊的能力" },
                    { text: "C. 輸出高低電位的電壓差", next: "q38_help", log: "Q38錯: 這是信號擺幅" },
                    { text: "D. 0 和 1 切換時的模糊地帶", next: "q38_help", log: "Q38錯: 雜訊邊際是安全區，不是模糊地帶" }
                ]
            },
            "q38_help": {
                tag: "💊 救援任務：防護罩有多厚",
                text: "知識拆解：Margin 有邊界、餘地的意思。雜訊邊際越大，代表電路的「防護罩」越厚，就算有突波打進來，0 也不會被誤判成 1。所以它是測量什麼？",
                options: [
                    { text: "A. 能容忍雜訊而不誤判的最大電壓", next: "q38", isCorrect: true },
                    { text: "B. 電路自己產生的雜訊", next: "q38_help", log: "Q38救錯: 我們是希望抗雜訊能力越大越好，誰希望自己產生大雜訊啦！" }
                ]
            },

            // --- 第 39 關：記憶體 RAM/ROM ---
            "q39": {
                tag: "第 39 關：記憶元件",
                text: "關於 ROM (唯讀記憶體) 與 RAM (隨機存取記憶體)，下列敘述何者正確？",
                options: [
                    { text: "A. 關閉電源後，ROM 的資料會保留，RAM 的資料會消失", next: "q40", isCorrect: true },
                    { text: "B. ROM 只能讀不能寫，所以隨身碟是 RAM", next: "q39_help", log: "Q39錯: 隨身碟是 Flash ROM，斷電不消失" },
                    { text: "C. RAM 速度慢，適合長期存檔", next: "q39_help", log: "Q39錯: RAM 速度快，但斷電即消失" },
                    { text: "D. 兩者斷電後資料都會保留", next: "q39_help", log: "Q39錯: 只有 ROM (非揮發性) 會保留" }
                ]
            },
            "q39_help": {
                tag: "💊 救援任務：揮發的記憶",
                text: "知識拆解：RAM 稱為「揮發性記憶體」，只要一拔掉插頭，裡面記的東西就會瞬間忘光光；ROM 是「非揮發性」，斷電依然牢記。所以？",
                options: [
                    { text: "A. ROM 斷電保留，RAM 斷電消失", next: "q39", isCorrect: true },
                    { text: "B. 隨身碟是 RAM", next: "q39_help", log: "Q39救錯: 隨身碟拔出來(斷電)資料還在，所以它是 ROM 家族的 Flash ROM 喔！" }
                ]
            },

            // 🏃 第 40 關：路跑補水
            "q40": {
                tag: "🏃 第 40 關：大腦休息 (路跑)",
                text: "路跑知識補充！在跑 8.3Km 時，通常路上會設有「進水站」。專業跑者進水站拿紙杯喝水時，為了不嗆到又不用完全停下腳步，通常會怎麼做？",
                options: [
                    { text: "A. 把紙杯捏扁成尖嘴狀，小口吸水", next: "q41", isCorrect: true },
                    { text: "B. 停下來用雙手捧著喝完再跑", next: "q40_help", log: "Q40錯: 停下來會打亂節奏，重新起步很痛苦" },
                    { text: "C. 直接往臉上潑水解渴", next: "q40_help", log: "Q40錯: 水進不到肚子裡，只會更渴" },
                    { text: "D. 仰頭大口一次灌完", next: "q40_help", log: "Q40錯: 跑步中大口灌水極易嗆到" }
                ]
            },
            "q40_help": {
                tag: "💊 提示：控制水流量",
                text: "邊跑邊喝圓口杯的水一定會灑得滿臉都是，甚至嗆到氣管。聰明的跑者會把杯口改變形狀，控制水流變小。這要怎麼做？",
                options: [
                    { text: "A. 把紙杯捏成尖嘴狀小口喝", next: "q40", isCorrect: true },
                    { text: "B. 停下來用雙手捧著喝", next: "q40_help", log: "Q40救錯: 長跑停下來再跑腳會超像綁了鉛塊，能不停就不停！" }
                ]
            },

            // --- 第 41 關：ADC 解析度 ---
            "q41": {
                tag: "第 41 關：類比與數位轉換",
                text: "一顆「8 位元」的 ADC (類比轉數位轉換器)，可以將輸入的類比電壓值，切割成幾個不同的階層刻度？",
                options: [
                    { text: "A. 256 個 (2的8次方)", next: "q42", isCorrect: true },
                    { text: "B. 8 個", next: "q41_help", log: "Q41錯: 這只是線路數量" },
                    { text: "C. 128 個", next: "q41_help", log: "Q41錯: 這是 7 位元" },
                    { text: "D. 1024 個", next: "q41_help", log: "Q41錯: 這是 10 位元" }
                ]
            },
            "q41_help": {
                tag: "💊 救援任務：二進位的乘法",
                text: "知識拆解：N 個位元可以表達 2 的 N 次方種組合。8 位元就是 2 乘自己 8 次 (2×2×2×2×2×2×2×2)。算出來是多少？",
                options: [
                    { text: "A. 256 個", next: "q41", isCorrect: true },
                    { text: "B. 1024 個", next: "q41_help", log: "Q41救錯: 1024 是單晶片常見的 10位元 (2^10) 解析度喔！" }
                ]
            },

            // --- 第 42 關：PLA 與 PAL ---
            "q42": {
                tag: "第 42 關：可程式邏輯陣列",
                text: "在可程式邏輯元件 (PLD) 中，有 PLA 和 PAL 兩種。其中「PAL」的內部結構是什麼陣列可以燒錄(Programmable)，什麼陣列固定(Fixed)？",
                options: [
                    { text: "A. AND 陣列可程式，OR 陣列固定", next: "q43", isCorrect: true },
                    { text: "B. AND 陣列固定，OR 陣列可程式", next: "q42_help", log: "Q42錯: 這是 PROM 的結構" },
                    { text: "C. 兩者皆可程式", next: "q42_help", log: "Q42錯: 這是 PLA 的結構" },
                    { text: "D. 兩者皆固定", next: "q42_help", log: "Q42錯: 這樣就不能燒錄了" }
                ]
            },
            "q42_help": {
                tag: "💊 救援任務：英文簡寫還原",
                text: "知識拆解：PAL = Programmable AND Array Logic。名字裡直接點名了「AND 陣列是可程式化的」。為了省成本，另一半的 OR 陣列就是固定燒死的。所以？",
                options: [
                    { text: "A. AND 可程式，OR 固定", next: "q42", isCorrect: true },
                    { text: "B. 兩者皆可程式", next: "q42_help", log: "Q42救錯: 兩邊都可以燒錄的是更貴的 PLA 喔！" }
                ]
            },

            // --- 第 43 關：DAC R-2R ---
            "q43": {
                tag: "第 43 關：數位轉類比",
                text: "在使用「R-2R 階梯型電路」製作的 DAC (數位轉類比) 中，最大的優點是什麼？",
                options: [
                    { text: "A. 只需使用兩種阻值的電阻 (R 和 2R)，容易製作且精準", next: "q44", isCorrect: true },
                    { text: "B. 不需要運算放大器 OPA", next: "q43_help", log: "Q43錯: 還是需要 OPA 來做加總與緩衝" },
                    { text: "C. 解析度永遠是無限大", next: "q43_help", log: "Q43錯: 解析度受限於輸入位元數" },
                    { text: "D. 轉換速度是所有 DAC 中最快的", next: "q43_help", log: "Q43錯: 速度最快的是快閃型(Flash) ADC" }
                ]
            },
            "q43_help": {
                tag: "💊 救援任務：工廠量產的思維",
                text: "知識拆解：傳統的加權電阻 DAC 需要 1R, 2R, 4R, 8R... 非常多種不常見的電阻，工廠很難備料。R-2R 就像積木，整張電路板只用到 10k 和 20k 兩種電阻。這有什麼好處？",
                options: [
                    { text: "A. 只有兩種電阻，容易製作又精準", next: "q43", isCorrect: true },
                    { text: "B. 不需要 OPA", next: "q43_help", log: "Q43救錯: 最後還是需要 OPA 把電流轉回電壓喔！" }
                ]
            },

            // --- 第 44 關：TTL 浮接輸入 ---
            "q44": {
                tag: "第 44 關：邏輯族實務",
                text: "實習工場大魔王！當我們在使用 TTL 邏輯晶片 (如 7400 系列) 時，如果有某一個輸入腳「忘記接線 (浮接, Floating)」，TTL 內部電路會將這個腳位視為什麼狀態？",
                options: [
                    { text: "A. 視為邏輯「1」 (高電位)", next: "q45", isCorrect: true },
                    { text: "B. 視為邏輯「0」 (低電位)", next: "q44_help", log: "Q44錯: 要接地才會是 0" },
                    { text: "C. 視為雜訊，隨機跳動", next: "q44_help", log: "Q44錯: 這是 CMOS 晶片浮接的恐怖下場" },
                    { text: "D. 晶片直接燒毀", next: "q44_help", log: "Q44錯: TTL 浮接不會燒毀" }
                ]
            },
            "q44_help": {
                tag: "💊 救援任務：TTL與CMOS的差異",
                text: "知識拆解：統測超愛考！如果是 CMOS (4000系列) 浮接，會因為靜電亂跳 0和1 甚至燒毀。但 TTL 內部是 BJT 結構，沒接線時電流流不出去，會預設它處於高電壓。也就是？",
                options: [
                    { text: "A. 視為邏輯「1」", next: "q44", isCorrect: true },
                    { text: "B. 視為隨機跳動的雜訊", next: "q44_help", log: "Q44救錯: 那是比較先進也比較嬌弱的 CMOS 才會發生的慘劇！" }
                ]
            },

            // 🏃 第 45 關：終點衝刺與收操
            "q45": {
                tag: "🏆 最終關：大腦休息 (路跑)",
                text: "最後一題！恭喜你跑完 8.3Km 衝過終點線了！為了保護心臟與雙腿，衝過終點後你「最不應該」立刻做什麼事？",
                options: [
                    { text: "A. 立刻原地一屁股坐下或躺下休息", next: "end", isCorrect: true },
                    { text: "B. 慢慢走動 5 到 10 分鐘讓心跳緩和", next: "q45_help", log: "Q45錯: 這是非常正確的做法 (Cool down)" },
                    { text: "C. 喝幾口水或運動飲料補充流失水分", next: "q45_help", log: "Q45錯: 這也是正確的" },
                    { text: "D. 針對大小腿進行靜態拉筋伸展", next: "q45_help", log: "Q45錯: 緩和後拉筋有助於排乳酸" }
                ]
            },
            "q45_help": {
                tag: "💊 提示：血液回流機制",
                text: "剛劇烈運動完，心臟還在大量把血液打到腿部。如果不靠著慢慢走動讓小腿肌肉像幫浦一樣把血擠回心臟，腦部會瞬間缺血！所以絕對不能怎樣？",
                options: [
                    { text: "A. 立刻坐下或躺下", next: "q45", isCorrect: true },
                    { text: "B. 慢慢走動", next: "q45_help", log: "Q45救錯: 慢慢走是保命關鍵，不可以省喔！" }
                ]
            }
        };
        // ==========================================
        // 系統變數與遊戲邏輯
        // ==========================================
        let studentName = "";
        let currentStep = "q1"; 
        let hp = 30; 
        let currentStreak = 0; 
        let diagnosticLogs = [];
        let sessionCards = []; 
        let failedQuestions = []; 
        let startTime = 0;           
        let totalTime = 0;           
        let rescueTriggered = 0;     
        let rescueFails = 0;
        let isTransitioning = false; 
        
        // 🚨 預設卡包改為第二階段 (phase2)
        let currentPackId = "phase2"; 

        // 確保網頁載入完成後才執行選單初始化
        document.addEventListener('DOMContentLoaded', () => {
            initPackSelector();
        });

        function initPackSelector() {
            const selector = document.getElementById('pack-selector');
            if (!selector) return;
            selector.innerHTML = '';
            Object.keys(cardPacks).forEach(key => {
                if (cardPacks[key].cards.length > 0) {
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            let inputName = document.getElementById('student-name').value.trim();
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            let inputName = document.getElementById('student-name').value.trim();
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            studentName = document.getElementById('student-name').value.trim();
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                btn.innerText = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            if (!cardPacks[currentPackId]) currentPackId = "phase1";
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';
        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            if(!scriptURL) return;
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData }).catch(e=>console.log(e));
        }

        async function syncCloudData() {
            let inputName = document.getElementById('student-name').value.trim();
            if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                let response = await fetch(scriptURL + "?name=" + encodeURIComponent(inputName), { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    localStorage.setItem("gachaCollection_" + inputName, result.data);
                    alert("✅ 雲端同步成功！已為您載入最新的圖鑑進度！\n您可以點擊「查看我的圖鑑」確認。");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
