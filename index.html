    <script>
        // === 音效引擎 ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { 
            if (!audioCtx) audioCtx = new AudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }
        function playSound(type) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.3, now); osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'draw') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'synth') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); 
                osc.frequency.linearRampToValueAtTime(600, now + 0.3);
                osc.frequency.linearRampToValueAtTime(1200, now + 0.6);
                gain.gain.setValueAtTime(0.4, now); osc.start(now); osc.stop(now + 0.7);
            }
        }

                    { text: "MOD-2", next: "q19_help", log: "Q19錯: 數值錯誤" }
                ]
            },
            "q19_help": {
                tag: "💊 PBL 救援任務：翻面再跑一次",
                text: "【規律記憶】強生計數器因為接了「反相 Q'」，所以跑完一圈全變成 1 後，還要再跑第二圈全變成 0 才會回到原點。所以它的狀態數量是普通環形計數器的「兩倍 ($2N$)」！4 的兩倍是？",
                options: [
                    { text: "MOD-8", next: "q19", isCorrect: true },
                    { text: "MOD-16", next: "q19_help", log: "Q19救錯: 16 是 $2^N$ 的二進位計數器。強生計數器是 $2 \\times N$，所以是 8 喔！" }
                ]
            },

            // --- 第 20 題：同步 vs 非同步 ---
            "q20": {
                tag: "第 20 關：計數器設計",
                text: "比較「同步計數器」與「非同步計數器」，下列敘述何者正確？",
                options: [
                    { text: "同步計數器的所有正反器共用同一個時脈 (CLK)，速度較快", next: "q21", isCorrect: true },
                    { text: "非同步計數器的所有正反器共用同一個時脈 (CLK)", next: "q20_help", log: "Q20錯: 非同步是前一個的輸出接下一個的時脈" },
                    { text: "非同步計數器不會產生時間延遲的問題", next: "q20_help", log: "Q20錯: 它的延遲會一路累積，非常嚴重" },
                    { text: "同步計數器的電路設計比較簡單", next: "q20_help", log: "Q20錯: 同步需要複雜的組合邏輯閘來控制" }
                ]
            },
            "q20_help": {
                tag: "💊 PBL 救援任務：大家一起聽口令",
                text: "【名詞直觀】「同步」的意思就是大家動作一致。一個將軍(時脈 CLK) 喊口令，所有的小兵(正反器)同時動作。因為不用等前面的人傳話，所以它的速度會？",
                options: [
                    { text: "共用時脈，速度較快", next: "q20", isCorrect: true },
                    { text: "不會產生延遲", next: "q20_help", log: "Q20救錯: 「非同步」是像骨牌一樣一個推一個，時間延遲(Delay)會嚴重累積喔！" }
                ]
            },

            // --- 第 21 題：RS正反器轉換（NOR）---
            "q21": {
                tag: "第 21 關：正反器設計",
                text: "使用基本邏輯閘來組成 RS 正反器時，若使用「交錯耦合的 NOR 閘」，此種 RS 正反器是屬於哪一種動作狀態？",
                options: [
                    { text: "高動作 (High Active) - 輸入 1 才有反應", next: "q22", isCorrect: true },
                    { text: "低動作 (Low Active) - 輸入 0 才有反應", next: "q21_help", log: "Q21錯: 這是用 NAND 閘組成的特性" },
                    { text: "邊緣觸發", next: "q21_help", log: "Q21錯: 基本 RS 只有準位觸發" },
                    { text: "永遠保持 1", next: "q21_help", log: "Q21錯: 不對" }
                ]
            },
            "q21_help": {
                tag: "💊 PBL 救援任務：口訣 3HR",
                text: "【口訣記憶】講義上的必背神級口訣：「3HR」。3 = NOR 閘(三個英文字母)；H = High (高動作)；R = 上面那支腳是 Reset。記住 3H，代表 NOR 閘是高動作還是低動作？",
                options: [
                    { text: "高動作 (High Active)", next: "q21", isCorrect: true },
                    { text: "低動作 (Low Active)", next: "q21_help", log: "Q21救錯: 這是 4LS 口訣，4個字母的 NAND 閘才是低動作 (Low Active) 喔！" }
                ]
            },

            // --- 第 22 題：RS正反器轉換（NAND）---
            "q22": {
                tag: "第 22 關：正反器設計",
                text: "承上題，若使用「交錯耦合的 NAND 閘」來組成 RS 正反器，此電路是屬於低動作。請問這時上面那支輸入接腳是什麼功能？",
                options: [
                    { text: "S (Set, 設定)", next: "q23", isCorrect: true },
                    { text: "R (Reset, 清除)", next: "q22_help", log: "Q22錯: 這是 NOR 閘組成的接腳" },
                    { text: "CLK (時脈)", next: "q22_help", log: "Q22錯: 基本 RS 沒有時脈" },
                    { text: "Q (輸出)", next: "q22_help", log: "Q22錯: Q 是在右邊的輸出端" }
                ]
            },
            "q22_help": {
                tag: "💊 PBL 救援任務：口訣 4LS",
                text: "【口訣記憶】講義口訣第二彈：「4LS」。4 = NAND 閘(四個英文字母)；L = Low (低動作)。最後的 S 代表什麼？沒錯，就是上面那支腳的功能是 Set！",
                options: [
                    { text: "S (Set)", next: "q22", isCorrect: true },
                    { text: "R (Reset)", next: "q22_help", log: "Q22救錯: 這是 3HR 裡面的 R，NOR 閘上面才是 Reset 喔！" }
                ]
            },

            // --- 第 23 題：比較器 1位元 ---
            "q23": {
                tag: "第 23 關：組合邏輯",
                text: "在一個 1 位元的數值比較器中，用來判斷「輸入 A 是否等於輸入 B ($A=B$)」的邏輯輸出，等於哪一種基本邏輯閘的運算結果？",
                options: [
                    { text: "XNOR 閘 (反互斥或閘)", next: "q24", isCorrect: true },
                    { text: "XOR 閘 (互斥或閘)", next: "q23_help", log: "Q23錯: XOR 是用來判斷 $A \\neq B$ 的" },
                    { text: "AND 閘", next: "q23_help", log: "Q23錯: AND 不判斷相等" },
                    { text: "OR 閘", next: "q23_help", log: "Q23錯: OR 不判斷相等" }
                ]
            },
            "q23_help": {
                tag: "💊 PBL 救援任務：同類相吸",
                text: "【邏輯推演】XOR (互斥或) 的特性是「不一樣才亮 (A!=B)」。我們現在要判斷的是兩個人「一模一樣 (A=B)」。把 XOR 反過來，也就是在前面加一個 N，變成什麼閘？",
                options: [
                    { text: "XNOR 閘", next: "q23", isCorrect: true },
                    { text: "AND 閘", next: "q23_help", log: "Q23救錯: AND 閘只有 1 和 1 會亮，但 0 和 0 也是相等呀！所以要用同相才亮的 XNOR 喔！" }
                ]
            },

            // --- 第 24 題：半加器進位 ---
            "q24": {
                tag: "第 24 關：組合邏輯",
                text: "一個「半加器 (Half Adder)」有兩個輸入 (A, B) 和兩個輸出：總和 (Sum) 與進位 (Carry)。請問「進位 (Carry)」的輸出，等於哪一種基本邏輯閘的運算結果？",
                options: [
                    { text: "AND 閘 ($A \\cdot B$)", next: "q25", isCorrect: true },
                    { text: "XOR 閘 ($A \\oplus B$)", next: "q24_help", log: "Q24錯: 這是總和 Sum 的公式" },
                    { text: "OR 閘 ($A + B$)", next: "q24_help", log: "Q24錯: 錯誤" },
                    { text: "NAND 閘", next: "q24_help", log: "Q24錯: 錯誤" }
                ]
            },
            "q24_help": {
                tag: "💊 PBL 救援任務：滿載才進位",
                text: "【邏輯推演】二進位只有 0 和 1。什麼時候才會滿出來「進位」？只有當輸入 A 是 1，【而且】輸入 B 也是 1 的時候 (1+1=10，進位1)。「兩個都要」是哪一種邏輯閘？",
                options: [
                    { text: "AND 閘", next: "q24", isCorrect: true },
                    { text: "XOR 閘", next: "q24_help", log: "Q24救錯: XOR 是一大一小 (1+0=1) 的時候，那只會產生 Sum(總和)，還不會滿出來進位喔！" }
                ]
            },

            // --- 第 25 題：半減器借位 ---
            "q25": {
                tag: "第 25 關：組合邏輯",
                text: "承上題，一個「半減器 (Half Subtractor)」用來計算 $A - B$。其「借位 (Borrow)」輸出的布林代數式為何？",
                options: [
                    { text: "$\\bar{A} \\cdot B$", next: "q26", isCorrect: true },
                    { text: "$A \\cdot \\bar{B}$", next: "q25_help", log: "Q25錯: 被減數大，不需要借位" },
                    { text: "$A \\cdot B$", next: "q25_help", log: "Q25錯: 這是加法器進位的公式" },
                    { text: "$A \\oplus B$", next: "q25_help", log: "Q25錯: 這是差值 (Difference) 的公式" }
                ]
            },
            "q25_help": {
                tag: "💊 PBL 救援任務：小蝦米減大鯨魚",
                text: "【邏輯推演】什麼時候減法會需要「借位」？只有當前面比較小(A=0)，要減掉後面比較大(B=1) 的時候才需要借位！要讓 A=0, B=1 這組密碼變成 True (1)，必須把 0 反相，也就是給 A 戴上反相帽子！",
                options: [
                    { text: "$\\bar{A} \\cdot B$", next: "q25", isCorrect: true },
                    { text: "$A \\cdot \\bar{B}$", next: "q25_help", log: "Q25救錯: A是1、B是0，大減小夠減了，根本不需要借位喔！" }
                ]
            },

            // --- 第 26 題：解碼器與多工器比較 ---
            "q26": {
                tag: "第 26 關：元件比較",
                text: "關於「解碼器 (Decoder)」與「解多工器 (DeMUX)」的比較，下列敘述何者錯誤？",
                options: [
                    { text: "解多工器可以將好幾個輸入訊號，合併成一個輸出訊號", next: "q27", isCorrect: true },
                    { text: "解碼器有 N 個輸入，最大會有 $2^N$ 個輸出", next: "q26_help", log: "Q26錯: 這是解碼器的正確定義" },
                    { text: "解多工器是 1 個輸入，分配給 $2^N$ 個輸出", next: "q26_help", log: "Q26錯: 這是正確的定義" },

            },
            "q26_help": {
                tag: "💊 PBL 救援任務：De 代表解散",
                text: "【名詞解析】MUX (多工) 是把多個人擠進一條路。前面加上 De (解多工)，就是把那一條路上的人，重新「解散分配」到很多條路去！所以解多工是 1進多出，還是多進1出？",
                options: [
                    { text: "多進1出是錯的 (選這個)", next: "q26", isCorrect: true },
                    { text: "解碼器有 $2^N$ 輸出", next: "q26_help", log: "Q26救錯: 這是正確的！注意題目要選「錯誤」的選項喔！" }
                ]
            },

            // --- 第 27 題：編碼器 ---
            "q27": {
                tag: "第 27 關：組合邏輯",
                text: "在電子計算機中，若我們按下鍵盤上的某個數字鍵 (0~9)，會有一個電路負責把它轉換成電腦看得懂的二進位碼 (如 BCD 碼)。這個負責轉換的電路是？",
                options: [
                    { text: "編碼器 (Encoder)", next: "q28", isCorrect: true },

                    { text: "多工器 (MUX)", next: "q27_help", log: "Q27錯: 這是選路用的" },
                    { text: "加法器 (Adder)", next: "q27_help", log: "Q27錯: 這是算術運算" }
                ]
            },
            "q27_help": {
                tag: "💊 PBL 救援任務：寫成密碼",
                text: "【名詞直翻】人類看的懂的數字 0~9 (十進位)，要翻譯成電腦的 0101。這個動作就像特務在寫密碼信一樣，把明文「編寫成密碼」。這叫什麼器？",
                options: [
                    { text: "編碼器", next: "q27", isCorrect: true },

            // --- 第 28 題：正反器種類整理 ---
            "q28": {
                tag: "第 28 關：正反器總複習",
                text: "下列關於各種正反器特性的敘述，何者正確？",
                options: [
                    { text: "T 型正反器常被用來設計除頻器或計數器", next: "q29", isCorrect: true },

                    { text: "D 型正反器的輸入會隨時鐘信號發生反轉 (Toggle)", next: "q28_help", log: "Q28錯: D 型只負責原封不動存資料，不反轉" },
                    { text: "JK 正反器沒有反轉功能", next: "q28_help", log: "Q28錯: JK 最大的特色就是有反轉功能" }
                ]
            },
            "q28_help": {
                tag: "💊 PBL 救援任務：減半的魔法",
                text: "【元件直覺】T 型正反器的特色是「每輸入一個波，就翻面一次」。波上上下下兩次，它才剛好翻回原位。等於把原本很急促的頻率給「減半 (除頻)」了！所以它最適合用來做什麼？",
                options: [
                    { text: "做除頻器或計數器", next: "q28", isCorrect: true },
                    { text: "D 型正反器會反轉", next: "q28_help", log: "Q28救錯: D 型是最老實的 Data 暫存器，不會自己翻面反轉喔！" }
                ]
            },

            // --- 第 29 題：布林代數定理名稱 ---
            "q29": {
                tag: "第 29 關：布林代數",
                text: "在布林代數中，算式 $A(B+C) = AB + AC$ 所代表的是哪一個數學定律？",
                options: [
                    { text: "分配律", next: "q30", isCorrect: true },
                    { text: "交換律", next: "q29_help", log: "Q29錯: 交換律是 $A+B = B+A$" },
                    { text: "結合律", next: "q29_help", log: "Q29錯: 結合律是 $A+(B+C) = (A+B)+C$" },
                    { text: "吸收律", next: "q29_help", log: "Q29錯: 吸收律是 $A(A+B) = A$" }
                ]
            },
            "q29_help": {
                tag: "💊 PBL 救援任務：發撲克牌",
                text: "【國中數學】這跟一般的數學一模一樣！外面的 A 就像發牌員，把自己的點數「分別發給」括號裡面的 B 和 C。這種拆開括號的定律叫做？",
                options: [
                    { text: "分配律", next: "q29", isCorrect: true },
                    { text: "結合律", next: "q29_help", log: "Q29救錯: 結合律只是括號位置改變，不會把外面的字乘進去喔！" }
                ]
            },

            // --- 第 30 題：第摩根定理 ---
            "q30": {
                tag: "第 30 關：第摩根定理",
                text: "根據著名的「第摩根定理 (De Morgan's Laws)」，算式 $\\overline{A+B}$ 展開後會等於下列何者？",
                options: [
                    { text: "$\\bar{A} \\cdot \\bar{B}$", next: "q31", isCorrect: true },
                    { text: "$\\bar{A} + \\bar{B}$", next: "q30_help", log: "Q30錯: 符號沒有變號" },
                    { text: "$A \\cdot B$", next: "q30_help", log: "Q30錯: A和B必須戴上反相帽子" },
                    { text: "$A + B$", next: "q30_help", log: "Q30錯: 這是雙重反相的結果" }
                ]
            },
            "q30_help": {
                tag: "💊 PBL 救援任務：斬斷情絲",
                text: "【口訣記憶】第摩根定理的口訣是：「把長長的屋頂(反相棒) 砍斷！然後把中間的加號變乘號，乘號變加號」。所以原本是相加 ($A+B$)，屋頂斷掉後，中間會變成什麼號？",
                options: [
                    { text: "乘號 ( $\\bar{A} \\cdot \\bar{B}$ )", next: "q30", isCorrect: true },
                    { text: "加號 ( $\\bar{A} + \\bar{B}$ )", next: "q30_help", log: "Q30救錯: 砍斷屋頂後，運算符號一定要相反喔！加號要變乘號！" }
                ]
            },

            // --- 第 31 題：同步計數器設計 ---
            "q31": {
                tag: "第 31 關：循序邏輯電路",
                text: "若我們要利用 JK 正反器來設計一個「同步計數器」，除了畫出狀態圖與真值表之外，我們還必須利用哪一種表格來求出 J 與 K 腳位的布林方程式？",
                options: [
                    { text: "激勵表 (Excitation Table)", next: "q32", isCorrect: true },
                    { text: "狀態表 (State Table)", next: "q31_help", log: "Q31錯: 狀態表是第一步，用來列出狀態變化" },
                    { text: "特性表 (Characteristic Table)", next: "q31_help", log: "Q31錯: 特性表是給輸入求輸出" },
                    { text: "羅斯表 (Routh Table)", next: "q31_help", log: "Q31錯: 這是自動控制判斷穩定性用的" }
                ]
            },
            "q31_help": {
                tag: "💊 PBL 救援任務：逆向工程",
                text: "【邏輯推演】我們現在知道目標(希望從狀態 0 變成狀態 1)，我們要回頭去推算「到底要給 J 和 K 什麼刺激，它才會變成我們要的樣子」。這個反推輸入條件的表格，叫做？",
                options: [
                    { text: "激勵表", next: "q31", isCorrect: true },
                    { text: "特性表", next: "q31_help", log: "Q31救錯: 特性表是正常順序 (給JK求輸出)，逆向推算要用「激勵表」喔！" }
                ]
            },

            // --- 第 32 題：1的補數減法 ---
            "q32": {
                tag: "第 32 關：數字系統",
                text: "使用「1 的補數」進行減法運算，若相加後最後最高位有產生進位 (End-Around Carry, EAC)，這個進位必須如何處理？",
                options: [
                    { text: "將進位加回到結果的最低位元 (LSB)", next: "q33", isCorrect: true },
                    { text: "直接捨棄不理它", next: "q32_help", log: "Q32錯: 這是 2 的補數減法" },
                    { text: "再取一次 1 的補數", next: "q32_help", log: "Q32錯: 這是無進位(負數)時的處理" },
                    { text: "代表發生錯誤，程式當機", next: "q32_help", log: "Q32錯: 這是正常現象" }
                ]
            },
            "q32_help": {
                tag: "💊 PBL 救援任務：不完美的1",
                text: "【觀念推演】1的補數只是簡單把0變1、1變0，數學上會有落差。所以當算出來滿出來(進位)時，你必須把那個滿出來的 1「撿回來，加在屁股後面」補償它！這叫做 EAC 迴圈進位。",
                options: [
                    { text: "加回到最低位元 (LSB)", next: "q32", isCorrect: true },
                    { text: "直接捨棄", next: "q32_help", log: "Q32救錯: 直接丟掉那是比較完美的「2的補數」才有的特權喔！1的補數必須撿回來加！" }
                ]
            },

            // --- 第 33 題：基本邏輯閘轉換 ---
            "q33": {
                tag: "第 33 關：通用邏輯閘",
                text: "只要使用單一種邏輯閘，就可以組合成所有其他種類的邏輯閘 (NOT, AND, OR 等)。請問下列哪一種邏輯閘具備這種「通用閘 (Universal Gate)」的特性？",
                options: [
                    { text: "NAND 閘", next: "q34", isCorrect: true },
                    { text: "AND 閘", next: "q33_help", log: "Q33錯: AND 閘無法造出 NOT 的反相功能" },
                    { text: "OR 閘", next: "q33_help", log: "Q33錯: OR 閘無法造出反相功能" },
                    { text: "XOR 閘", next: "q33_help", log: "Q33錯: XOR 無法輕易組成 AND 閘" }
                ]
            },
            "q33_help": {
                tag: "💊 PBL 救援任務：萬能的積木",
                text: "【元件直覺】在 IC 設計的領域，為了省錢，我們喜歡用同一種樂高積木拼出所有東西。具備這種「萬能特性」的積木有兩種：一種是 NOR，另一種就是？",
                options: [
                    { text: "NAND 閘", next: "q33", isCorrect: true },
                    { text: "AND 閘", next: "q33_help", log: "Q33救錯: 萬能積木一定要自帶「反相(N)」的特性，不然拼不出 NOT 閘喔！" }
                ]
            },

            // --- 第 34 題：BCD加法器 ---
            "q34": {
                tag: "第 34 關：BCD 碼",
                text: "在設計 BCD 加法器時 (用四位元二進位表示 0~9)，如果兩個 BCD 碼相加的結果大於 9，電路必須進行「修正」。請問修正是要加上哪個數字？",
                options: [
                    { text: "加上 6 (0110)", next: "q35", isCorrect: true },
                    { text: "加上 10 (1010)", next: "q34_help", log: "Q34錯: 這是十進位的進位，不是二進位補償" },
                    { text: "加上 1 (0001)", next: "q34_help", log: "Q34錯: 這是 1 的補數補償" },
                    { text: "減去 6 (0110)", next: "q34_help", log: "Q34錯: 要往前推進位所以是加法" }
                ]
            },
            "q34_help": {
                tag: "💊 PBL 救援任務：填補黑洞",
                text: "【數學推演】四個 bit 最大可以數到 15。但 BCD 碼規定只准數到 9！中間有 10 到 15 這「6個」不准用的黑洞。如果不小心跨過去了，必須強行「加上 6」把它推到下一個位數去！",
                options: [
                    { text: "加上 6", next: "q34", isCorrect: true },
                    { text: "加上 10", next: "q34_help", log: "Q34救錯: 是要填補二進位和十進位之間那 6 個廢棄狀態的落差，所以是加 6 喔！" }
                ]
            },

            // 🏆 第 35 題：邏輯閘符號 (大魔王) ---
            "q35": {
                tag: "🏆 最終關：邏輯符號大魔王",
                text: "最後一題！一個邏輯閘的符號畫著「像月亮一樣彎彎的盾牌」，而且前面還有加上「一顆小圓圈(泡泡)」。請問這是哪一種邏輯閘的符號？",
                options: [
                    { text: "NOR 閘 (反或閘)", next: "end", isCorrect: true },
                    { text: "NAND 閘 (反及閘)", next: "q35_help", log: "Q35錯: NAND 閘是平平的 D 型配圓圈" },
                    { text: "OR 閘 (或閘)", next: "q35_help", log: "Q35錯: OR 閘沒有小圓圈" },
                    { text: "XOR 閘 (互斥或閘)", next: "q35_help", log: "Q35錯: XOR 後面還多一條弧線，且沒有圓圈" }
                ]
            },
            "q35_help": {
                tag: "💊 PBL 最終挑戰：拆解符號",
                text: "【圖形記憶】平平的 D 字型是 AND；彎彎的盾牌型是 OR。至於前面那顆「小圓圈」，在數位邏輯裡永遠代表「相反(NOT)」。彎彎的盾牌配上相反的小圓圈，合起來就是？",
                options: [
                    { text: "NOR 閘", next: "q35", isCorrect: true },
                    { text: "NAND 閘", next: "q35_help", log: "Q35救錯: NAND 是平平直直的 D 字型喔！彎彎的代表 OR 的血統！" }
                ]
            }
        };
        // ==========================================
        // 系統變數與遊戲邏輯
        // ==========================================
        let studentName = "";
        let currentStep = "q1"; 
        let hp = 30; 
        let currentStreak = 0; 
        let diagnosticLogs = [];
        let sessionCards = []; 
        let failedQuestions = []; 
        let startTime = 0;           
        let totalTime = 0;           
        let rescueTriggered = 0;     
        let rescueFails = 0;
        let isTransitioning = false; 
        
        // 🚨 預設卡包自動切換為第四階段 (phase4)
        let currentPackId = "phase4"; 

        document.addEventListener('DOMContentLoaded', () => {
            initPackSelector();
        });

        function initPackSelector() {
            const selector = document.getElementById('pack-selector');
            if (!selector) return;
            selector.innerHTML = '';
            Object.keys(cardPacks).forEach(key => {
                if (cardPacks[key].cards.length > 0) { 
                    const div = document.createElement('div');
                    div.className = `pack-option ${key === currentPackId ? 'active' : ''}`;
                    div.innerText = cardPacks[key].name;
                    div.onclick = () => selectPack(key, div);
                    selector.appendChild(div);
                }
            });
        }

        function selectPack(packId, el) {
            currentPackId = packId;
            document.querySelectorAll('.pack-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function saveToCollection(cardObj) {
            let storageKey = "gachaCollection_" + studentName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            let existingCard = pastCollection.find(c => c.id === cardObj.id);
            if(existingCard) { existingCard.count += 1; } 
            else { pastCollection.push({ ...cardObj, count: 1 }); }
            localStorage.setItem(storageKey, JSON.stringify(pastCollection));
        }

        function openCollection() {
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("請先輸入姓名！"); return; }
            
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let totalUnique = 0;
            let totalCards = 0;
            
            let contentArea = document.getElementById('collection-content');
            contentArea.innerHTML = "";
            
            Object.keys(cardPacks).forEach(packKey => {
                const pack = cardPacks[packKey];
                let packNormalPool = pack.cards.filter(c => c.chance > 0);
                if (packNormalPool.length === 0) return;

                totalCards += packNormalPool.length;
                
                let packUnique = packNormalPool.filter(mc => pastCollection.some(pc => pc.id === mc.id)).length;
                totalUnique += packUnique;
                
                contentArea.innerHTML += `<div class="pack-section-title">${pack.name} (${packUnique}/${packNormalPool.length})</div>`;
                
                let gridHtml = `<div class="card-grid">`;
                
                pack.cards.forEach(masterCard => {
                    let ownedCard = pastCollection.find(c => c.id === masterCard.id);
                    if (masterCard.chance === 0 && !ownedCard) return; 

                    if (ownedCard) {
                        let synthHtml = "";
                        if (masterCard.synthTarget && ownedCard.count >= 5) {
                            let btnClass = masterCard.rarity === "SR" ? "btn-synth btn-synth-sr" : "btn-synth";
                            let btnIcon = masterCard.rarity === "SR" ? "🔥" : "✨";
                            synthHtml = `<button class="${btnClass}" onclick="synthesizeCard('${masterCard.id}', '${masterCard.synthTarget}')">${btnIcon} 5合1 覺醒</button>`;
                        }

                        gridHtml += `
                            <div class="mini-card">
                                <div class="count">x${ownedCard.count}</div>
                                <img src="${masterCard.image}" alt="${masterCard.name}">
                                <div class="name">${masterCard.name}</div>
                                ${synthHtml}
                            </div>`;
                    } else {
                        gridHtml += `
                            <div class="mini-card unowned">
                                <img src="${masterCard.image}" alt="???">
                                <div class="name">【???】未知卡片</div>
                            </div>`;
                    }
                });
                gridHtml += `</div>`;
                contentArea.innerHTML += gridHtml;
            });

            document.getElementById('collection-title').innerText = `🏆 ${inputName} 的圖鑑 (${totalUnique} / ${totalCards})`;
            document.getElementById('collection-modal').style.display = "flex";
        }

        function synthesizeCard(materialId, targetSpId) {
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            let storageKey = "gachaCollection_" + inputName;
            let pastCollection = JSON.parse(localStorage.getItem(storageKey)) || [];

            let materialIndex = pastCollection.findIndex(c => c.id === materialId);
            if (materialIndex > -1 && pastCollection[materialIndex].count >= 5) {
                
                let spMaster = null;
                for (let packKey in cardPacks) {
                    let found = cardPacks[packKey].cards.find(c => c.id === targetSpId);
                    if (found) { spMaster = found; break; }
                }
                if (!spMaster) return;

                if (spMaster.pblTask && spMaster.unlockCode) {
                    let userInput = prompt(`🛑 傳說覺醒任務觸發！🛑\n\n${spMaster.pblTask}\n\n(任務完成後，請向老師索取通關密碼，並輸入於下方：)`);
                    
                    if (userInput === null) return; 
                    else if (userInput.trim() !== spMaster.unlockCode) {
                        alert("❌ 密碼錯誤！請確認你已經確實完成任務，並向老師取得正確密碼！");
                        playSound('wrong');
                        return; 
                    }
                }

                pastCollection[materialIndex].count -= 5;
                
                let spCardIndex = pastCollection.findIndex(c => c.id === targetSpId);
                if (spCardIndex > -1) { pastCollection[spCardIndex].count += 1; } 
                else { pastCollection.push({ ...spMaster, count: 1 }); }
                
                localStorage.setItem(storageKey, JSON.stringify(pastCollection));
                closeCollection();
                showSynthesisAnimation(spMaster);
            }
        }

        function showSynthesisAnimation(spCard) {
            playSound('synth'); 
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "✨ 碎片融合！傳說覺醒！ ✨";
            
            cardObj.className = "gacha-card card-SP"; 
            document.getElementById('card-image').src = spCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = spCard.name;
            cardObj.style.display = 'flex';
            
            const postBtn = document.getElementById('post-draw-btn');
            postBtn.innerText = "收下隱藏神卡";
            postBtn.style.display = 'block';
            postBtn.onclick = function() {
                cardObj.style.transform = "scale(0)"; 
                setTimeout(() => {
                    overlay.style.display = "none";
                    postBtn.innerText = "收下神卡並繼續";
                    postBtn.onclick = closeGacha; 
                    openCollection(); 
                }, 300);
            };
            overlay.style.display = "flex";
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);
        }

        function closeCollection() { document.getElementById('collection-modal').style.display = "none"; }

        function startGame() {
            studentName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if (!studentName) { alert("請先輸入姓名喔！"); return; }
            startTime = Date.now();
            initAudio(); 
            document.getElementById('student-setup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            updateStatus();
            renderQuestion();
        }

        function renderQuestion() {
            isTransitioning = false; 
            if (currentStep === "end") { finishGame(); return; }
            const q = quizData[currentStep];
            
            if(!q) { alert("題目載入錯誤！請檢查 quizData 設定。"); return; }

            document.getElementById('q-tag').innerText = q.tag;
            document.getElementById('q-text').innerHTML = q.text;

            if (q.tag.includes("救援") || q.tag.includes("提示")) {
                document.getElementById('q-tag').style.background = "#8e44ad"; 
                document.body.classList.add('rescue-mode'); 
            } else {
                document.body.classList.remove('rescue-mode'); 
                if (q.tag.includes("流行") || q.tag.includes("放鬆") || q.tag.includes("時間") || q.tag.includes("娛樂") || q.tag.includes("日劇") || q.tag.includes("校園")) {
                    document.getElementById('q-tag').style.background = "#27ae60"; 
                } else {
                    document.getElementById('q-tag').style.background = "#e74c3c"; 
                }
            }

            const optionsArea = document.getElementById('options-area');
            optionsArea.innerHTML = ""; 

            let shuffledOptions = [...q.options];
            shuffleArray(shuffledOptions);
            const labels = ["A", "B", "C", "D"];

            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                let cleanText = opt.text.replace(/^[A-D]\.\s*/, "");
                btn.innerHTML = `${labels[index]}. ${cleanText}`;
                btn.onclick = () => handleAnswer(opt);
                optionsArea.appendChild(btn);
            });

            if (window.MathJax) {
                MathJax.typesetPromise([document.getElementById('game-area')]).catch((err) => console.log(err.message));
            }
        }

        function handleAnswer(selectedOption) {
            if (isTransitioning) return; 
            isTransitioning = true; 
            let isRescueQuestion = currentStep.includes("_help"); 

            if (!selectedOption.isCorrect) {
                playSound('wrong'); 
                hp--; if(hp < 0) hp = 0; 
                currentStreak = 0; 
                updateStatus();
                if (selectedOption.log) diagnosticLogs.push(selectedOption.log);
                
                if (!failedQuestions.includes(currentStep)) {
                    failedQuestions.push(currentStep);
                }

                if (!isRescueQuestion) { rescueTriggered++; } 
                else { rescueFails++; }

                currentStep = selectedOption.next;
                renderQuestion();
            } 
            else {
                playSound('correct'); 
                showCorrectSplash();  
                
                if (!isRescueQuestion && !failedQuestions.includes(currentStep)) {
                    currentStreak++;
                }

                setTimeout(() => {
                    let nextStep = selectedOption.next;
                    
                    if (currentStreak >= 2) {
                        currentStreak = 0; 
                        currentStep = nextStep;
                        document.getElementById('gacha-title').innerText = "🔥 二連擊達成！獲得抽卡機會！ ✨";
                        prepareGacha(); 
                    } else {
                        currentStep = nextStep;
                        renderQuestion();
                    }
                    updateStatus();
                }, 800);
            }
        }

        function showCorrectSplash() {
            const splash = document.getElementById('correct-splash');
            splash.classList.add('show');
            setTimeout(() => { splash.classList.remove('show'); }, 600);
        }

        function updateStatus() {
            let hpText = hp > 10 ? `❤️❤️ x ${hp}` : "❤️".repeat(hp);
            document.getElementById('hearts').innerText = hpText;
            document.getElementById('streak-display').innerText = `🔥 連擊: ${currentStreak} / 2`;
        }

        function prepareGacha() {
            const overlay = document.getElementById('gacha-overlay');
            document.getElementById('pre-draw-btn').style.display = 'block';
            document.getElementById('revealed-card').style.display = 'none';
            document.getElementById('post-draw-btn').style.display = 'none';
            overlay.style.display = "flex";
        }

        function executeDraw() {
            playSound('draw'); 
            document.getElementById('pre-draw-btn').style.display = 'none';
            document.getElementById('gacha-title').innerText = "🎉 戰利品揭曉 🎉";
            drawCard(); 
        }

        function drawCard() {
            const cardObj = document.getElementById('revealed-card');
            
            if (!cardPacks[currentPackId] || cardPacks[currentPackId].cards.length === 0) {
                alert("⚠️ 目前選擇的卡包尚未準備好，系統自動切換為第一階段！");
                currentPackId = "phase1";
            }
            
            let currentPool = cardPacks[currentPackId].cards;
            let drawablePool = currentPool.filter(c => c.chance > 0);
            
            let randomNum = Math.random() * 100;
            let currentLimit = 0;
            let resultCard = drawablePool[drawablePool.length - 1]; 
            for (let i = 0; i < drawablePool.length; i++) {
                currentLimit += drawablePool[i].chance;
                if (randomNum <= currentLimit) { resultCard = drawablePool[i]; break; }
            }

            cardObj.className = "gacha-card"; 
            cardObj.classList.add(`card-${resultCard.rarity}`);
            document.getElementById('card-image').src = resultCard.image; 
            document.getElementById('card-image').style.display = 'block'; 
            document.getElementById('card-name').innerText = resultCard.name;
            
            cardObj.style.display = 'flex';
            document.getElementById('post-draw-btn').style.display = 'block';
            setTimeout(() => { cardObj.style.transform = "scale(1)"; }, 100);

            sessionCards.push(resultCard.name);
            saveToCollection(resultCard); 
            document.getElementById('inventory-display').innerText = `🎒 本局已抽: ${sessionCards.length} 張`;
        }

        function closeGacha() {
            const overlay = document.getElementById('gacha-overlay');
            const cardObj = document.getElementById('revealed-card');
            cardObj.style.transform = "scale(0)"; 
            setTimeout(() => {
                overlay.style.display = "none";
                renderQuestion(); 
            }, 300);
        }

        function finishGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            totalTime = Math.round((Date.now() - startTime) / 1000);

            let reportArea = document.getElementById('log-report');
            let finalScoreText = `血量剩餘：${hp}\n🕒 耗時：${totalTime} 秒\n🏀 本局共獲得 ${sessionCards.length} 張卡片\n\n`;
            let logText = diagnosticLogs.length === 0 ? "🌟 完美通關，基礎極度扎實！" : "⚠️ 盲點診斷 (請老師留意)：\n" + diagnosticLogs.join("\n");
            
            reportArea.innerText = finalScoreText + logText;

            let itemsText = sessionCards.length > 0 ? sessionCards.join(",") : "無";
            sendDataToSheet(
                studentName, hp, totalTime, rescueTriggered, rescueFails, 
                diagnosticLogs.length, diagnosticLogs.join(" | "), itemsText
            );
        }
        
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQnum1bAGvOb-dv5hL08S0pzMB93_gN0ZmoqCQtUjKFYOT-vs8Df0iTT6OMpx_sb6pjg/exec';
        
        function sendDataToSheet(name, hp, time, rescueT, rescueF, errorCount, errorDetails, cards) {
            if(!scriptURL) return;
            let formData = new URLSearchParams();
            formData.append('name', name);
            formData.append('hp', hp);
            formData.append('time', time);
            formData.append('rescueTriggered', rescueT);
            formData.append('rescueFails', rescueF); 
            formData.append('errorCount', errorCount);
            formData.append('errorDetails', errorDetails);
            formData.append('cards', cards);
            
            let storageKey = "gachaCollection_" + name;
            let fullCollection = localStorage.getItem(storageKey) || "[]";
            formData.append('fullCollection', fullCollection);
            fetch(scriptURL, { method: 'POST', body: formData }).catch(e=>console.log(e));
        }

        async function syncCloudData() {
            let inputName = document.getElementById('student-name').value.replace(/\s+/g, '');
            if(!inputName) { alert("⚠️ 請先輸入您的姓名，才能尋找雲端存檔喔！"); return; }
            if(!scriptURL) { alert("⚠️ 尚未設定 Google Sheet 網址，無法同步！"); return; }

            let syncBtn = document.getElementById('btn-sync');
            let originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ 雲端同步中，請稍候...";
            syncBtn.disabled = true;

            try {
                let fetchUrl = scriptURL + "?name=" + encodeURIComponent(inputName) + "&t=" + new Date().getTime();
                let response = await fetch(fetchUrl, { method: "GET" });
                let result = await response.json();

                if(result.status === "success") {
                    let cloudData = JSON.parse(result.data);
                    let storageKey = "gachaCollection_" + inputName;
                    let localData = JSON.parse(localStorage.getItem(storageKey)) || [];

                    cloudData.forEach(cloudCard => {
                        let existing = localData.find(c => c.id === cloudCard.id);
                        if (existing) {
                            existing.count = Math.max(existing.count, cloudCard.count); 
                        } else {
                            localData.push(cloudCard);
                        }
                    });

                    localStorage.setItem(storageKey, JSON.stringify(localData));
                    alert("✅ 雲端同步成功！已為您載入最新圖鑑進度！\n(系統已自動比對並保留您的最高進度)");
                } else {
                    alert("🆕 找不到您的雲端存檔。\n如果您是第一次玩，這是正常的，系統將為您建立全新圖鑑！");
                }
            } catch(e) {
                alert("❌ 同步失敗，請檢查網路連線或稍後再試。");
                console.error(e);
            } finally {
                syncBtn.innerText = originalText;
                syncBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
